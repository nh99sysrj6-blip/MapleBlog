<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文件合并工具</title>
  <style>
    html, body { background: transparent !important; min-height: unset !important; }
  </style>
  <script>
    (function() {
      function reportHeight() {
        var h = document.documentElement.scrollHeight || document.body.scrollHeight;
        window.parent.postMessage({ type: 'tool-height', height: h }, '*');
      }
      window.addEventListener('load', reportHeight);
      window.addEventListener('resize', reportHeight);
      var mo = new MutationObserver(reportHeight);
      document.addEventListener('DOMContentLoaded', function() {
        mo.observe(document.body, { childList: true, subtree: true, attributes: true });
      });
    })();
  </script>
</head>
<body>
<div class="container">
  <div class="card">
    <h2 class="title">📎 文件合并工具</h2>
    <p class="desc">将图片文件（jpg/png）和压缩包文件（rar/zip）合并为一个文件。合并后的文件可以作为图片正常查看，也可以用解压软件打开。</p>

    <div class="section">
      <div class="section-title">① 选择图片文件</div>
      <label class="file-label" for="img-input">
        <span id="img-name">点击选择图片（jpg / png）</span>
        <input type="file" id="img-input" accept=".jpg,.jpeg,.png" onchange="onFileChange('img')">
      </label>
    </div>

    <div class="section">
      <div class="section-title">② 选择压缩包文件</div>
      <label class="file-label" for="zip-input">
        <span id="zip-name">点击选择压缩包（rar / zip）</span>
        <input type="file" id="zip-input" accept=".rar,.zip" onchange="onFileChange('zip')">
      </label>
    </div>

    <div class="section">
      <div class="section-title">③ 输出文件名</div>
      <div style="display:flex;gap:8px;align-items:center;">
        <input type="text" id="out-name" placeholder="merged" style="flex:1;padding:9px 12px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:0.9rem;outline:none;background:#f8fafc;">
        <span style="color:#64748b;font-size:0.9rem;">.jpg</span>
      </div>
    </div>

    <div class="btn-row">
      <button class="btn-primary" onclick="merge()">合并并下载</button>
      <button class="btn-secondary" onclick="clearAll()">清空</button>
    </div>

    <div id="progress-wrap" style="display:none;margin-bottom:12px;">
      <div class="progress-bar-bg">
        <div class="progress-bar" id="progress-bar"></div>
      </div>
      <div id="progress-text" style="font-size:0.85rem;color:#64748b;margin-top:6px;"></div>
    </div>

    <div id="msg" class="msg"></div>
  </div>
</div>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8fafc; padding: 16px; }
  .container { max-width: 600px; margin: 0 auto; }
  .card { background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); padding: 24px; }
  .title { font-size: 1.3rem; font-weight: 700; color: #1e293b; margin-bottom: 8px; }
  .desc { font-size: 0.88rem; color: #64748b; margin-bottom: 20px; line-height: 1.6; }
  .section { margin-bottom: 18px; }
  .section-title { font-size: 0.85rem; font-weight: 700; color: #475569; margin-bottom: 8px; }
  .file-label { display: flex; align-items: center; justify-content: center; border: 2px dashed #cbd5e1; border-radius: 10px; padding: 18px; cursor: pointer; transition: border-color 0.2s, background 0.2s; background: #f8fafc; }
  .file-label:hover { border-color: #10b981; background: #f0fdf4; }
  .file-label span { font-size: 0.9rem; color: #64748b; pointer-events: none; text-align: center; }
  .file-label input { display: none; }
  .file-label.selected { border-color: #10b981; background: #f0fdf4; }
  .file-label.selected span { color: #065f46; font-weight: 600; }
  .btn-row { display: flex; gap: 10px; margin-bottom: 16px; }
  .btn-primary { background: #10b981; color: #fff; border: none; border-radius: 8px; padding: 10px 24px; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: background 0.2s; }
  .btn-primary:hover { background: #059669; }
  .btn-primary:disabled { background: #94a3b8; cursor: not-allowed; }
  .btn-secondary { background: #f1f5f9; color: #475569; border: 1.5px solid #e2e8f0; border-radius: 8px; padding: 10px 18px; font-size: 0.95rem; cursor: pointer; transition: background 0.2s; }
  .btn-secondary:hover { background: #e2e8f0; }
  .progress-bar-bg { background: #e2e8f0; border-radius: 99px; height: 8px; overflow: hidden; }
  .progress-bar { background: #10b981; height: 100%; border-radius: 99px; width: 0%; transition: width 0.3s; }
  .msg { font-size: 0.88rem; min-height: 20px; color: #ef4444; }
  .msg.success { color: #10b981; }
  input[type="text"]:focus { border-color: #10b981 !important; background: #fff !important; }
</style>
<script>
  var imgFile = null, zipFile = null;

  function onFileChange(type) {
    var input = document.getElementById(type + '-input');
    var nameEl = document.getElementById(type + '-name');
    var label = input.parentElement;
    if (input.files && input.files[0]) {
      var f = input.files[0];
      if (type === 'img') {
        imgFile = f;
        nameEl.textContent = '✓ ' + f.name + ' (' + formatSize(f.size) + ')';
      } else {
        zipFile = f;
        nameEl.textContent = '✓ ' + f.name + ' (' + formatSize(f.size) + ')';
      }
      label.classList.add('selected');
    }
  }

  function formatSize(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' KB';
    return (bytes/1024/1024).toFixed(2) + ' MB';
  }

  function setProgress(pct, text) {
    document.getElementById('progress-wrap').style.display = 'block';
    document.getElementById('progress-bar').style.width = pct + '%';
    document.getElementById('progress-text').textContent = text;
  }

  function merge() {
    if (!imgFile) { showMsg('请选择图片文件', false); return; }
    if (!zipFile) { showMsg('请选择压缩包文件', false); return; }
    var outName = (document.getElementById('out-name').value.trim() || 'merged') + '.jpg';

    showMsg('', false);
    setProgress(10, '正在读取图片...');

    var btn = document.querySelector('.btn-primary');
    btn.disabled = true;

    readFileAsBytes(imgFile, function(imgBytes) {
      setProgress(40, '正在读取压缩包...');
      readFileAsBytes(zipFile, function(zipBytes) {
        setProgress(70, '正在合并文件...');
        try {
          var merged = new Uint8Array(imgBytes.length + zipBytes.length);
          merged.set(imgBytes, 0);
          merged.set(zipBytes, imgBytes.length);
          setProgress(90, '正在生成下载链接...');
          var blob = new Blob([merged], { type: 'image/jpeg' });
          var url = URL.createObjectURL(blob);
          var a = document.createElement('a');
          a.href = url;
          a.download = outName;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          setTimeout(function(){ URL.revokeObjectURL(url); }, 10000);
          setProgress(100, '合并完成！文件大小：' + formatSize(merged.length));
          showMsg('✓ 合并成功，已下载 ' + outName, true);
        } catch(e) {
          showMsg('合并失败：' + e.message, false);
          setProgress(0, '');
        }
        btn.disabled = false;
      }, function(e) {
        showMsg('读取压缩包失败：' + e, false);
        btn.disabled = false;
      });
    }, function(e) {
      showMsg('读取图片失败：' + e, false);
      btn.disabled = false;
    });
  }

  function readFileAsBytes(file, onSuccess, onError) {
    var reader = new FileReader();
    reader.onload = function(e) {
      onSuccess(new Uint8Array(e.target.result));
    };
    reader.onerror = function(e) {
      onError(e);
    };
    reader.readAsArrayBuffer(file);
  }

  function clearAll() {
    imgFile = null; zipFile = null;
    document.getElementById('img-input').value = '';
    document.getElementById('zip-input').value = '';
    document.getElementById('img-name').textContent = '点击选择图片（jpg / png）';
    document.getElementById('zip-name').textContent = '点击选择压缩包（rar / zip）';
    document.querySelectorAll('.file-label').forEach(function(el){ el.classList.remove('selected'); });
    document.getElementById('out-name').value = '';
    document.getElementById('progress-wrap').style.display = 'none';
    document.getElementById('progress-bar').style.width = '0%';
    showMsg('', false);
  }

  function showMsg(m, success) {
    var el = document.getElementById('msg');
    el.textContent = m;
    el.className = 'msg' + (success ? ' success' : '');
  }
</script>
</body>
</html>
