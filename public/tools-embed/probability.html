<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>概率分布计算器</title>
  <style>
    html, body { background: transparent !important; min-height: unset !important; }
  </style>
  <script>
    (function() {
      function reportHeight() {
        var h = document.documentElement.scrollHeight || document.body.scrollHeight;
        window.parent.postMessage({ type: 'tool-height', height: h }, '*');
      }
      window.addEventListener('load', reportHeight);
      window.addEventListener('resize', reportHeight);
      var mo = new MutationObserver(reportHeight);
      document.addEventListener('DOMContentLoaded', function() {
        mo.observe(document.body, { childList: true, subtree: true, attributes: true });
      });
    })();
  </script>
  <script src="https://cdn.jsdelivr.net/npm/fraction.js@4.3.7/fraction.min.js"></script>
</head>
<body>
<div class="container">
  <div class="card">
    <h2 class="title">🎲 概率分布计算器</h2>
    <div class="tabs">
      <button class="tab active" onclick="switchTab('binom')">二项分布 B(n,p)</button>
      <button class="tab" onclick="switchTab('hyper')">超几何分布</button>
    </div>

    <!-- 二项分布 -->
    <div id="tab-binom" class="tab-panel">
      <div class="form-row">
        <div class="form-item">
          <label>试验次数 n</label>
          <input type="number" id="b-n" placeholder="例如：10" min="1" step="1">
        </div>
        <div class="form-item">
          <label>成功概率 p（分数或小数）</label>
          <input type="text" id="b-p" placeholder="例如：1/3 或 0.5">
        </div>
      </div>
      <div class="btn-row">
        <button class="btn-primary" onclick="calcBinom()">计算</button>
        <button class="btn-secondary" onclick="clearBinom()">清空</button>
      </div>
      <div id="binom-result" class="result-box" style="display:none">
        <div class="result-grid" id="binom-stats"></div>
        <div id="binom-table"></div>
      </div>
    </div>

    <!-- 超几何分布 -->
    <div id="tab-hyper" class="tab-panel" style="display:none">
      <div class="form-row">
        <div class="form-item">
          <label>总体 N</label>
          <input type="number" id="h-N" placeholder="例如：10" min="1" step="1">
        </div>
        <div class="form-item">
          <label>特殊个体数 M</label>
          <input type="number" id="h-M" placeholder="例如：4" min="0" step="1">
        </div>
        <div class="form-item">
          <label>抽取数 n</label>
          <input type="number" id="h-n" placeholder="例如：3" min="1" step="1">
        </div>
      </div>
      <div class="btn-row">
        <button class="btn-primary" onclick="calcHyper()">计算</button>
        <button class="btn-secondary" onclick="clearHyper()">清空</button>
      </div>
      <div id="hyper-result" class="result-box" style="display:none">
        <div class="result-grid" id="hyper-stats"></div>
        <div id="hyper-table"></div>
      </div>
    </div>

    <div id="msg" class="msg"></div>
  </div>
</div>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8fafc; padding: 16px; }
  .container { max-width: 750px; margin: 0 auto; }
  .card { background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); padding: 24px; }
  .title { font-size: 1.3rem; font-weight: 700; color: #1e293b; margin-bottom: 16px; }
  .tabs { display: flex; gap: 8px; margin-bottom: 20px; border-bottom: 2px solid #e2e8f0; padding-bottom: 0; }
  .tab { background: none; border: none; padding: 8px 18px; font-size: 0.95rem; font-weight: 600; color: #64748b; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.2s; }
  .tab.active { color: #10b981; border-bottom-color: #10b981; }
  .tab:hover { color: #10b981; }
  .tab-panel { }
  .form-row { display: flex; gap: 12px; margin-bottom: 14px; }
  .form-item { display: flex; flex-direction: column; gap: 5px; flex: 1; }
  label { font-size: 0.85rem; font-weight: 600; color: #475569; }
  input[type="number"], input[type="text"] { padding: 9px 12px; border: 1.5px solid #e2e8f0; border-radius: 8px; font-size: 0.9rem; outline: none; transition: border-color 0.2s; background: #f8fafc; width: 100%; }
  input:focus { border-color: #10b981; background: #fff; }
  .btn-row { display: flex; gap: 10px; margin-bottom: 18px; }
  .btn-primary { background: #10b981; color: #fff; border: none; border-radius: 8px; padding: 9px 22px; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: background 0.2s; }
  .btn-primary:hover { background: #059669; }
  .btn-secondary { background: #f1f5f9; color: #475569; border: 1.5px solid #e2e8f0; border-radius: 8px; padding: 9px 18px; font-size: 0.95rem; cursor: pointer; transition: background 0.2s; }
  .btn-secondary:hover { background: #e2e8f0; }
  .result-box { background: #f0fdf4; border: 1.5px solid #bbf7d0; border-radius: 10px; padding: 18px; margin-bottom: 10px; }
  .result-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 16px; }
  .result-item { background: #fff; border-radius: 8px; padding: 10px 12px; border: 1px solid #d1fae5; }
  .result-label { font-size: 0.78rem; color: #64748b; margin-bottom: 4px; }
  .result-value { font-size: 1rem; font-weight: 700; color: #065f46; font-family: 'Courier New', monospace; word-break: break-all; }
  .dist-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
  .dist-table th { background: #d1fae5; color: #065f46; padding: 7px 10px; text-align: center; font-weight: 700; }
  .dist-table td { padding: 6px 10px; text-align: center; border-bottom: 1px solid #e2e8f0; color: #334155; font-family: 'Courier New', monospace; }
  .dist-table tr:last-child td { border-bottom: none; }
  .msg { font-size: 0.85rem; min-height: 20px; color: #ef4444; margin-top: 6px; }
  @media (max-width: 500px) { .form-row { flex-direction: column; } .result-grid { grid-template-columns: 1fr 1fr; } }
</style>
<script>
  function switchTab(tab) {
    document.getElementById('tab-binom').style.display = tab === 'binom' ? '' : 'none';
    document.getElementById('tab-hyper').style.display = tab === 'hyper' ? '' : 'none';
    document.querySelectorAll('.tab').forEach(function(el, i) {
      el.classList.toggle('active', (i === 0 && tab === 'binom') || (i === 1 && tab === 'hyper'));
    });
    showMsg('');
  }

  // 组合数 C(n, k)
  function comb(n, k) {
    if (k < 0 || k > n) return new Fraction(0);
    if (k === 0 || k === n) return new Fraction(1);
    k = Math.min(k, n - k);
    var result = new Fraction(1);
    for (var i = 0; i < k; i++) {
      result = result.mul(new Fraction(n - i, i + 1));
    }
    return result;
  }

  function parseFrac(s) {
    s = s.trim();
    try { return new Fraction(s); } catch(e) { return null; }
  }

  function fracStr(f) {
    var v = f.valueOf();
    var str = f.toFraction();
    if (str === String(v)) return str;
    return str + ' ≈ ' + v.toFixed(6);
  }

  function calcBinom() {
    var n = parseInt(document.getElementById('b-n').value);
    var pStr = document.getElementById('b-p').value.trim();
    if (isNaN(n) || n < 1) { showMsg('n 必须为正整数'); return; }
    var p = parseFrac(pStr);
    if (!p) { showMsg('p 格式错误'); return; }
    if (p.valueOf() < 0 || p.valueOf() > 1) { showMsg('p 必须在 [0,1] 之间'); return; }

    var q = new Fraction(1).sub(p);
    var E = new Fraction(n).mul(p);
    var D = new Fraction(n).mul(p).mul(q);

    var statsEl = document.getElementById('binom-stats');
    statsEl.innerHTML = '';
    [['期望 E(X)', fracStr(E)], ['方差 D(X)', fracStr(D)], ['标准差 σ', Math.sqrt(D.valueOf()).toFixed(6)]].forEach(function(item) {
      statsEl.innerHTML += '<div class="result-item"><div class="result-label">' + item[0] + '</div><div class="result-value">' + item[1] + '</div></div>';
    });

    var html = '<table class="dist-table"><thead><tr><th>k</th><th>P(X=k)</th><th>P(X≤k)</th></tr></thead><tbody>';
    var cumP = new Fraction(0);
    for (var k = 0; k <= n; k++) {
      var prob = comb(n, k).mul(p.pow(k)).mul(q.pow(n - k));
      cumP = cumP.add(prob);
      html += '<tr><td>' + k + '</td><td>' + fracStr(prob) + '</td><td>' + fracStr(cumP) + '</td></tr>';
    }
    html += '</tbody></table>';
    document.getElementById('binom-table').innerHTML = html;
    document.getElementById('binom-result').style.display = 'block';
    showMsg('');
  }

  function clearBinom() {
    document.getElementById('b-n').value = '';
    document.getElementById('b-p').value = '';
    document.getElementById('binom-result').style.display = 'none';
    showMsg('');
  }

  function calcHyper() {
    var N = parseInt(document.getElementById('h-N').value);
    var M = parseInt(document.getElementById('h-M').value);
    var n = parseInt(document.getElementById('h-n').value);
    if (isNaN(N) || N < 1) { showMsg('N 必须为正整数'); return; }
    if (isNaN(M) || M < 0 || M > N) { showMsg('M 必须满足 0 ≤ M ≤ N'); return; }
    if (isNaN(n) || n < 1 || n > N) { showMsg('n 必须满足 1 ≤ n ≤ N'); return; }

    var E = new Fraction(n * M, N);
    var D = new Fraction(n).mul(new Fraction(M, N)).mul(new Fraction(N - M, N)).mul(new Fraction(N - n, N - 1));

    var statsEl = document.getElementById('hyper-stats');
    statsEl.innerHTML = '';
    [['期望 E(X)', fracStr(E)], ['方差 D(X)', fracStr(D)], ['标准差 σ', Math.sqrt(D.valueOf()).toFixed(6)]].forEach(function(item) {
      statsEl.innerHTML += '<div class="result-item"><div class="result-label">' + item[0] + '</div><div class="result-value">' + item[1] + '</div></div>';
    });

    var kMin = Math.max(0, n - (N - M));
    var kMax = Math.min(n, M);
    var html = '<table class="dist-table"><thead><tr><th>k</th><th>P(X=k)</th><th>P(X≤k)</th></tr></thead><tbody>';
    var cumP = new Fraction(0);
    for (var k = kMin; k <= kMax; k++) {
      var prob = comb(M, k).mul(comb(N - M, n - k)).div(comb(N, n));
      cumP = cumP.add(prob);
      html += '<tr><td>' + k + '</td><td>' + fracStr(prob) + '</td><td>' + fracStr(cumP) + '</td></tr>';
    }
    html += '</tbody></table>';
    document.getElementById('hyper-table').innerHTML = html;
    document.getElementById('hyper-result').style.display = 'block';
    showMsg('');
  }

  function clearHyper() {
    ['h-N','h-M','h-n'].forEach(function(id){ document.getElementById(id).value = ''; });
    document.getElementById('hyper-result').style.display = 'none';
    showMsg('');
  }

  function showMsg(m) { document.getElementById('msg').textContent = m; }
</script>
</body>
</html>
