<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>等差乘等比求和计算器</title>
  <script src="https://cdn.jsdelivr.net/npm/fraction.js@4.2.0/fraction.min.js"></script>
  <style>
    html, body { background: transparent !important; min-height: unset !important; }
  </style>
  <script>
    (function() {
      function reportHeight() {
        var h = document.documentElement.scrollHeight || document.body.scrollHeight;
        window.parent.postMessage({ type: 'tool-height', height: h }, '*');
      }
      window.addEventListener('load', reportHeight);
      window.addEventListener('resize', reportHeight);
      var mo = new MutationObserver(reportHeight);
      document.addEventListener('DOMContentLoaded', function() {
        mo.observe(document.body, { childList: true, subtree: true, attributes: true });
      });
    })();
  </script>
</head>
<body>
  <div class="wrap">
    <h1>错位相减法计算器</h1>

    <div class="field">
      <label>a (系数):</label>
      <input type="text" id="a" placeholder="如: 3/4 或 0.75">
    </div>
    <div class="field">
      <label>b (常数项):</label>
      <input type="text" id="b" placeholder="如: 1/2 或 0.5">
    </div>
    <div class="field">
      <label>q (公比):</label>
      <input type="text" id="q" placeholder="如: 2 或 1/3">
    </div>
    <div class="field">
      <label>m (指数调整):</label>
      <input type="text" id="m" placeholder="整数，如: 2">
    </div>

    <button onclick="calculate()">计算</button>

    <div id="result" class="result" style="display:none">
      <p class="formula">结果公式：Sₙ = (A⋅n + B)qⁿ - B</p>
      <p class="val">A = <span id="A-value"></span></p>
      <p class="val">B = <span id="B-value"></span></p>
    </div>
  </div>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f3f4f6; display: flex; justify-content: center; padding: 32px 16px; }
    .wrap { background: #fff; padding: 32px; border-radius: 8px; box-shadow: 0 4px 16px rgba(0,0,0,0.1); width: 100%; max-width: 384px; }
    h1 { font-size: 1.5rem; font-weight: 700; color: #1f2937; margin-bottom: 24px; }
    .field { margin-bottom: 16px; }
    label { display: block; font-size: 0.875rem; font-weight: 500; color: #374151; margin-bottom: 4px; }
    input { width: 100%; border: 1px solid #d1d5db; border-radius: 4px; padding: 8px 12px; font-size: 0.9rem; outline: none; transition: border-color 0.15s; }
    input:focus { border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59,130,246,0.2); }
    button { width: 100%; background: #3b82f6; color: #fff; border: none; border-radius: 4px; padding: 10px 16px; font-size: 0.95rem; cursor: pointer; margin-top: 24px; transition: background 0.15s; }
    button:hover { background: #2563eb; }
    .result { margin-top: 24px; padding: 16px; background: #f9fafb; border-radius: 4px; }
    .formula { font-weight: 500; color: #1f2937; margin-bottom: 12px; }
    .val { font-size: 0.875rem; color: #374151; margin-top: 8px; }
    .val span { font-family: 'Courier New', monospace; color: #2563eb; font-weight: 600; }
  </style>

  <script>
    function parseInput(value) {
      try {
        return new Fraction(value);
      } catch (e) {
        throw new Error('无效的分数格式，请使用如 3/4 或 0.75 的格式');
      }
    }

    function calculate() {
      try {
        if (typeof Fraction === 'undefined') {
          throw new Error('分数库加载失败，请刷新页面重试');
        }

        var a = parseInput(document.getElementById('a').value);
        var b = parseInput(document.getElementById('b').value);
        var q = parseInput(document.getElementById('q').value);
        var m = parseInt(document.getElementById('m').value);

        if (isNaN(m)) throw new Error('m必须是整数');
        if (q.valueOf() === 1) throw new Error('q不能等于1');

        var qPower = q.pow(m + 1);
        var adjustedA = a.mul(qPower);
        var adjustedB = b.mul(qPower);

        var qMinus1 = q.sub(1);
        var A = adjustedA.div(qMinus1);
        var B = adjustedB.sub(A).div(qMinus1);

        document.getElementById('result').style.display = 'block';
        document.getElementById('A-value').textContent = A.toFraction();
        document.getElementById('B-value').textContent = B.toFraction();
      } catch (error) {
        alert('计算错误: ' + error.message);
      }
    }
  </script>
</body>
</html>
