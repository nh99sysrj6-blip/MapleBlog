<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文本对比工具</title>
  <style>
    html, body { background: transparent !important; min-height: unset !important; }
  </style>
  <script>
    (function() {
      function reportHeight() {
        var h = document.documentElement.scrollHeight || document.body.scrollHeight;
        window.parent.postMessage({ type: 'tool-height', height: h }, '*');
      }
      window.addEventListener('load', reportHeight);
      window.addEventListener('resize', reportHeight);
      var mo = new MutationObserver(reportHeight);
      document.addEventListener('DOMContentLoaded', function() {
        mo.observe(document.body, { childList: true, subtree: true, attributes: true });
      });
    })();
  </script>
</head>
<body>
<div class="container">
  <div class="card">
    <h2 class="title">🔍 文本对比工具</h2>
    <div class="io-row">
      <div class="io-col">
        <label>文本 A</label>
        <textarea id="inputA" placeholder="输入第一段文本..."></textarea>
      </div>
      <div class="io-col">
        <label>文本 B</label>
        <textarea id="inputB" placeholder="输入第二段文本..."></textarea>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn-primary" onclick="diff()">对比</button>
      <button class="btn-secondary" onclick="clearAll()">清空</button>
    </div>
    <div id="result" class="result-area" style="display:none">
      <div class="result-header">
        <span id="diffStats"></span>
      </div>
      <div class="diff-cols">
        <div class="diff-col">
          <div class="diff-col-label">文本 A</div>
          <div id="diffA" class="diff-view"></div>
        </div>
        <div class="diff-col">
          <div class="diff-col-label">文本 B</div>
          <div id="diffB" class="diff-view"></div>
        </div>
      </div>
    </div>
    <div id="msg" class="msg"></div>
  </div>
</div>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8fafc; padding: 16px; }
  .container { max-width: 900px; margin: 0 auto; }
  .card { background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); padding: 24px; }
  .title { font-size: 1.3rem; font-weight: 700; color: #1e293b; margin-bottom: 16px; }
  .io-row { display: flex; gap: 16px; }
  .io-col { flex: 1; display: flex; flex-direction: column; gap: 6px; }
  label { font-size: 0.85rem; font-weight: 600; color: #475569; }
  textarea { width: 100%; height: 160px; padding: 10px 12px; border: 1.5px solid #e2e8f0; border-radius: 8px; font-size: 0.9rem; font-family: 'Courier New', monospace; resize: vertical; outline: none; transition: border-color 0.2s; background: #f8fafc; }
  textarea:focus { border-color: #10b981; background: #fff; }
  .btn-row { display: flex; gap: 10px; margin-top: 16px; flex-wrap: wrap; }
  .btn-primary { background: #10b981; color: #fff; border: none; border-radius: 8px; padding: 9px 22px; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: background 0.2s; }
  .btn-primary:hover { background: #059669; }
  .btn-secondary { background: #f1f5f9; color: #475569; border: 1.5px solid #e2e8f0; border-radius: 8px; padding: 9px 18px; font-size: 0.95rem; cursor: pointer; transition: background 0.2s; }
  .btn-secondary:hover { background: #e2e8f0; }
  .result-area { margin-top: 20px; }
  .result-header { margin-bottom: 10px; font-size: 0.9rem; color: #475569; }
  .diff-cols { display: flex; gap: 12px; }
  .diff-col { flex: 1; }
  .diff-col-label { font-size: 0.8rem; font-weight: 700; color: #475569; margin-bottom: 6px; }
  .diff-view { border: 1.5px solid #e2e8f0; border-radius: 8px; overflow: auto; max-height: 320px; background: #f8fafc; }
  .diff-line { padding: 3px 10px; font-size: 0.85rem; font-family: 'Courier New', monospace; white-space: pre-wrap; word-break: break-all; line-height: 1.6; }
  .diff-line.same { background: transparent; color: #334155; }
  .diff-line.diff { background: #fee2e2; color: #991b1b; }
  .diff-line.empty { background: #f1f5f9; color: #94a3b8; }
  .msg { margin-top: 10px; font-size: 0.85rem; min-height: 20px; color: #10b981; }
  @media (max-width: 600px) { .io-row { flex-direction: column; } .diff-cols { flex-direction: column; } }
</style>
<script>
  function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function diff() {
    const a = document.getElementById('inputA').value;
    const b = document.getElementById('inputB').value;
    if (!a && !b) { showMsg('请输入文本'); return; }
    const linesA = a.split('\n');
    const linesB = b.split('\n');
    const maxLen = Math.max(linesA.length, linesB.length);
    let diffCount = 0;
    let htmlA = '', htmlB = '';
    for (let i = 0; i < maxLen; i++) {
      const la = linesA[i];
      const lb = linesB[i];
      if (la === undefined) {
        htmlA += `<div class="diff-line empty">（空）</div>`;
        htmlB += `<div class="diff-line diff">${esc(lb)}</div>`;
        diffCount++;
      } else if (lb === undefined) {
        htmlA += `<div class="diff-line diff">${esc(la)}</div>`;
        htmlB += `<div class="diff-line empty">（空）</div>`;
        diffCount++;
      } else if (la === lb) {
        htmlA += `<div class="diff-line same">${esc(la)}</div>`;
        htmlB += `<div class="diff-line same">${esc(lb)}</div>`;
      } else {
        htmlA += `<div class="diff-line diff">${esc(la)}</div>`;
        htmlB += `<div class="diff-line diff">${esc(lb)}</div>`;
        diffCount++;
      }
    }
    document.getElementById('diffA').innerHTML = htmlA;
    document.getElementById('diffB').innerHTML = htmlB;
    document.getElementById('diffStats').textContent =
      `共 ${maxLen} 行，差异行：${diffCount} 行，相同行：${maxLen - diffCount} 行`;
    document.getElementById('result').style.display = 'block';
    showMsg('对比完成');
  }
  function clearAll() {
    document.getElementById('inputA').value = '';
    document.getElementById('inputB').value = '';
    document.getElementById('result').style.display = 'none';
    showMsg('');
  }
  function showMsg(m) { document.getElementById('msg').textContent = m; }
</script>
</body>
</html>
