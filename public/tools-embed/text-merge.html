<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文本合并器</title>
  <style>
    html, body { background: transparent !important; min-height: unset !important; }
  </style>
  <script>
    (function() {
      function reportHeight() {
        var h = document.documentElement.scrollHeight || document.body.scrollHeight;
        window.parent.postMessage({ type: 'tool-height', height: h }, '*');
      }
      window.addEventListener('load', reportHeight);
      window.addEventListener('resize', reportHeight);
      var mo = new MutationObserver(reportHeight);
      document.addEventListener('DOMContentLoaded', function() {
        mo.observe(document.body, { childList: true, subtree: true, attributes: true });
      });
    })();
  </script>
</head>
<body>
<div class="container">
  <div class="card">
    <h2 class="title">🔗 文本合并器</h2>
    <div class="sep-row">
      <label for="sep">分隔符：</label>
      <input type="text" id="sep" value="\n" placeholder="分隔符（\n 表示换行，\t 表示制表符）">
      <button class="btn-secondary small" onclick="addBlock()">+ 添加文本块</button>
    </div>
    <div id="blocks">
      <div class="block-wrap">
        <div class="block-label">文本块 1</div>
        <textarea class="block-input" placeholder="输入文本块 1..."></textarea>
      </div>
      <div class="block-wrap">
        <div class="block-label">文本块 2</div>
        <textarea class="block-input" placeholder="输入文本块 2..."></textarea>
      </div>
    </div>
    <div class="io-col out-col">
      <label>合并结果</label>
      <textarea id="output" placeholder="合并后的文本..." readonly></textarea>
    </div>
    <div class="btn-row">
      <button class="btn-primary" onclick="merge()">合并</button>
      <button class="btn-secondary" onclick="clearAll()">清空</button>
      <button class="btn-secondary" onclick="copyOutput()">复制结果</button>
    </div>
    <div id="msg" class="msg"></div>
  </div>
</div>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8fafc; padding: 16px; }
  .container { max-width: 900px; margin: 0 auto; }
  .card { background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); padding: 24px; }
  .title { font-size: 1.3rem; font-weight: 700; color: #1e293b; margin-bottom: 16px; }
  .sep-row { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
  .sep-row label { font-size: 0.9rem; font-weight: 600; color: #475569; white-space: nowrap; }
  .sep-row input { flex: 1; min-width: 120px; max-width: 260px; padding: 7px 10px; border: 1.5px solid #e2e8f0; border-radius: 8px; font-size: 0.9rem; outline: none; }
  .sep-row input:focus { border-color: #10b981; }
  #blocks { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 16px; }
  .block-wrap { flex: 1; min-width: 200px; display: flex; flex-direction: column; gap: 4px; }
  .block-label { font-size: 0.8rem; font-weight: 600; color: #10b981; }
  .block-input { width: 100%; height: 130px; padding: 10px 12px; border: 1.5px solid #e2e8f0; border-radius: 8px; font-size: 0.9rem; font-family: 'Courier New', monospace; resize: vertical; outline: none; background: #f8fafc; }
  .block-input:focus { border-color: #10b981; background: #fff; }
  .out-col { margin-bottom: 0; }
  .out-col label { font-size: 0.85rem; font-weight: 600; color: #475569; display: block; margin-bottom: 6px; }
  #output { width: 100%; height: 130px; padding: 10px 12px; border: 1.5px solid #e2e8f0; border-radius: 8px; font-size: 0.9rem; font-family: 'Courier New', monospace; resize: vertical; outline: none; background: #f1f5f9; }
  .btn-row { display: flex; gap: 10px; margin-top: 16px; flex-wrap: wrap; }
  .btn-primary { background: #10b981; color: #fff; border: none; border-radius: 8px; padding: 9px 22px; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: background 0.2s; }
  .btn-primary:hover { background: #059669; }
  .btn-secondary { background: #f1f5f9; color: #475569; border: 1.5px solid #e2e8f0; border-radius: 8px; padding: 9px 18px; font-size: 0.95rem; cursor: pointer; transition: background 0.2s; }
  .btn-secondary:hover { background: #e2e8f0; }
  .btn-secondary.small { padding: 7px 14px; font-size: 0.85rem; }
  .msg { margin-top: 10px; font-size: 0.85rem; min-height: 20px; color: #10b981; }
</style>
<script>
  let blockCount = 2;

  function parseSep(s) {
    return s.replace(/\\n/g, '\n').replace(/\\t/g, '\t');
  }
  function addBlock() {
    blockCount++;
    const wrap = document.createElement('div');
    wrap.className = 'block-wrap';
    wrap.innerHTML = `<div class="block-label">文本块 ${blockCount}</div><textarea class="block-input" placeholder="输入文本块 ${blockCount}..."></textarea>`;
    document.getElementById('blocks').appendChild(wrap);
  }
  function merge() {
    const sep = parseSep(document.getElementById('sep').value);
    const inputs = document.querySelectorAll('.block-input');
    const parts = Array.from(inputs).map(t => t.value).filter(v => v !== '');
    document.getElementById('output').value = parts.join(sep);
    showMsg(`已合并 ${parts.length} 个文本块`);
  }
  function clearAll() {
    document.querySelectorAll('.block-input').forEach(t => t.value = '');
    document.getElementById('output').value = '';
    showMsg('');
  }
  function copyOutput() {
    const v = document.getElementById('output').value;
    if (!v) { showMsg('没有可复制的内容'); return; }
    navigator.clipboard.writeText(v).then(() => showMsg('已复制到剪贴板'));
  }
  function showMsg(m) { document.getElementById('msg').textContent = m; }
</script>
</body>
</html>
