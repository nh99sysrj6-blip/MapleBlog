<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>密码强度检测</title>
  <style>
    html, body { background: transparent !important; min-height: unset !important; }
  </style>
  <script>
    (function() {
      function reportHeight() {
        var h = document.documentElement.scrollHeight || document.body.scrollHeight;
        window.parent.postMessage({ type: 'tool-height', height: h }, '*');
      }
      window.addEventListener('load', reportHeight);
      window.addEventListener('resize', reportHeight);
      var mo = new MutationObserver(reportHeight);
      document.addEventListener('DOMContentLoaded', function() {
        mo.observe(document.body, { childList: true, subtree: true, attributes: true });
      });
    })();
  </script>
</head>
<body>
<div class="container">
  <div class="card">
    <h2 class="title">🛡️ 密码强度检测</h2>
    <div class="input-wrap">
      <input type="password" id="pwdInput" placeholder="输入密码以检测强度..." oninput="analyze()">
      <button class="btn-eye" id="eyeBtn" onclick="toggleShow()" title="显示/隐藏">👁</button>
    </div>
    <div class="strength-wrap">
      <div class="strength-bar">
        <div id="strengthFill" class="strength-fill"></div>
      </div>
      <span id="strengthLabel" class="strength-label">—</span>
    </div>
    <div id="statsGrid" class="stats-grid">
      <div class="stat-item"><span class="stat-val" id="statLen">0</span><span class="stat-key">长度</span></div>
      <div class="stat-item"><span class="stat-val" id="statUpper">0</span><span class="stat-key">大写</span></div>
      <div class="stat-item"><span class="stat-val" id="statLower">0</span><span class="stat-key">小写</span></div>
      <div class="stat-item"><span class="stat-val" id="statDigit">0</span><span class="stat-key">数字</span></div>
      <div class="stat-item"><span class="stat-val" id="statSymbol">0</span><span class="stat-key">符号</span></div>
      <div class="stat-item"><span class="stat-val" id="statEntropy">0</span><span class="stat-key">熵值</span></div>
    </div>
    <div id="suggestions" class="suggestions"></div>
  </div>
</div>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8fafc; padding: 16px; }
  .container { max-width: 560px; margin: 0 auto; }
  .card { background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); padding: 24px; }
  .title { font-size: 1.3rem; font-weight: 700; color: #1e293b; margin-bottom: 20px; }
  .input-wrap { display: flex; gap: 8px; margin-bottom: 16px; }
  .input-wrap input { flex: 1; padding: 10px 14px; border: 1.5px solid #e2e8f0; border-radius: 8px; font-size: 1rem; font-family: 'Courier New', monospace; background: #f8fafc; outline: none; color: #1e293b; transition: border-color 0.2s; }
  .input-wrap input:focus { border-color: #6366f1; background: #fff; }
  .btn-eye { background: #f1f5f9; border: 1.5px solid #e2e8f0; border-radius: 8px; padding: 0 14px; font-size: 1.1rem; cursor: pointer; transition: background 0.2s; }
  .btn-eye:hover { background: #e2e8f0; }
  .strength-wrap { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
  .strength-bar { flex: 1; height: 10px; background: #e2e8f0; border-radius: 5px; overflow: hidden; }
  .strength-fill { height: 100%; width: 0; border-radius: 5px; transition: width 0.35s, background 0.35s; }
  .strength-label { font-size: 0.9rem; font-weight: 700; min-width: 40px; color: #94a3b8; }
  .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
  .stat-item { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 10px; text-align: center; }
  .stat-val { display: block; font-size: 1.4rem; font-weight: 700; color: #1e293b; }
  .stat-key { display: block; font-size: 0.75rem; color: #94a3b8; margin-top: 2px; }
  .suggestions { display: flex; flex-direction: column; gap: 6px; }
  .suggestion { display: flex; align-items: flex-start; gap: 8px; font-size: 0.88rem; padding: 8px 12px; border-radius: 8px; }
  .suggestion.warn { background: #fef9c3; color: #854d0e; }
  .suggestion.ok { background: #dcfce7; color: #166534; }
  .suggestion .icon { flex-shrink: 0; }
</style>
<script>
  function toggleShow() {
    const inp = document.getElementById('pwdInput');
    inp.type = inp.type === 'password' ? 'text' : 'password';
  }

  function analyze() {
    const pwd = document.getElementById('pwdInput').value;
    const len = pwd.length;
    const upper = (pwd.match(/[A-Z]/g) || []).length;
    const lower = (pwd.match(/[a-z]/g) || []).length;
    const digit = (pwd.match(/[0-9]/g) || []).length;
    const symbol = (pwd.match(/[^A-Za-z0-9]/g) || []).length;

    // Entropy estimate
    let pool = 0;
    if (upper) pool += 26;
    if (lower) pool += 26;
    if (digit) pool += 10;
    if (symbol) pool += 32;
    const entropy = pool > 0 ? Math.round(len * Math.log2(pool)) : 0;

    document.getElementById('statLen').textContent = len;
    document.getElementById('statUpper').textContent = upper;
    document.getElementById('statLower').textContent = lower;
    document.getElementById('statDigit').textContent = digit;
    document.getElementById('statSymbol').textContent = symbol;
    document.getElementById('statEntropy').textContent = entropy;

    // Score
    let score = 0;
    if (len >= 8) score++;
    if (len >= 12) score++;
    if (len >= 16) score++;
    if (upper > 0) score++;
    if (lower > 0) score++;
    if (digit > 0) score++;
    if (symbol > 0) score++;

    const levels = [
      { max: 2, pct: 14, color: '#ef4444', text: '极弱' },
      { max: 3, pct: 28, color: '#f97316', text: '弱' },
      { max: 4, pct: 45, color: '#eab308', text: '一般' },
      { max: 5, pct: 62, color: '#84cc16', text: '较强' },
      { max: 6, pct: 80, color: '#22c55e', text: '强' },
      { max: 7, pct: 100, color: '#10b981', text: '极强' },
    ];
    const lv = levels.find(l => score <= l.max) || levels[levels.length - 1];
    const fill = document.getElementById('strengthFill');
    const label = document.getElementById('strengthLabel');
    if (!len) {
      fill.style.width = '0';
      label.textContent = '—';
      label.style.color = '#94a3b8';
      document.getElementById('suggestions').innerHTML = '';
      return;
    }
    fill.style.width = lv.pct + '%';
    fill.style.background = lv.color;
    label.textContent = lv.text;
    label.style.color = lv.color;

    // Suggestions
    const tips = [];
    if (len < 8) tips.push({ ok: false, text: '密码长度至少需要 8 位' });
    else if (len < 12) tips.push({ ok: false, text: '建议密码长度达到 12 位以上' });
    else tips.push({ ok: true, text: `密码长度 ${len} 位，长度良好` });
    if (!upper) tips.push({ ok: false, text: '建议加入大写字母 (A-Z)' });
    else tips.push({ ok: true, text: '包含大写字母' });
    if (!lower) tips.push({ ok: false, text: '建议加入小写字母 (a-z)' });
    else tips.push({ ok: true, text: '包含小写字母' });
    if (!digit) tips.push({ ok: false, text: '建议加入数字 (0-9)' });
    else tips.push({ ok: true, text: '包含数字' });
    if (!symbol) tips.push({ ok: false, text: '建议加入特殊符号 (!@#$...)' });
    else tips.push({ ok: true, text: '包含特殊符号' });

    document.getElementById('suggestions').innerHTML = tips.map(t =>
      `<div class="suggestion ${t.ok ? 'ok' : 'warn'}"><span class="icon">${t.ok ? '✅' : '⚠️'}</span><span>${t.text}</span></div>`
    ).join('');
  }
</script>
</body>
</html>
