<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文件加密工具</title>
  <style>html,body{background:transparent!important;min-height:unset!important}</style>
  <script>(function(){function r(){var h=document.documentElement.scrollHeight||document.body.scrollHeight;window.parent.postMessage({type:'tool-height',height:h},'*')}window.addEventListener('load',r);window.addEventListener('resize',r);var m=new MutationObserver(r);document.addEventListener('DOMContentLoaded',function(){m.observe(document.body,{childList:true,subtree:true,attributes:true})})})();</script>
</head>
<body>
<div class="wrap">
  <div class="tabs">
    <button class="tab active" data-tab="enc">🔒 加密</button>
    <button class="tab" data-tab="dec">🔓 解密</button>
    <button class="tab" data-tab="keys">🔑 生成密钥对</button>
  </div>
  <div id="panel-enc" class="panel">
    <div class="section">
      <div class="field"><label>选择文件</label>
        <div class="drop-zone" id="enc-drop"><input type="file" id="enc-file"><div id="enc-file-info" class="drop-hint">📁 点击选择或拖放文件（最大 1 GB）</div></div>
      </div>
      <div class="field"><label>加密方式</label>
        <div class="radio-group">
          <label class="radio-label"><input type="radio" name="enc-method" value="password" checked> 密码加密</label>
          <label class="radio-label"><input type="radio" name="enc-method" value="keypair"> 公钥加密</label>
        </div>
      </div>
      <div id="enc-pw-sec">
        <div class="field"><label>密码（至少 12 位）</label>
          <div class="input-row">
            <input type="password" id="enc-password" placeholder="输入加密密码">
            <button class="btn-icon" id="enc-pwd-toggle">👁</button>
            <button class="btn-icon" id="enc-pwd-gen" title="随机生成">🎲</button>
          </div>
          <div id="enc-pwd-strength" class="strength-wrap" style="display:none">
            <div class="sbar"><div id="enc-pwd-fill" class="sfill"></div></div>
            <span id="enc-pwd-label" class="slabel"></span>
          </div>
        </div>
      </div>
      <div id="enc-kp-sec" style="display:none">
        <div class="field"><label>接收方公钥</label>
          <div class="input-row"><input type="text" id="enc-rpk" placeholder="粘贴接收方公钥（Base64）">
            <label class="btn-icon">📎<input type="file" id="enc-rpk-file" accept=".public,.txt"></label></div>
        </div>
        <div class="field"><label>你的私钥</label>
          <div class="input-row"><input type="password" id="enc-ssk" placeholder="粘贴你的私钥（Base64）">
            <button class="btn-icon" id="enc-ssk-toggle">👁</button>
            <label class="btn-icon">📎<input type="file" id="enc-ssk-file" accept=".private,.txt"></label></div>
        </div>
      </div>
      <div id="enc-err" class="alert err" style="display:none"></div>
      <div id="enc-prog" style="display:none"><div class="pbar"><div id="enc-pfill" class="pfill"></div></div><div id="enc-ptxt" class="ptxt">加密中...</div></div>
      <div class="btn-row">
        <button class="btn-primary" id="enc-btn">🔒 开始加密</button>
        <button class="btn-ghost" id="enc-reset">重置</button>
      </div>
      <div id="enc-result" style="display:none">
        <div class="alert ok">✅ 加密完成！</div>
        <button class="btn-primary" id="enc-dl">⬇ 下载加密文件</button>
      </div>
    </div>
  </div>
  <div id="panel-dec" class="panel" style="display:none">
    <div class="section">
      <div class="field"><label>选择加密文件（.enc）</label>
        <div class="drop-zone" id="dec-drop"><input type="file" id="dec-file"><div id="dec-file-info" class="drop-hint">📁 点击选择或拖放 .enc 文件</div></div>
      </div>
      <div id="dec-method-info" class="alert info" style="display:none"></div>
      <div id="dec-pw-sec" style="display:none">
        <div class="field"><label>密码</label>
          <div class="input-row"><input type="password" id="dec-password" placeholder="输入解密密码">
            <button class="btn-icon" id="dec-pwd-toggle">👁</button></div>
        </div>
      </div>
      <div id="dec-kp-sec" style="display:none">
        <div class="field"><label>发送方公钥</label>
          <div class="input-row"><input type="text" id="dec-spk" placeholder="粘贴发送方公钥（Base64）">
            <label class="btn-icon">📎<input type="file" id="dec-spk-file" accept=".public,.txt"></label></div>
        </div>
        <div class="field"><label>你的私钥</label>
          <div class="input-row"><input type="password" id="dec-rsk" placeholder="粘贴你的私钥（Base64）">
            <button class="btn-icon" id="dec-rsk-toggle">👁</button>
            <label class="btn-icon">📎<input type="file" id="dec-rsk-file" accept=".private,.txt"></label></div>
        </div>
      </div>
      <div id="dec-err" class="alert err" style="display:none"></div>
      <div id="dec-prog" style="display:none"><div class="pbar"><div id="dec-pfill" class="pfill"></div></div><div id="dec-ptxt" class="ptxt">解密中...</div></div>
      <div class="btn-row">
        <button class="btn-primary" id="dec-btn">🔓 开始解密</button>
        <button class="btn-ghost" id="dec-reset">重置</button>
      </div>
      <div id="dec-result" style="display:none">
        <div class="alert ok">✅ 解密完成！</div>
        <button class="btn-primary" id="dec-dl">⬇ 下载解密文件</button>
      </div>
    </div>
  </div>
  <div id="panel-keys" class="panel" style="display:none">
    <div class="section">
      <p class="muted">生成用于非对称加密的 X25519 密钥对。私钥请妥善保管，不要泄露给任何人。</p>
      <div class="btn-row" style="margin-top:16px"><button class="btn-primary" id="keys-gen">🎲 生成密钥对</button></div>
      <div id="keys-result" style="display:none">
        <div class="field" style="margin-top:16px"><label>公钥（可分享给对方）</label>
          <div class="input-row"><input type="text" id="keys-pub" readonly>
            <button class="btn-icon" id="kpub-copy">📋</button>
            <button class="btn-icon" id="kpub-dl">⬇</button></div>
        </div>
        <div class="field"><label>私钥（请勿泄露）</label>
          <div class="input-row"><input type="password" id="keys-priv">
            <button class="btn-icon" id="kpriv-toggle">👁</button>
            <button class="btn-icon" id="kpriv-copy">📋</button>
            <button class="btn-icon" id="kpriv-dl">⬇</button></div>
        </div>
        <div class="alert info" style="margin-top:8px">⚠️ 请立即备份私钥，关闭页面后无法找回。</div>
      </div>
    </div>
  </div>
  <div id="status-msg" class="msg">⏳ 正在加载加密库...</div>
</div>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f8fafc;padding:16px;color:#1e293b}
.wrap{max-width:700px;margin:0 auto}
.tabs{display:flex;border-bottom:2px solid #e2e8f0}
.tab{padding:10px 20px;border:none;background:none;font-size:.9rem;font-weight:600;color:#94a3b8;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .2s}
.tab.active{color:#1e293b;border-bottom-color:#3b82f6}
.tab:hover:not(.active){color:#475569}
.panel{background:#fff;border-radius:0 0 12px 12px;box-shadow:0 2px 12px rgba(0,0,0,.08);padding:24px}
.section{display:flex;flex-direction:column;gap:16px}
.field{display:flex;flex-direction:column;gap:6px}
label{font-size:.85rem;font-weight:600;color:#475569}
input[type=text],input[type=password]{flex:1;padding:9px 12px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:.9rem;outline:none;transition:border-color .2s;background:#f8fafc;min-width:0}
input:focus{border-color:#3b82f6;background:#fff}
input[readonly]{background:#f1f5f9;color:#334155;font-family:'Courier New',monospace;font-size:.82rem}
.input-row{display:flex;gap:6px;align-items:center}
.radio-group{display:flex;gap:20px}
.radio-label{display:flex;align-items:center;gap:6px;font-size:.9rem;color:#334155;cursor:pointer;font-weight:500}
.drop-zone{border:2px dashed #cbd5e1;border-radius:10px;padding:20px;text-align:center;cursor:pointer;transition:all .2s;background:#f8fafc;position:relative}
.drop-zone:hover,.drop-zone.drag-over{border-color:#3b82f6;background:#eff6ff}
.drop-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.drop-hint{font-size:.88rem;color:#64748b;pointer-events:none}
.file-sel{font-size:.88rem;color:#1e293b;font-weight:600;pointer-events:none}
.file-sz{font-size:.78rem;color:#94a3b8;pointer-events:none}
.btn-row{display:flex;gap:10px;flex-wrap:wrap}
button{padding:9px 18px;border:none;border-radius:8px;font-size:.9rem;font-weight:600;cursor:pointer;transition:all .15s}
.btn-primary{background:#3b82f6;color:#fff}
.btn-primary:hover{background:#2563eb}
.btn-ghost{background:#f1f5f9;color:#475569;border:1.5px solid #e2e8f0}
.btn-ghost:hover{background:#e2e8f0}
.btn-icon{background:#f1f5f9;border:1.5px solid #e2e8f0;border-radius:8px;padding:8px 10px;font-size:1rem;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;transition:background .15s;flex-shrink:0;position:relative;overflow:hidden}
.btn-icon:hover{background:#e2e8f0}
.btn-icon input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.alert{padding:10px 14px;border-radius:8px;font-size:.88rem;margin-top:4px}
.alert.err{background:#fef2f2;border:1px solid #fecaca;color:#991b1b}
.alert.ok{background:#f0fdf4;border:1px solid #bbf7d0;color:#166534}
.alert.info{background:#eff6ff;border:1px solid #bfdbfe;color:#1e40af}
.pbar{height:8px;background:#e2e8f0;border-radius:4px;overflow:hidden}
.pfill{height:100%;background:linear-gradient(90deg,#3b82f6,#6366f1);width:0%;transition:width .3s}
.ptxt{font-size:.82rem;color:#64748b;margin-top:4px;text-align:center}
.strength-wrap{display:flex;align-items:center;gap:10px;margin-top:4px}
.sbar{flex:1;height:6px;background:#e2e8f0;border-radius:3px;overflow:hidden}
.sfill{height:100%;border-radius:3px;transition:width .3s,background .3s}
.slabel{font-size:.78rem;font-weight:600;min-width:40px}
.muted{font-size:.85rem;color:#64748b;line-height:1.6}
.msg{font-size:.82rem;min-height:18px;color:#3b82f6;margin-top:8px;text-align:center}
</style>
<script type="module">
// 用 ES module 动态 import 加载 libsodium，这是浏览器里最可靠的方式
import sodiumModule from 'https://cdn.jsdelivr.net/npm/libsodium-wrappers@0.7.13/dist/modules/libsodium-wrappers.js';

const SIG_SYM  = 'zDKO6XYXioc'; // 11 bytes — hat.sh v2 symmetric
const SIG_ASYM = 'hTWKbfoikeg'; // 11 bytes — hat.sh v2 asymmetric
const CHUNK    = 64 * 1024 * 1024;
const ABYTES   = 17;
const MAX_SIZE = 1024 * 1024 * 1024;
const ENC      = new TextEncoder();
const DEC      = new TextDecoder();

let Na = null; // sodium instance
let encFile = null, decFile = null, encBuf = null, decBuf = null;

const $ = id => document.getElementById(id);
const show = id => $(id).style.display = 'block';
const hide = id => $(id).style.display = 'none';
const showErr = (id, msg) => { $(id).textContent = '❌ ' + msg; show(id); };
const setMsg = m => $('status-msg').textContent = m;

function fmtBytes(b) {
  if (b < 1024) return b + ' B';
  if (b < 1048576) return (b/1024).toFixed(1) + ' KB';
  if (b < 1073741824) return (b/1048576).toFixed(1) + ' MB';
  return (b/1073741824).toFixed(2) + ' GB';
}

function setFileInfo(infoId, f) {
  $(infoId).innerHTML = `<div class="file-sel">📄 ${f.name}</div><div class="file-sz">${fmtBytes(f.size)}</div>`;
}

function setProgress(prog, fill, txt, pct, text) {
  show(prog); $(fill).style.width = pct + '%'; $(txt).textContent = text;
}

function setupDrop(zoneId, fileInputId, infoId, onFile) {
  const zone = $(zoneId);
  const input = $(fileInputId);
  // The file input covers the zone via CSS position:absolute, so change fires naturally.
  // We also handle drag-and-drop explicitly.
  input.addEventListener('change', () => { if (input.files[0]) onFile(input.files[0]); });
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
  zone.addEventListener('drop', e => {
    e.preventDefault(); zone.classList.remove('drag-over');
    if (e.dataTransfer.files[0]) { input.files = e.dataTransfer.files; onFile(e.dataTransfer.files[0]); }
  });
}

function togglePwd(id) { const el = $(id); el.type = el.type === 'password' ? 'text' : 'password'; }

function loadKeyFile(inputEl, targetId) {
  const f = inputEl.files[0];
  if (!f || f.size > 1000000) return;
  const r = new FileReader();
  r.onload = e => { $(targetId).value = e.target.result.trim(); };
  r.readAsText(f);
}

function checkPwdStrength(pwd) {
  const wrap = $('enc-pwd-strength');
  if (!pwd) { wrap.style.display = 'none'; return; }
  wrap.style.display = 'flex';
  let s = 0;
  if (pwd.length >= 8) s++; if (pwd.length >= 12) s++; if (pwd.length >= 16) s++;
  if (/[A-Z]/.test(pwd)) s++; if (/[0-9]/.test(pwd)) s++; if (/[^A-Za-z0-9]/.test(pwd)) s++;
  const lvs = [{p:16,c:'#ef4444',t:'极弱'},{p:33,c:'#f97316',t:'弱'},{p:50,c:'#eab308',t:'一般'},{p:66,c:'#84cc16',t:'较强'},{p:83,c:'#22c55e',t:'强'},{p:100,c:'#10b981',t:'极强'}];
  const lv = lvs[Math.min(s,5)];
  $('enc-pwd-fill').style.cssText = `width:${lv.p}%;background:${lv.c}`;
  $('enc-pwd-label').textContent = lv.t; $('enc-pwd-label').style.color = lv.c;
}

// ── 加密 ──
async function encryptWithPassword(password) {
  const salt = Na.randombytes_buf(Na.crypto_pwhash_SALTBYTES);
  const key = Na.crypto_pwhash(Na.crypto_secretstream_xchacha20poly1305_KEYBYTES, password, salt,
    Na.crypto_pwhash_OPSLIMIT_INTERACTIVE, Na.crypto_pwhash_MEMLIMIT_INTERACTIVE, Na.crypto_pwhash_ALG_ARGON2ID13);
  const res = Na.crypto_secretstream_xchacha20poly1305_init_push(key);
  await runEncChunks([ENC.encode(SIG_SYM), salt, res.header], res.state);
}

async function encryptWithKeyPair(rpk, ssk) {
  const skB = Na.from_base64(ssk), pkB = Na.from_base64(rpk);
  if (skB.length !== Na.crypto_kx_SECRETKEYBYTES) { showErr('enc-err','私钥格式错误'); return; }
  if (pkB.length !== Na.crypto_kx_PUBLICKEYBYTES)  { showErr('enc-err','公钥格式错误'); return; }
  const myPk = Na.crypto_scalarmult_base(skB);
  if (Na.to_base64(myPk) === rpk) { showErr('enc-err','不能用自己的密钥对加密'); return; }
  const keys = Na.crypto_kx_client_session_keys(myPk, skB, pkB);
  const res = Na.crypto_secretstream_xchacha20poly1305_init_push(keys.sharedTx);
  await runEncChunks([ENC.encode(SIG_ASYM), res.header], res.state);
}

async function runEncChunks(headers, state) {
  const total = encFile.size; let idx = 0;
  const bufs = [...headers];
  setProgress('enc-prog','enc-pfill','enc-ptxt',0,'加密中...');
  const next = async () => {
    const end = Math.min(idx + CHUNK, total);
    const chunk = await encFile.slice(idx, end).arrayBuffer();
    const isLast = end >= total;
    const tag = isLast ? Na.crypto_secretstream_xchacha20poly1305_TAG_FINAL : Na.crypto_secretstream_xchacha20poly1305_TAG_MESSAGE;
    bufs.push(new Uint8Array(Na.crypto_secretstream_xchacha20poly1305_push(state, new Uint8Array(chunk), null, tag)));
    idx = end;
    setProgress('enc-prog','enc-pfill','enc-ptxt', Math.round(idx/total*100), `加密中... ${Math.round(idx/total*100)}%`);
    if (!isLast) { await new Promise(r=>setTimeout(r,0)); await next(); }
    else { encBuf = bufs; hide('enc-prog'); show('enc-result'); setMsg('加密完成'); }
  };
  await next();
}

// ── 解密 ──
async function decryptWithPassword(password) {
  const [saltBuf, hdrBuf] = await Promise.all([decFile.slice(11,27).arrayBuffer(), decFile.slice(27,51).arrayBuffer()]);
  const key = Na.crypto_pwhash(Na.crypto_secretstream_xchacha20poly1305_KEYBYTES, password,
    new Uint8Array(saltBuf), Na.crypto_pwhash_OPSLIMIT_INTERACTIVE, Na.crypto_pwhash_MEMLIMIT_INTERACTIVE, Na.crypto_pwhash_ALG_ARGON2ID13);
  const state = Na.crypto_secretstream_xchacha20poly1305_init_pull(new Uint8Array(hdrBuf), key);
  if (!state) { showErr('dec-err','密码错误或文件损坏'); return; }
  await runDecChunks(state, 51);
}

async function decryptWithKeyPair(spk, rsk) {
  const skB = Na.from_base64(rsk), pkB = Na.from_base64(spk);
  if (skB.length !== Na.crypto_kx_SECRETKEYBYTES) { showErr('dec-err','私钥格式错误'); return; }
  if (pkB.length !== Na.crypto_kx_PUBLICKEYBYTES)  { showErr('dec-err','公钥格式错误'); return; }
  const myPk = Na.crypto_scalarmult_base(skB);
  const keys = Na.crypto_kx_server_session_keys(myPk, skB, pkB);
  const hdr = new Uint8Array(await decFile.slice(11,35).arrayBuffer());
  const state = Na.crypto_secretstream_xchacha20poly1305_init_pull(hdr, keys.sharedRx);
  if (!state) { showErr('dec-err','密钥错误或文件损坏'); return; }
  await runDecChunks(state, 35);
}

async function runDecChunks(state, start) {
  const total = decFile.size; let idx = start;
  const bufs = [];
  setProgress('dec-prog','dec-pfill','dec-ptxt',0,'解密中...');
  const next = async () => {
    const end = Math.min(idx + CHUNK + ABYTES, total);
    const chunk = await decFile.slice(idx, end).arrayBuffer();
    const res = Na.crypto_secretstream_xchacha20poly1305_pull(state, new Uint8Array(chunk));
    if (!res) { showErr('dec-err','解密失败：密码/密钥错误或文件损坏'); hide('dec-prog'); return; }
    bufs.push(new Uint8Array(res.message));
    idx = end;
    const pct = Math.round((idx-start)/(total-start)*100);
    setProgress('dec-prog','dec-pfill','dec-ptxt', pct, `解密中... ${pct}%`);
    if (idx < total) { await new Promise(r=>setTimeout(r,0)); await next(); }
    else { decBuf = bufs; hide('dec-prog'); show('dec-result'); setMsg('解密完成'); }
  };
  await next();
}

function dlBlob(bufs, name) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob(bufs));
  a.download = name; a.click();
}

// ── 初始化 ──
document.addEventListener('DOMContentLoaded', async () => {
  // 加载 sodium
  try {
    await sodiumModule.ready;
    Na = sodiumModule;
    setMsg('✅ 加密库已就绪');
  } catch(e) {
    setMsg('❌ 加密库加载失败，请刷新页面');
    return;
  }

  // 标签页
  document.querySelectorAll('.tab').forEach(btn => {
    btn.addEventListener('click', () => {
      const name = btn.dataset.tab;
      document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === name));
      ['enc','dec','keys'].forEach(n => $(('panel-'+n)).style.display = n === name ? 'block' : 'none');
    });
  });

  // 文件拖放
  setupDrop('enc-drop','enc-file','enc-file-info', f => {
    if (f.size > MAX_SIZE) { showErr('enc-err','文件超过 1 GB 限制'); return; }
    encFile = f; setFileInfo('enc-file-info', f); hide('enc-err'); hide('enc-result');
  });
  setupDrop('dec-drop','dec-file','dec-file-info', f => {
    if (f.size > MAX_SIZE) { showErr('dec-err','文件超过 1 GB 限制'); return; }
    decFile = f; setFileInfo('dec-file-info', f);
    hide('dec-err'); hide('dec-result'); hide('dec-method-info'); hide('dec-pw-sec'); hide('dec-kp-sec');
    f.slice(0,11).arrayBuffer().then(buf => {
      const sig = DEC.decode(new Uint8Array(buf));
      if (sig === SIG_SYM)  { $('dec-method-info').textContent='🔑 检测到密码加密文件'; show('dec-method-info'); show('dec-pw-sec'); }
      else if (sig === SIG_ASYM) { $('dec-method-info').textContent='🔐 检测到公钥加密文件'; show('dec-method-info'); show('dec-kp-sec'); }
      else showErr('dec-err','无法识别的文件格式');
    });
  });

  // 加密方式切换
  document.querySelectorAll('input[name="enc-method"]').forEach(r => {
    r.addEventListener('change', () => {
      const v = document.querySelector('input[name="enc-method"]:checked').value;
      $('enc-pw-sec').style.display  = v === 'password' ? 'block' : 'none';
      $('enc-kp-sec').style.display  = v === 'keypair'  ? 'block' : 'none';
    });
  });

  // 密码强度
  $('enc-password').addEventListener('input', () => checkPwdStrength($('enc-password').value));

  // 显示/隐藏密码
  $('enc-pwd-toggle').addEventListener('click', () => togglePwd('enc-password'));
  $('enc-ssk-toggle').addEventListener('click', () => togglePwd('enc-ssk'));
  $('dec-pwd-toggle').addEventListener('click', () => togglePwd('dec-password'));
  $('dec-rsk-toggle').addEventListener('click', () => togglePwd('dec-rsk'));
  $('kpriv-toggle').addEventListener('click',   () => togglePwd('keys-priv'));

  // 随机密码
  $('enc-pwd-gen').addEventListener('click', () => {
    const pwd = Na.to_base64(Na.randombytes_buf(16), Na.base64_variants.URLSAFE_NO_PADDING);
    $('enc-password').value = pwd; $('enc-password').type = 'text';
    checkPwdStrength(pwd); setMsg('已生成随机密码');
  });

  // 从文件加载密钥
  $('enc-rpk-file').addEventListener('change', function(){ loadKeyFile(this,'enc-rpk'); });
  $('enc-ssk-file').addEventListener('change', function(){ loadKeyFile(this,'enc-ssk'); });
  $('dec-spk-file').addEventListener('change', function(){ loadKeyFile(this,'dec-spk'); });
  $('dec-rsk-file').addEventListener('change', function(){ loadKeyFile(this,'dec-rsk'); });

  // 加密按钮
  $('enc-btn').addEventListener('click', async () => {
    if (!encFile) { showErr('enc-err','请先选择文件'); return; }
    hide('enc-err'); hide('enc-result'); encBuf = null;
    const method = document.querySelector('input[name="enc-method"]:checked').value;
    try {
      if (method === 'password') {
        const pwd = $('enc-password').value;
        if (!pwd || pwd.length < 12) { showErr('enc-err','密码至少需要 12 位'); return; }
        await encryptWithPassword(pwd);
      } else {
        const rpk = $('enc-rpk').value.trim(), ssk = $('enc-ssk').value.trim();
        if (!rpk || !ssk) { showErr('enc-err','请填写接收方公钥和你的私钥'); return; }
        await encryptWithKeyPair(rpk, ssk);
      }
    } catch(e) { showErr('enc-err', e.message); }
  });

  $('enc-dl').addEventListener('click', () => { if (encBuf) dlBlob(encBuf, encFile.name+'.enc'); });
  $('enc-reset').addEventListener('click', () => {
    encFile = null; encBuf = null;
    $('enc-file-info').innerHTML = '📁 点击选择或拖放文件（最大 1 GB）';
    $('enc-password').value = ''; $('enc-rpk').value = ''; $('enc-ssk').value = '';
    $('enc-pwd-strength').style.display = 'none';
    $('enc-file').value = '';
    hide('enc-err'); hide('enc-result'); hide('enc-prog');
  });

  // 解密按钮
  $('dec-btn').addEventListener('click', async () => {
    if (!decFile) { showErr('dec-err','请先选择文件'); return; }
    hide('dec-err'); hide('dec-result'); decBuf = null;
    const sig = DEC.decode(new Uint8Array(await decFile.slice(0,11).arrayBuffer()));
    try {
      if (sig === SIG_SYM) {
        const pwd = $('dec-password').value;
        if (!pwd) { showErr('dec-err','请输入密码'); return; }
        await decryptWithPassword(pwd);
      } else if (sig === SIG_ASYM) {
        const spk = $('dec-spk').value.trim(), rsk = $('dec-rsk').value.trim();
        if (!spk || !rsk) { showErr('dec-err','请填写发送方公钥和你的私钥'); return; }
        await decryptWithKeyPair(spk, rsk);
      } else { showErr('dec-err','无法识别的文件格式'); }
    } catch(e) { showErr('dec-err', e.message); }
  });

  $('dec-dl').addEventListener('click', () => {
    if (decBuf) { const n = decFile.name.endsWith('.enc') ? decFile.name.slice(0,-4) : decFile.name+'.dec'; dlBlob(decBuf, n); }
  });
  $('dec-reset').addEventListener('click', () => {
    decFile = null; decBuf = null;
    $('dec-file-info').innerHTML = '📁 点击选择或拖放 .enc 文件';
    $('dec-password').value = ''; $('dec-spk').value = ''; $('dec-rsk').value = '';
    $('dec-file').value = '';
    hide('dec-err'); hide('dec-result'); hide('dec-prog'); hide('dec-method-info'); hide('dec-pw-sec'); hide('dec-kp-sec');
  });

  // 生成密钥对
  $('keys-gen').addEventListener('click', () => {
    const kp = Na.crypto_kx_keypair();
    $('keys-pub').value  = Na.to_base64(kp.publicKey);
    $('keys-priv').value = Na.to_base64(kp.privateKey);
    $('keys-priv').type  = 'password';
    show('keys-result'); setMsg('密钥对已生成');
  });

  $('kpub-copy').addEventListener('click',  () => navigator.clipboard.writeText($('keys-pub').value).then(()=>setMsg('已复制公钥')));
  $('kpriv-copy').addEventListener('click', () => navigator.clipboard.writeText($('keys-priv').value).then(()=>setMsg('已复制私钥')));
  $('kpub-dl').addEventListener('click',  () => dlBlob([$('keys-pub').value],  'key.public'));
  $('kpriv-dl').addEventListener('click', () => dlBlob([$('keys-priv').value], 'key.private'));
});
</script>
</body>
</html>
