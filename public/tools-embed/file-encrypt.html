<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>文件加密工具</title>
<style>
html,body{background:transparent!important;min-height:unset!important}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f8fafc;padding:16px;color:#1e293b}
.wrap{max-width:700px;margin:0 auto}
.tabs{display:flex;border-bottom:2px solid #e2e8f0}
.tab{padding:10px 20px;border:none;background:none;font-size:.9rem;font-weight:600;color:#94a3b8;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .2s}
.tab.active{color:#1e293b;border-bottom-color:#3b82f6}
.tab:hover:not(.active){color:#475569}
.panel{background:#fff;border-radius:0 0 12px 12px;box-shadow:0 2px 12px rgba(0,0,0,.08);padding:24px}
.section{display:flex;flex-direction:column;gap:16px}
.field{display:flex;flex-direction:column;gap:6px}
.field>label{font-size:.85rem;font-weight:600;color:#475569}
input[type=text],input[type=password]{flex:1;padding:9px 12px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:.9rem;outline:none;transition:border-color .2s;background:#f8fafc;min-width:0}
input[type=text]:focus,input[type=password]:focus{border-color:#3b82f6;background:#fff}
input[readonly]{background:#f1f5f9;color:#334155;font-family:'Courier New',monospace;font-size:.82rem}
.irow{display:flex;gap:6px;align-items:center}
.rgroup{display:flex;gap:20px}
.rlabel{display:flex;align-items:center;gap:6px;font-size:.9rem;color:#334155;cursor:pointer;font-weight:500}
.drop{border:2px dashed #cbd5e1;border-radius:10px;padding:20px;text-align:center;cursor:pointer;transition:all .2s;background:#f8fafc;position:relative;overflow:hidden}
.drop:hover,.drop.over{border-color:#3b82f6;background:#eff6ff}
.drop input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.dhint{font-size:.88rem;color:#64748b;pointer-events:none}
.fsel{font-size:.88rem;color:#1e293b;font-weight:600;pointer-events:none}
.fsz{font-size:.78rem;color:#94a3b8;pointer-events:none}
.brow{display:flex;gap:10px;flex-wrap:wrap}
button{padding:9px 18px;border:none;border-radius:8px;font-size:.9rem;font-weight:600;cursor:pointer;transition:all .15s}
.bp{background:#3b82f6;color:#fff}.bp:hover{background:#2563eb}
.bg{background:#f1f5f9;color:#475569;border:1.5px solid #e2e8f0}.bg:hover{background:#e2e8f0}
.bi{background:#f1f5f9;border:1.5px solid #e2e8f0;border-radius:8px;padding:8px 10px;font-size:1rem;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;position:relative;overflow:hidden}
.bi:hover{background:#e2e8f0}
.bi input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.ae{padding:10px 14px;border-radius:8px;font-size:.88rem}
.ae.err{background:#fef2f2;border:1px solid #fecaca;color:#991b1b}
.ae.ok{background:#f0fdf4;border:1px solid #bbf7d0;color:#166534}
.ae.info{background:#eff6ff;border:1px solid #bfdbfe;color:#1e40af}
.pbar{height:8px;background:#e2e8f0;border-radius:4px;overflow:hidden}
.pfill{height:100%;background:linear-gradient(90deg,#3b82f6,#6366f1);width:0%;transition:width .3s}
.ptxt{font-size:.82rem;color:#64748b;margin-top:4px;text-align:center}
.swrap{display:flex;align-items:center;gap:10px;margin-top:4px}
.sbar{flex:1;height:6px;background:#e2e8f0;border-radius:3px;overflow:hidden}
.sfill{height:100%;border-radius:3px;transition:width .3s,background .3s}
.slbl{font-size:.78rem;font-weight:600;min-width:40px}
.muted{font-size:.85rem;color:#64748b;line-height:1.6}
#msg{font-size:.82rem;min-height:18px;color:#64748b;margin-top:8px;text-align:center}
</style>
</head>
<body>
<div class="wrap">
  <div class="tabs">
    <button class="tab active" data-tab="enc">🔒 加密</button>
    <button class="tab" data-tab="dec">🔓 解密</button>
    <button class="tab" data-tab="keys">🔑 生成密钥对</button>
  </div>

  <!-- 加密 -->
  <div id="panel-enc" class="panel">
    <div class="section">
      <div class="field"><label>选择文件</label>
        <div class="drop" id="enc-drop">
          <input type="file" id="enc-file">
          <div id="enc-finfo" class="dhint">📁 点击选择或拖放文件</div>
        </div>
      </div>
      <div class="field"><label>加密方式</label>
        <div class="rgroup">
          <label class="rlabel"><input type="radio" name="enc-m" value="pw" checked> 密码加密</label>
          <label class="rlabel"><input type="radio" name="enc-m" value="kp"> 公钥加密（ECDH）</label>
        </div>
      </div>
      <div id="enc-pw-sec">
        <div class="field"><label>密码（至少 8 位）</label>
          <div class="irow">
            <input type="password" id="enc-pwd" placeholder="输入加密密码">
            <button class="bi" id="enc-pt">👁</button>
            <button class="bi" id="enc-pg" title="随机生成">🎲</button>
          </div>
          <div id="enc-ps" class="swrap" style="display:none">
            <div class="sbar"><div id="enc-pf" class="sfill"></div></div>
            <span id="enc-pl" class="slbl"></span>
          </div>
        </div>
      </div>
      <div id="enc-kp-sec" style="display:none">
        <div class="field"><label>接收方公钥（Base64 导出的 ECDH P-256 公钥）</label>
          <div class="irow">
            <input type="text" id="enc-rpk" placeholder="粘贴接收方公钥">
            <label class="bi" title="从文件加载">📎<input type="file" id="enc-rpkf" accept=".pub,.txt"></label>
          </div>
        </div>
      </div>
      <div id="enc-err" class="ae err" style="display:none"></div>
      <div id="enc-prog" style="display:none">
        <div class="pbar"><div id="enc-pf2" class="pfill"></div></div>
        <div id="enc-pt2" class="ptxt"></div>
      </div>
      <div class="brow">
        <button class="bp" id="enc-btn">🔒 开始加密</button>
        <button class="bg" id="enc-rst">重置</button>
      </div>
      <div id="enc-res" style="display:none">
        <div class="ae ok">✅ 加密完成！</div>
        <button class="bp" id="enc-dl" style="margin-top:10px">⬇ 下载加密文件</button>
      </div>
    </div>
  </div>

  <!-- 解密 -->
  <div id="panel-dec" class="panel" style="display:none">
    <div class="section">
      <div class="field"><label>选择加密文件（.enc）</label>
        <div class="drop" id="dec-drop">
          <input type="file" id="dec-file">
          <div id="dec-finfo" class="dhint">📁 点击选择或拖放 .enc 文件</div>
        </div>
      </div>
      <div id="dec-minfo" class="ae info" style="display:none"></div>
      <div id="dec-pw-sec" style="display:none">
        <div class="field"><label>密码</label>
          <div class="irow">
            <input type="password" id="dec-pwd" placeholder="输入解密密码">
            <button class="bi" id="dec-pt">👁</button>
          </div>
        </div>
      </div>
      <div id="dec-kp-sec" style="display:none">
        <div class="field"><label>你的私钥（Base64）</label>
          <div class="irow">
            <input type="password" id="dec-rsk" placeholder="粘贴你的私钥">
            <button class="bi" id="dec-rt">👁</button>
            <label class="bi">📎<input type="file" id="dec-rskf" accept=".priv,.txt"></label>
          </div>
        </div>
      </div>
      <div id="dec-err" class="ae err" style="display:none"></div>
      <div id="dec-prog" style="display:none">
        <div class="pbar"><div id="dec-pf" class="pfill"></div></div>
        <div id="dec-pt2" class="ptxt"></div>
      </div>
      <div class="brow">
        <button class="bp" id="dec-btn">🔓 开始解密</button>
        <button class="bg" id="dec-rst">重置</button>
      </div>
      <div id="dec-res" style="display:none">
        <div class="ae ok">✅ 解密完成！</div>
        <button class="bp" id="dec-dl" style="margin-top:10px">⬇ 下载解密文件</button>
      </div>
    </div>
  </div>

  <!-- 密钥对 -->
  <div id="panel-keys" class="panel" style="display:none">
    <div class="section">
      <p class="muted">生成用于非对称加密的 ECDH P-256 密钥对。私钥请妥善保管，不要泄露给任何人。</p>
      <div class="brow" style="margin-top:8px">
        <button class="bp" id="keys-gen">🎲 生成密钥对</button>
      </div>
      <div id="keys-res" style="display:none">
        <div class="field" style="margin-top:8px"><label>公钥（分享给加密方）</label>
          <div class="irow">
            <input type="text" id="kpub" readonly>
            <button class="bi" id="kpub-cp">📋</button>
            <button class="bi" id="kpub-dl">⬇</button>
          </div>
        </div>
        <div class="field"><label>私钥（请勿泄露）</label>
          <div class="irow">
            <input type="password" id="kpriv">
            <button class="bi" id="kpriv-t">👁</button>
            <button class="bi" id="kpriv-cp">📋</button>
            <button class="bi" id="kpriv-dl">⬇</button>
          </div>
        </div>
        <div class="ae info" style="margin-top:8px">⚠️ 请立即备份私钥，关闭页面后无法找回。</div>
      </div>
    </div>
  </div>

  <div id="msg"></div>
</div>

<script>
// ── height reporting ──
(function(){
  function rh(){var h=document.documentElement.scrollHeight||document.body.scrollHeight;window.parent.postMessage({type:'tool-height',height:h},'*')}
  window.addEventListener('load',rh);window.addEventListener('resize',rh);
  var mo=new MutationObserver(rh);
  document.addEventListener('DOMContentLoaded',function(){mo.observe(document.body,{childList:true,subtree:true,attributes:true})});
})();

// ── 文件格式 ──
// 密码加密: [4 magic "FENC"][1 version=1][1 mode=0][16 salt][12 nonce][...AES-GCM chunks]
// 公钥加密: [4 magic "FENC"][1 version=1][1 mode=1][65 ephemeral pubkey][12 nonce][...AES-GCM chunks]
// 每个 chunk: [4 chunk_len_BE][encrypted_data(chunk+16 tag)]
// 最后一个 chunk 标记: chunk_len 最高位置1

var MAGIC   = new Uint8Array([70,69,78,67]); // "FENC"
var VERSION = 1;
var CHUNK   = 1024*1024; // 1 MB per chunk (smaller = more responsive UI)
var C = window.crypto;

var $ = function(id){return document.getElementById(id)};
var show = function(id){$(id).style.display='block'};
var hide = function(id){$(id).style.display='none'};
var showErr = function(id,msg){$(id).textContent='❌ '+msg;show(id)};
var setMsg = function(m){$('msg').textContent=m};

var encFile=null, decFile=null, encBuf=null, decBuf=null;

function fmtBytes(b){
  if(b<1024)return b+' B';
  if(b<1048576)return (b/1024).toFixed(1)+' KB';
  if(b<1073741824)return (b/1048576).toFixed(1)+' MB';
  return (b/1073741824).toFixed(2)+' GB';
}
function setFInfo(id,f){$(id).innerHTML='<div class="fsel">📄 '+f.name+'</div><div class="fsz">'+fmtBytes(f.size)+'</div>'}
function setProg(pid,fid,tid,pct,txt){show(pid);$(fid).style.width=pct+'%';$(tid).textContent=txt}
function togglePwd(id){var e=$(id);e.type=e.type==='password'?'text':'password'}
function loadKeyFile(inp,tid){
  var f=inp.files[0];if(!f||f.size>100000)return;
  var r=new FileReader();r.onload=function(e){$(tid).value=e.target.result.trim()};r.readAsText(f);
}
function dlBlob(bufs,name){
  var a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob(Array.isArray(bufs)?bufs:[bufs]));
  a.download=name;a.click();
}
function b64enc(buf){return btoa(String.fromCharCode.apply(null,new Uint8Array(buf)))}
function b64dec(s){var b=atob(s);var u=new Uint8Array(b.length);for(var i=0;i<b.length;i++)u[i]=b.charCodeAt(i);return u.buffer}
function u32be(n){return new Uint8Array([(n>>>24)&0xff,(n>>>16)&0xff,(n>>>8)&0xff,n&0xff])}
function readU32be(arr,off){return ((arr[off]<<24)|(arr[off+1]<<16)|(arr[off+2]<<8)|arr[off+3])>>>0}

// ── 密钥派生 (PBKDF2) ──
async function deriveKey(password, salt) {
  var enc = new TextEncoder();
  var keyMat = await C.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
  return C.subtle.deriveKey(
    {name:'PBKDF2', salt:salt, iterations:200000, hash:'SHA-256'},
    keyMat, {name:'AES-GCM', length:256}, false, ['encrypt','decrypt']
  );
}

// ── 密码强度 ──
function checkPwd(pwd){
  var w=$('enc-ps');
  if(!pwd){w.style.display='none';return}
  w.style.display='flex';
  var s=0;
  if(pwd.length>=8)s++;if(pwd.length>=12)s++;if(pwd.length>=16)s++;
  if(/[A-Z]/.test(pwd))s++;if(/[0-9]/.test(pwd))s++;if(/[^A-Za-z0-9]/.test(pwd))s++;
  var lvs=[{p:16,c:'#ef4444',t:'极弱'},{p:33,c:'#f97316',t:'弱'},{p:50,c:'#eab308',t:'一般'},{p:66,c:'#84cc16',t:'较强'},{p:83,c:'#22c55e',t:'强'},{p:100,c:'#10b981',t:'极强'}];
  var lv=lvs[Math.min(s,5)];
  $('enc-pf').style.cssText='width:'+lv.p+'%;background:'+lv.c;
  $('enc-pl').textContent=lv.t;$('enc-pl').style.color=lv.c;
}

// ── 加密核心 ──
async function encryptFile(file, key, headerBytes) {
  var total = file.size, idx = 0, chunks = [headerBytes];
  var nonce = C.getRandomValues(new Uint8Array(12));
  chunks.push(nonce);

  while (idx < total) {
    var end = Math.min(idx + CHUNK, total);
    var plain = await file.slice(idx, end).arrayBuffer();
    var isLast = end >= total;
    // increment nonce for each chunk (counter mode)
    var ct = await C.subtle.encrypt({name:'AES-GCM', iv:nonce}, key, plain);
    var lenFlag = ct.byteLength | (isLast ? 0x80000000 : 0);
    chunks.push(u32be(lenFlag));
    chunks.push(new Uint8Array(ct));
    idx = end;
    // increment nonce
    for (var i = 11; i >= 0; i--) { if (++nonce[i] !== 0) break; }
    var pct = Math.round(idx/total*100);
    setProg('enc-prog','enc-pf2','enc-pt2', pct, '加密中... '+pct+'%');
    await new Promise(function(r){setTimeout(r,0)});
  }
  return chunks;
}

// ── 解密核心 ──
async function decryptFile(file, key, dataOffset) {
  var buf = await file.arrayBuffer();
  var arr = new Uint8Array(buf);
  var nonce = arr.slice(dataOffset, dataOffset+12).slice(); // copy
  var pos = dataOffset + 12;
  var total = arr.length;
  var plains = [];

  while (pos < total) {
    var lenFlag = readU32be(arr, pos); pos += 4;
    var isLast = !!(lenFlag & 0x80000000);
    var ctLen = lenFlag & 0x7fffffff;
    var ct = arr.slice(pos, pos+ctLen); pos += ctLen;
    var plain = await C.subtle.decrypt({name:'AES-GCM', iv:nonce}, key, ct);
    plains.push(new Uint8Array(plain));
    var pct = Math.round(pos/total*100);
    setProg('dec-prog','dec-pf','dec-pt2', pct, '解密中... '+pct+'%');
    await new Promise(function(r){setTimeout(r,0)});
    if (isLast) break;
    for (var i = 11; i >= 0; i--) { if (++nonce[i] !== 0) break; }
  }
  return plains;
}

// ── 密码加密 ──
async function encWithPwd(file, password) {
  var salt = C.getRandomValues(new Uint8Array(16));
  var key = await deriveKey(password, salt);
  // header: magic(4) + version(1) + mode(1) + salt(16) = 22 bytes
  var header = new Uint8Array(22);
  header.set(MAGIC, 0);
  header[4] = VERSION;
  header[5] = 0; // mode=password
  header.set(salt, 6);
  return encryptFile(file, key, header);
}

// ── 公钥加密 ──
async function encWithKP(file, recipientPubKeyB64) {
  // 生成临时 ECDH 密钥对
  var ephKP = await C.subtle.generateKey({name:'ECDH',namedCurve:'P-256'}, true, ['deriveKey']);
  // 导入接收方公钥
  var rpkRaw;
  try { rpkRaw = b64dec(recipientPubKeyB64); } catch(e) { throw new Error('公钥格式错误'); }
  var rpk = await C.subtle.importKey('raw', rpkRaw, {name:'ECDH',namedCurve:'P-256'}, false, []);
  // ECDH 派生共享密钥
  var sharedKey = await C.subtle.deriveKey(
    {name:'ECDH', public:rpk}, ephKP.privateKey,
    {name:'AES-GCM', length:256}, false, ['encrypt','decrypt']
  );
  // 导出临时公钥 (uncompressed, 65 bytes)
  var ephPubRaw = await C.subtle.exportKey('raw', ephKP.publicKey);
  // header: magic(4) + version(1) + mode(1) + ephPub(65) = 71 bytes
  var header = new Uint8Array(71);
  header.set(MAGIC, 0);
  header[4] = VERSION;
  header[5] = 1; // mode=keypair
  header.set(new Uint8Array(ephPubRaw), 6);
  return encryptFile(file, sharedKey, header);
}

// ── 密码解密 ──
async function decWithPwd(file, password) {
  var saltBuf = await file.slice(6, 22).arrayBuffer();
  var key = await deriveKey(password, saltBuf);
  // dataOffset = 22 (header)
  return decryptFile(file, key, 22);
}

// ── 公钥解密 ──
async function decWithKP(file, privKeyB64) {
  var ephPubRaw = await file.slice(6, 71).arrayBuffer();
  var privRaw;
  try { privRaw = b64dec(privKeyB64); } catch(e) { throw new Error('私钥格式错误'); }
  var privKey = await C.subtle.importKey('pkcs8', privRaw, {name:'ECDH',namedCurve:'P-256'}, false, ['deriveKey']);
  var ephPub  = await C.subtle.importKey('raw', ephPubRaw, {name:'ECDH',namedCurve:'P-256'}, false, []);
  var sharedKey = await C.subtle.deriveKey(
    {name:'ECDH', public:ephPub}, privKey,
    {name:'AES-GCM', length:256}, false, ['encrypt','decrypt']
  );
  // dataOffset = 71 (header)
  return decryptFile(file, sharedKey, 71);
}

// ── 检测文件头 ──
async function detectFile(file) {
  var buf = await file.slice(0, 6).arrayBuffer();
  var arr = new Uint8Array(buf);
  if (arr[0]!==70||arr[1]!==69||arr[2]!==78||arr[3]!==67) return null;
  if (arr[4] !== VERSION) return null;
  return arr[5]; // 0=password, 1=keypair
}

// ── DOM 初始化 ──
document.addEventListener('DOMContentLoaded', function() {

  // 标签页
  document.querySelectorAll('.tab').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var name = btn.dataset.tab;
      document.querySelectorAll('.tab').forEach(function(t){t.classList.toggle('active',t.dataset.tab===name)});
      ['enc','dec','keys'].forEach(function(n){$('panel-'+n).style.display=n===name?'block':'none'});
    });
  });

  // 文件拖放
  function setupDrop(zid, fid, onFile) {
    var zone=$(zid), inp=$(fid);
    inp.addEventListener('change', function(){if(inp.files[0])onFile(inp.files[0])});
    zone.addEventListener('dragover', function(e){e.preventDefault();zone.classList.add('over')});
    zone.addEventListener('dragleave', function(){zone.classList.remove('over')});
    zone.addEventListener('drop', function(e){
      e.preventDefault();zone.classList.remove('over');
      if(e.dataTransfer.files[0])onFile(e.dataTransfer.files[0]);
    });
  }

  setupDrop('enc-drop','enc-file', function(f){
    encFile=f; setFInfo('enc-finfo',f); hide('enc-err'); hide('enc-res');
  });

  setupDrop('dec-drop','dec-file', function(f){
    decFile=f; setFInfo('dec-finfo',f);
    hide('dec-err');hide('dec-res');hide('dec-minfo');hide('dec-pw-sec');hide('dec-kp-sec');
    detectFile(f).then(function(mode){
      if(mode===null){showErr('dec-err','无法识别的文件格式，请确认是本工具加密的文件');return}
      if(mode===0){$('dec-minfo').textContent='🔑 密码加密文件';show('dec-minfo');show('dec-pw-sec')}
      else{$('dec-minfo').textContent='🔐 公钥加密文件';show('dec-minfo');show('dec-kp-sec')}
    });
  });

  // 加密方式切换
  document.querySelectorAll('input[name="enc-m"]').forEach(function(r){
    r.addEventListener('change', function(){
      var v=document.querySelector('input[name="enc-m"]:checked').value;
      $('enc-pw-sec').style.display=v==='pw'?'block':'none';
      $('enc-kp-sec').style.display=v==='kp'?'block':'none';
    });
  });

  // 密码强度
  $('enc-pwd').addEventListener('input', function(){checkPwd(this.value)});

  // 显示/隐藏
  $('enc-pt').addEventListener('click', function(){togglePwd('enc-pwd')});
  $('dec-pt').addEventListener('click', function(){togglePwd('dec-pwd')});
  $('dec-rt').addEventListener('click', function(){togglePwd('dec-rsk')});
  $('kpriv-t').addEventListener('click', function(){togglePwd('kpriv')});

  // 随机密码
  $('enc-pg').addEventListener('click', function(){
    var arr = C.getRandomValues(new Uint8Array(16));
    var pwd = b64enc(arr.buffer).replace(/[+/=]/g,'').slice(0,20);
    $('enc-pwd').value=pwd; $('enc-pwd').type='text'; checkPwd(pwd); setMsg('已生成随机密码');
  });

  // 加载密钥文件
  $('enc-rpkf').addEventListener('change', function(){loadKeyFile(this,'enc-rpk')});
  $('dec-rskf').addEventListener('change', function(){loadKeyFile(this,'dec-rsk')});

  // 加密按钮
  $('enc-btn').addEventListener('click', async function(){
    if(!encFile){showErr('enc-err','请先选择文件');return}
    hide('enc-err');hide('enc-res');encBuf=null;
    var method=document.querySelector('input[name="enc-m"]:checked').value;
    try{
      if(method==='pw'){
        var pwd=$('enc-pwd').value;
        if(!pwd||pwd.length<8){showErr('enc-err','密码至少需要 8 位');return}
        encBuf=await encWithPwd(encFile,pwd);
      }else{
        var rpk=$('enc-rpk').value.trim();
        if(!rpk){showErr('enc-err','请填写接收方公钥');return}
        encBuf=await encWithKP(encFile,rpk);
      }
      hide('enc-prog');show('enc-res');setMsg('加密完成');
    }catch(e){hide('enc-prog');showErr('enc-err',e.message)}
  });

  $('enc-dl').addEventListener('click', function(){
    if(encBuf)dlBlob(encBuf, encFile.name+'.enc');
  });

  $('enc-rst').addEventListener('click', function(){
    encFile=null;encBuf=null;
    $('enc-finfo').innerHTML='📁 点击选择或拖放文件';
    $('enc-pwd').value='';$('enc-rpk').value='';$('enc-file').value='';
    $('enc-ps').style.display='none';
    hide('enc-err');hide('enc-res');hide('enc-prog');
  });

  // 解密按钮
  $('dec-btn').addEventListener('click', async function(){
    if(!decFile){showErr('dec-err','请先选择文件');return}
    hide('dec-err');hide('dec-res');decBuf=null;
    var mode=await detectFile(decFile);
    if(mode===null){showErr('dec-err','无法识别的文件格式');return}
    try{
      if(mode===0){
        var pwd=$('dec-pwd').value;
        if(!pwd){showErr('dec-err','请输入密码');return}
        decBuf=await decWithPwd(decFile,pwd);
      }else{
        var rsk=$('dec-rsk').value.trim();
        if(!rsk){showErr('dec-err','请填写你的私钥');return}
        decBuf=await decWithKP(decFile,rsk);
      }
      hide('dec-prog');show('dec-res');setMsg('解密完成');
    }catch(e){hide('dec-prog');showErr('dec-err','解密失败：密码/密钥错误或文件损坏')}
  });

  $('dec-dl').addEventListener('click', function(){
    if(decBuf){
      var n=decFile.name.endsWith('.enc')?decFile.name.slice(0,-4):decFile.name+'.dec';
      dlBlob(decBuf,n);
    }
  });

  $('dec-rst').addEventListener('click', function(){
    decFile=null;decBuf=null;
    $('dec-finfo').innerHTML='📁 点击选择或拖放 .enc 文件';
    $('dec-pwd').value='';$('dec-rsk').value='';$('dec-file').value='';
    hide('dec-err');hide('dec-res');hide('dec-prog');hide('dec-minfo');hide('dec-pw-sec');hide('dec-kp-sec');
  });

  // 生成密钥对
  $('keys-gen').addEventListener('click', async function(){
    var kp = await C.subtle.generateKey({name:'ECDH',namedCurve:'P-256'}, true, ['deriveKey']);
    var pubRaw  = await C.subtle.exportKey('raw',   kp.publicKey);
    var privPkcs = await C.subtle.exportKey('pkcs8', kp.privateKey);
    $('kpub').value  = b64enc(pubRaw);
    $('kpriv').value = b64enc(privPkcs);
    $('kpriv').type  = 'password';
    show('keys-res'); setMsg('密钥对已生成');
  });

  $('kpub-cp').addEventListener('click',  function(){navigator.clipboard.writeText($('kpub').value).then(function(){setMsg('已复制公钥')})});
  $('kpriv-cp').addEventListener('click', function(){navigator.clipboard.writeText($('kpriv').value).then(function(){setMsg('已复制私钥')})});
  $('kpub-dl').addEventListener('click',  function(){dlBlob([$('kpub').value],  'key.pub')});
  $('kpriv-dl').addEventListener('click', function(){dlBlob([$('kpriv').value], 'key.priv')});

  setMsg('✅ 就绪');
});
</script>
</body>
</html>
