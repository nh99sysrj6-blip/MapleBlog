<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <link rel="icon" href="../../favicon.svg">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片 Base64 互转</title>
    <link rel="canonical" href="https://www.htmls.dev/tools/image-to-base64/app.html">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .mode-toggle {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
        }

        .mode-btn {
            padding: 12px 30px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s;
        }

        .mode-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .mode-btn.active {
            background: rgba(255, 255, 255, 0.95);
            color: #ff9a9e;
            border-color: rgba(255, 255, 255, 0.95);
            box-shadow: 0 5px 15px rgba(255, 154, 158, 0.4);
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .upload-area {
            border: 3px dashed #e0e0e0;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: #f8f9fa;
        }

        .upload-area:hover,
        .upload-area.drag-over {
            border-color: #ff9a9e;
            background: #fff0f1;
        }

        .upload-icon {
            font-size: 64px;
            margin-bottom: 15px;
        }

        .upload-text {
            color: #666;
            font-size: 1.1rem;
        }

        .upload-hint {
            color: #999;
            font-size: 0.9rem;
            margin-top: 10px;
        }

        .file-input {
            display: none;
        }

        .preview-section {
            margin-top: 30px;
            display: none;
        }

        .preview-section.active {
            display: block;
        }

        .image-preview {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .preview-img {
            max-width: 100%;
            max-height: 400px;
            border-radius: 8px;
            display: block;
            margin: 0 auto;
        }

        .image-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .info-item {
            background: white;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }

        .info-label {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 5px;
        }

        .info-value {
            color: #333;
            font-weight: 600;
            font-size: 1.1rem;
        }

        .output-section {
            margin-top: 20px;
        }

        .output-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .output-header h3 {
            color: #333;
            font-size: 1.2rem;
        }

        .output-actions {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(255, 154, 158, 0.4);
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-secondary:hover {
            background: #5a6268;
        }

        .output-textarea {
            width: 100%;
            min-height: 200px;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            resize: vertical;
        }

        .output-textarea:focus {
            outline: none;
            border-color: #ff9a9e;
        }

        .input-section {
            display: none;
        }

        .input-section.active {
            display: block;
        }

        .base64-input-section {
            margin-top: 30px;
        }

        .base64-input-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .base64-input-header h3 {
            color: #333;
            font-size: 1.2rem;
        }

        .base64-textarea {
            width: 100%;
            min-height: 200px;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            resize: vertical;
        }

        .base64-textarea:focus {
            outline: none;
            border-color: #ff9a9e;
        }

        .base64-preview-section {
            margin-top: 20px;
            display: none;
        }

        .base64-preview-section.active {
            display: block;
        }

        .error-message {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            border-left: 4px solid #c33;
        }

        .format-options {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
        }

        .format-option {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .format-option input[type="radio"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .format-option label {
            cursor: pointer;
            color: #555;
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 1.8rem;
            }

            .output-actions {
                flex-direction: column;
            }
        }
    
        .tool-doc-link,
        .tool-home-link {
            position: fixed;
            top: 16px;
            padding: 6px 12px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 600;
            color: #0f172a;
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(15, 23, 42, 0.12);
            text-decoration: none;
            letter-spacing: 0.02em;
            z-index: 9999;
            box-shadow: 0 6px 16px rgba(15, 23, 42, 0.08);
            transition: background 0.2s ease, border-color 0.2s ease, transform 0.2s ease;
        }

        .tool-doc-link {
            right: 16px;
        }

        .tool-home-link {
            right: 74px;
        }

        .tool-doc-link:hover,
        .tool-home-link:hover {
            background: rgba(255, 255, 255, 1);
            border-color: rgba(15, 23, 42, 0.2);
            transform: translateY(-1px);
        }
    </style>
  <style>
    html, body { background: transparent !important; min-height: unset !important; }
  </style>
  <script>
    function reportHeight() {
      var h = document.documentElement.scrollHeight || document.body.scrollHeight;
      window.parent.postMessage({ type: 'tool-height', height: h }, '*');
    }
    window.addEventListener('load', reportHeight);
    window.addEventListener('resize', reportHeight);
    var mo = new MutationObserver(reportHeight);
    document.addEventListener('DOMContentLoaded', function() {
      mo.observe(document.body, { childList: true, subtree: true, attributes: true });
    });
  </script></head>
<body>
    <div class="container">
        <div class="header">
            <h1>图片 Base64 互转</h1>
            <p>图片与 Base64 编码字符串之间的双向转换</p>
        </div>

        <div class="mode-toggle">
            <button class="mode-btn active" data-mode="image-to-base64" onclick="setMode('image-to-base64')">图片转 Base64</button>
            <button class="mode-btn" data-mode="base64-to-image" onclick="setMode('base64-to-image')">Base64 转图片</button>
        </div>

        <div class="card">
            <!-- 图片转Base64模式 -->
            <div class="input-section active" id="image-to-base64-section">
                <div class="upload-area" id="upload-area" onclick="document.getElementById('file-input').click()">
                    <div class="upload-icon">📷</div>
                    <div class="upload-text">点击上传或拖拽图片到此处</div>
                    <div class="upload-hint">支持 JPG、PNG、GIF、WebP 等格式</div>
                </div>
                <input type="file" id="file-input" class="file-input" accept="image/*" onchange="handleFile(this.files[0])">

                <div class="preview-section" id="preview-section">
                <div class="image-preview">
                    <img id="preview-img" class="preview-img" alt="预览图片">
                    <div class="image-info">
                        <div class="info-item">
                            <div class="info-label">文件名</div>
                            <div class="info-value" id="file-name">-</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">尺寸</div>
                            <div class="info-value" id="image-dimensions">-</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">原始大小</div>
                            <div class="info-value" id="file-size">-</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">Base64 大小</div>
                            <div class="info-value" id="base64-size">-</div>
                        </div>
                    </div>
                </div>

                <div class="output-section">
                    <div class="output-header">
                        <h3>Base64 输出</h3>
                        <div class="output-actions">
                            <button class="btn btn-primary" onclick="copyBase64()">复制 Base64</button>
                            <button class="btn btn-secondary" onclick="downloadBase64()">下载文件</button>
                            <button class="btn btn-secondary" onclick="reset()">重新上传</button>
                        </div>
                    </div>

                    <div class="format-options">
                        <div class="format-option">
                            <input type="radio" id="format-data-uri" name="format" value="data-uri" checked onchange="updateOutput()">
                            <label for="format-data-uri">Data URI (包含前缀)</label>
                        </div>
                        <div class="format-option">
                            <input type="radio" id="format-base64-only" name="format" value="base64-only" onchange="updateOutput()">
                            <label for="format-base64-only">仅 Base64 字符串</label>
                        </div>
                    </div>

                    <textarea class="output-textarea" id="output-text" readonly></textarea>
                </div>
            </div>
            </div>

            <!-- Base64转图片模式 -->
            <div class="input-section" id="base64-to-image-section">
                <div class="base64-input-section">
                    <div class="base64-input-header">
                        <h3>Base64 输入</h3>
                        <button class="btn btn-secondary" onclick="clearBase64Input()">清空</button>
                    </div>
                    <textarea class="base64-textarea" id="base64-input" placeholder="粘贴 Base64 字符串或 Data URI（如：data:image/png;base64,iVBORw0KG...）"></textarea>
                    <button class="btn btn-primary" style="width: 100%; margin-top: 15px;" onclick="convertBase64ToImage()">转换为图片</button>
                    <div id="base64-error" class="error-message" style="display: none;"></div>
                </div>

                <div class="base64-preview-section" id="base64-preview-section">
                    <div class="image-preview">
                        <img id="base64-preview-img" class="preview-img" alt="预览图片">
                        <div class="image-info">
                            <div class="info-item">
                                <div class="info-label">图片格式</div>
                                <div class="info-value" id="base64-image-format">-</div>
                            </div>
                            <div class="info-item">
                                <div class="info-label">尺寸</div>
                                <div class="info-value" id="base64-image-dimensions">-</div>
                            </div>
                            <div class="info-item">
                                <div class="info-label">Base64 大小</div>
                                <div class="info-value" id="base64-input-size">-</div>
                            </div>
                            <div class="info-item">
                                <div class="info-label">图片大小</div>
                                <div class="info-value" id="base64-image-size">-</div>
                            </div>
                        </div>
                    </div>

                    <div class="output-section">
                        <div class="output-header">
                            <h3>操作</h3>
                            <div class="output-actions">
                                <button class="btn btn-primary" onclick="downloadBase64Image()">下载图片</button>
                                <button class="btn btn-secondary" onclick="resetBase64Preview()">重新转换</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentBase64 = '';
        let currentMimeType = '';
        let currentFileName = '';
        let currentMode = 'image-to-base64';
        let base64ImageBlob = null;
        let base64ImageMimeType = '';
        let base64PreviewImageUrl = null;

        const uploadArea = document.getElementById('upload-area');

        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.mode-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.mode === mode);
            });
            
            document.getElementById('image-to-base64-section').classList.toggle('active', mode === 'image-to-base64');
            document.getElementById('base64-to-image-section').classList.toggle('active', mode === 'base64-to-image');
            
            if (mode === 'base64-to-image') {
                document.getElementById('base64-input').focus();
            }
        }

        // 拖拽事件
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('drag-over');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('drag-over');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('drag-over');
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('image/')) {
                handleFile(file);
            } else {
                showToast('请上传图片文件');
            }
        });

        function handleFile(file) {
            if (!file) return;

            currentFileName = file.name;
            const reader = new FileReader();

            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    // 显示预览
                    document.getElementById('preview-img').src = e.target.result;
                    document.getElementById('preview-section').classList.add('active');
                    document.getElementById('upload-area').style.display = 'none';

                    // 获取 Base64 数据
                    const dataUri = e.target.result;
                    currentBase64 = dataUri.split(',')[1];
                    currentMimeType = file.type;

                    // 显示信息
                    document.getElementById('file-name').textContent = file.name;
                    document.getElementById('image-dimensions').textContent = `${img.width} x ${img.height}`;
                    document.getElementById('file-size').textContent = formatBytes(file.size);
                    document.getElementById('base64-size').textContent = formatBytes(dataUri.length);

                    updateOutput();
                };
                img.src = e.target.result;
            };

            reader.readAsDataURL(file);
        }

        function updateOutput() {
            const format = document.querySelector('input[name="format"]:checked').value;
            let output;

            if (format === 'data-uri') {
                output = `data:${currentMimeType};base64,${currentBase64}`;
            } else {
                output = currentBase64;
            }

            document.getElementById('output-text').value = output;
        }

        function copyBase64() {
            const output = document.getElementById('output-text').value;
            if (!output) {
                showToast('没有可复制的内容');
                return;
            }

            navigator.clipboard.writeText(output).then(() => {
                showToast('已复制到剪贴板');
            });
        }

        function downloadBase64() {
            const output = document.getElementById('output-text').value;
            if (!output) {
                showToast('没有可下载的内容');
                return;
            }

            const blob = new Blob([output], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${currentFileName.split('.')[0]}_base64.txt`;
            a.click();
            URL.revokeObjectURL(url);
            showToast('已开始下载');
        }

        function reset() {
            document.getElementById('preview-section').classList.remove('active');
            document.getElementById('upload-area').style.display = 'block';
            document.getElementById('file-input').value = '';
            document.getElementById('output-text').value = '';
            currentBase64 = '';
            currentMimeType = '';
            currentFileName = '';
        }

        function convertBase64ToImage() {
            const base64Input = document.getElementById('base64-input').value.trim();
            const errorDiv = document.getElementById('base64-error');
            
            if (!base64Input) {
                errorDiv.textContent = '请输入 Base64 字符串';
                errorDiv.style.display = 'block';
                return;
            }

            try {
                let base64String = base64Input;
                
                // 处理 Data URI 格式（data:image/png;base64,xxxxx）
                if (base64Input.startsWith('data:')) {
                    const commaIndex = base64Input.indexOf(',');
                    if (commaIndex === -1) {
                        throw new Error('无效的 Data URI 格式');
                    }
                    
                    const header = base64Input.substring(0, commaIndex);
                    const mimeMatch = header.match(/data:([^;]+)/);
                    if (mimeMatch) {
                        base64ImageMimeType = mimeMatch[1];
                    }
                    base64String = base64Input.substring(commaIndex + 1);
                } else {
                    // 纯 Base64 字符串，尝试从常见格式推断
                    base64ImageMimeType = 'image/png'; // 默认 PNG
                }

                // 清理可能的空白字符
                base64String = base64String.replace(/\s/g, '');

                // 验证 Base64 格式
                if (!/^[A-Za-z0-9+/]*={0,2}$/.test(base64String)) {
                    throw new Error('无效的 Base64 字符串格式');
                }

                // 转换为 Blob
                const byteCharacters = atob(base64String);
                const byteNumbers = new Array(byteCharacters.length);
                for (let i = 0; i < byteCharacters.length; i++) {
                    byteNumbers[i] = byteCharacters.charCodeAt(i);
                }
                const byteArray = new Uint8Array(byteNumbers);
                base64ImageBlob = new Blob([byteArray], { type: base64ImageMimeType });

                // 释放之前的图片 URL
                if (base64PreviewImageUrl) {
                    URL.revokeObjectURL(base64PreviewImageUrl);
                }
                
                // 创建图片 URL 并显示预览
                base64PreviewImageUrl = URL.createObjectURL(base64ImageBlob);
                const img = new Image();
                
                img.onload = function() {
                    document.getElementById('base64-preview-img').src = base64PreviewImageUrl;
                    document.getElementById('base64-preview-section').classList.add('active');
                    
                    // 显示图片信息
                    const format = base64ImageMimeType.split('/')[1] || '未知';
                    document.getElementById('base64-image-format').textContent = format.toUpperCase();
                    document.getElementById('base64-image-dimensions').textContent = `${img.width} x ${img.height}`;
                    document.getElementById('base64-input-size').textContent = formatBytes(base64Input.length);
                    document.getElementById('base64-image-size').textContent = formatBytes(base64ImageBlob.size);
                    
                    errorDiv.style.display = 'none';
                };
                
                img.onerror = function() {
                    URL.revokeObjectURL(base64PreviewImageUrl);
                    base64PreviewImageUrl = null;
                    throw new Error('无法解析为有效图片，请检查 Base64 字符串是否正确');
                };
                
                img.src = base64PreviewImageUrl;
                
            } catch (error) {
                errorDiv.textContent = '错误：' + error.message;
                errorDiv.style.display = 'block';
                document.getElementById('base64-preview-section').classList.remove('active');
            }
        }

        function downloadBase64Image() {
            if (!base64ImageBlob) {
                showToast('没有可下载的图片');
                return;
            }

            const url = URL.createObjectURL(base64ImageBlob);
            const a = document.createElement('a');
            a.href = url;
            
            // 根据 MIME 类型确定文件扩展名
            const extension = base64ImageMimeType.split('/')[1] || 'png';
            a.download = `image.${extension}`;
            
            a.click();
            URL.revokeObjectURL(url);
            showToast('已开始下载');
        }

        function resetBase64Preview() {
            document.getElementById('base64-preview-section').classList.remove('active');
            document.getElementById('base64-input').value = '';
            document.getElementById('base64-error').style.display = 'none';
            if (base64PreviewImageUrl) {
                URL.revokeObjectURL(base64PreviewImageUrl);
                base64PreviewImageUrl = null;
            }
            base64ImageBlob = null;
            base64ImageMimeType = '';
        }

        function clearBase64Input() {
            document.getElementById('base64-input').value = '';
            document.getElementById('base64-error').style.display = 'none';
            document.getElementById('base64-input').focus();
        }

        function formatBytes(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return (bytes / Math.pow(k, i)).toFixed(2) + ' ' + sizes[i];
        }

        function showToast(message) {
            const toast = document.createElement('div');
            toast.style.cssText = `
                position: fixed;
                bottom: 20px;
                left: 50%;
                transform: translateX(-50%);
                background: #333;
                color: white;
                padding: 12px 24px;
                border-radius: 8px;
                z-index: 1000;
                animation: fadeInOut 2s ease;
            `;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }

        // Add animation
        const style = document.createElement('style');
        style.textContent = `
            @keyframes fadeInOut {
                0% { opacity: 0; transform: translateX(-50%) translateY(20px); }
                15% { opacity: 1; transform: translateX(-50%) translateY(0); }
                85% { opacity: 1; transform: translateX(-50%) translateY(0); }
                100% { opacity: 0; transform: translateX(-50%) translateY(-20px); }
            }
        `;
        document.head.appendChild(style);
        
        // 页面加载时初始化
        if (document.getElementById('base64-input')) {
            document.getElementById('base64-input').addEventListener('keydown', function(e) {
                if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                    convertBase64ToImage();
                }
            });
        }
    </script>
    
    <script src="../../assets/clicks.js" defer></script>
</body>
</html>
