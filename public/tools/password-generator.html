<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>安全密码生成器</title>
  <style>
    html, body { background: transparent !important; min-height: unset !important; }
  </style>
  <script>
    (function() {
      function reportHeight() {
        var h = document.documentElement.scrollHeight || document.body.scrollHeight;
        window.parent.postMessage({ type: 'tool-height', height: h }, '*');
      }
      window.addEventListener('load', reportHeight);
      window.addEventListener('resize', reportHeight);
      var mo = new MutationObserver(reportHeight);
      document.addEventListener('DOMContentLoaded', function() {
        mo.observe(document.body, { childList: true, subtree: true, attributes: true });
      });
    })();
  </script>
</head>
<body>
<div class="container">
  <div class="card">
    <h2 class="title">🔐 安全密码生成器</h2>
    <div class="section">
      <div class="row-label">
        <label>密码长度：<span id="lenVal">16</span></label>
      </div>
      <input type="range" id="length" min="8" max="32" value="16" oninput="document.getElementById('lenVal').textContent=this.value">
    </div>
    <div class="options">
      <label><input type="checkbox" id="useUpper" checked> 大写字母 (A-Z)</label>
      <label><input type="checkbox" id="useLower" checked> 小写字母 (a-z)</label>
      <label><input type="checkbox" id="useDigit" checked> 数字 (0-9)</label>
      <label><input type="checkbox" id="useSymbol"> 符号 (!@#$...)</label>
    </div>
    <div class="pwd-box">
      <input type="text" id="pwdOutput" readonly placeholder="点击生成密码...">
      <button class="btn-copy" onclick="copyPwd()" title="复制">📋</button>
    </div>
    <div class="strength-wrap">
      <div class="strength-bar">
        <div id="strengthFill" class="strength-fill"></div>
      </div>
      <span id="strengthLabel" class="strength-label">—</span>
    </div>
    <div class="btn-row">
      <button class="btn-primary" onclick="generate()">生成密码</button>
      <button class="btn-secondary" onclick="clearHistory()">清空历史</button>
    </div>
    <div id="msg" class="msg"></div>
    <div id="historyWrap" class="history-wrap" style="display:none">
      <div class="history-title">历史记录</div>
      <ul id="historyList" class="history-list"></ul>
    </div>
  </div>
</div>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8fafc; padding: 16px; }
  .container { max-width: 600px; margin: 0 auto; }
  .card { background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); padding: 24px; }
  .title { font-size: 1.3rem; font-weight: 700; color: #1e293b; margin-bottom: 20px; }
  .section { margin-bottom: 16px; }
  .row-label label { font-size: 0.9rem; font-weight: 600; color: #475569; }
  input[type=range] { width: 100%; margin-top: 8px; accent-color: #6366f1; }
  .options { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 20px; }
  .options label { display: flex; align-items: center; gap: 6px; font-size: 0.9rem; color: #475569; cursor: pointer; }
  .options input[type=checkbox] { accent-color: #6366f1; width: 15px; height: 15px; }
  .pwd-box { display: flex; gap: 8px; margin-bottom: 12px; }
  .pwd-box input { flex: 1; padding: 10px 14px; border: 1.5px solid #e2e8f0; border-radius: 8px; font-size: 1rem; font-family: 'Courier New', monospace; background: #f8fafc; outline: none; color: #1e293b; letter-spacing: 0.05em; }
  .btn-copy { background: #f1f5f9; border: 1.5px solid #e2e8f0; border-radius: 8px; padding: 0 14px; font-size: 1.1rem; cursor: pointer; transition: background 0.2s; }
  .btn-copy:hover { background: #e2e8f0; }
  .strength-wrap { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
  .strength-bar { flex: 1; height: 8px; background: #e2e8f0; border-radius: 4px; overflow: hidden; }
  .strength-fill { height: 100%; width: 0; border-radius: 4px; transition: width 0.3s, background 0.3s; }
  .strength-label { font-size: 0.85rem; font-weight: 600; min-width: 40px; color: #475569; }
  .btn-row { display: flex; gap: 10px; flex-wrap: wrap; }
  .btn-primary { background: #6366f1; color: #fff; border: none; border-radius: 8px; padding: 9px 22px; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: background 0.2s; }
  .btn-primary:hover { background: #4f46e5; }
  .btn-secondary { background: #f1f5f9; color: #475569; border: 1.5px solid #e2e8f0; border-radius: 8px; padding: 9px 18px; font-size: 0.95rem; cursor: pointer; transition: background 0.2s; }
  .btn-secondary:hover { background: #e2e8f0; }
  .msg { margin-top: 10px; font-size: 0.85rem; min-height: 20px; color: #6366f1; }
  .history-wrap { margin-top: 20px; border-top: 1px solid #e2e8f0; padding-top: 16px; }
  .history-title { font-size: 0.85rem; font-weight: 600; color: #475569; margin-bottom: 8px; }
  .history-list { list-style: none; display: flex; flex-direction: column; gap: 6px; }
  .history-list li { display: flex; align-items: center; justify-content: space-between; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 6px; padding: 6px 12px; font-family: 'Courier New', monospace; font-size: 0.88rem; color: #334155; }
  .history-list li button { background: none; border: none; cursor: pointer; font-size: 0.85rem; color: #94a3b8; padding: 2px 6px; border-radius: 4px; }
  .history-list li button:hover { background: #e2e8f0; color: #475569; }
</style>
<script>
  const UPPER = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  const LOWER = 'abcdefghijklmnopqrstuvwxyz';
  const DIGIT = '0123456789';
  const SYMBOL = '!@#$%^&*()-_=+[]{}|;:,.<>?';

  function generate() {
    const len = parseInt(document.getElementById('length').value);
    const useUpper = document.getElementById('useUpper').checked;
    const useLower = document.getElementById('useLower').checked;
    const useDigit = document.getElementById('useDigit').checked;
    const useSymbol = document.getElementById('useSymbol').checked;
    let charset = '';
    if (useUpper) charset += UPPER;
    if (useLower) charset += LOWER;
    if (useDigit) charset += DIGIT;
    if (useSymbol) charset += SYMBOL;
    if (!charset) { showMsg('请至少选择一种字符类型'); return; }
    let pwd = '';
    const arr = new Uint32Array(len);
    crypto.getRandomValues(arr);
    for (let i = 0; i < len; i++) pwd += charset[arr[i] % charset.length];
    document.getElementById('pwdOutput').value = pwd;
    updateStrength(pwd);
    saveHistory(pwd);
    showMsg('密码已生成');
  }

  function updateStrength(pwd) {
    let score = 0;
    if (pwd.length >= 12) score++;
    if (pwd.length >= 16) score++;
    if (/[A-Z]/.test(pwd)) score++;
    if (/[a-z]/.test(pwd)) score++;
    if (/[0-9]/.test(pwd)) score++;
    if (/[^A-Za-z0-9]/.test(pwd)) score++;
    const fill = document.getElementById('strengthFill');
    const label = document.getElementById('strengthLabel');
    const levels = [
      { pct: 16, color: '#ef4444', text: '极弱' },
      { pct: 33, color: '#f97316', text: '弱' },
      { pct: 50, color: '#eab308', text: '一般' },
      { pct: 66, color: '#84cc16', text: '较强' },
      { pct: 83, color: '#22c55e', text: '强' },
      { pct: 100, color: '#10b981', text: '极强' },
    ];
    const lv = levels[Math.min(score, 5)];
    fill.style.width = lv.pct + '%';
    fill.style.background = lv.color;
    label.textContent = lv.text;
    label.style.color = lv.color;
  }

  function saveHistory(pwd) {
    let hist = JSON.parse(localStorage.getItem('pwd-gen-history') || '[]');
    hist.unshift(pwd);
    hist = hist.slice(0, 10);
    localStorage.setItem('pwd-gen-history', JSON.stringify(hist));
    renderHistory();
  }

  function renderHistory() {
    const hist = JSON.parse(localStorage.getItem('pwd-gen-history') || '[]');
    const wrap = document.getElementById('historyWrap');
    const list = document.getElementById('historyList');
    if (!hist.length) { wrap.style.display = 'none'; return; }
    wrap.style.display = '';
    list.innerHTML = hist.map((p, i) =>
      `<li><span>${p}</span><button onclick="copyText('${p}')">复制</button></li>`
    ).join('');
  }

  function clearHistory() {
    localStorage.removeItem('pwd-gen-history');
    renderHistory();
    showMsg('历史已清空');
  }

  function copyPwd() {
    const v = document.getElementById('pwdOutput').value;
    if (!v) { showMsg('请先生成密码'); return; }
    copyText(v);
  }

  function copyText(text) {
    navigator.clipboard.writeText(text).then(() => showMsg('已复制到剪贴板'));
  }

  function showMsg(m) { document.getElementById('msg').textContent = m; }

  // Init
  renderHistory();
</script>
</body>
</html>
