<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>方程数值解计算器</title>
<style>
*,::before,::after{box-sizing:border-box}
body{margin:0;font-family:ui-sans-serif,system-ui,sans-serif}
.p-2{padding:.5rem}.p-3{padding:.75rem}.p-4{padding:1rem}.p-6{padding:1.5rem}.p-8{padding:2rem}
.px-2{padding-left:.5rem;padding-right:.5rem}.px-4{padding-left:1rem;padding-right:1rem}
.py-1{padding-top:.25rem;padding-bottom:.25rem}.py-2{padding-top:.5rem;padding-bottom:.5rem}
.mt-2{margin-top:.5rem}.mt-4{margin-top:1rem}.mb-2{margin-bottom:.5rem}.mb-4{margin-bottom:1rem}.mb-6{margin-bottom:1.5rem}
.ml-2{margin-left:.5rem}.mx-auto{margin-left:auto;margin-right:auto}
.w-full{width:100%}.w-96{width:24rem}.max-w-2xl{max-width:42rem}
.h-6{height:1.5rem}
.text-xl{font-size:1.25rem;line-height:1.75rem}.text-2xl{font-size:1.5rem;line-height:2rem}.text-3xl{font-size:1.875rem;line-height:2.25rem}
.text-sm{font-size:.875rem;line-height:1.25rem}.text-xs{font-size:.75rem;line-height:1rem}
.text-center{text-align:center}.text-white{color:#fff}.text-gray-500{color:#6b7280}.text-gray-700{color:#374151}.text-gray-800{color:#1f2937}
.text-red-500{color:#ef4444}.text-blue-500{color:#3b82f6}.text-green-500{color:#22c55e}
.font-bold{font-weight:700}.font-medium{font-weight:500}
.bg-white{background-color:#fff}.bg-gray-100{background-color:#f3f4f6}.bg-gray-200{background-color:#e5e7eb}
.bg-blue-500{background-color:#3b82f6}.bg-green-500{background-color:#22c55e}.bg-orange-500{background-color:#f97316}
.bg-purple-500{background-color:#a855f7}.bg-red-500{background-color:#ef4444}
.hover\:bg-blue-600:hover{background-color:#2563eb}.hover\:bg-green-600:hover{background-color:#16a34a}
.hover\:bg-orange-600:hover{background-color:#ea580c}.hover\:bg-purple-600:hover{background-color:#9333ea}
.border{border-width:1px;border-style:solid;border-color:#d1d5db}.border-2{border-width:2px;border-style:solid;border-color:#d1d5db}
.border-dashed{border-style:dashed}.border-gray-300{border-color:#d1d5db}
.rounded{border-radius:.25rem}.rounded-lg{border-radius:.5rem}.rounded-full{border-radius:9999px}
.shadow-md{box-shadow:0 4px 6px -1px rgba(0,0,0,.1),0 2px 4px -2px rgba(0,0,0,.1)}
.shadow-lg{box-shadow:0 10px 15px -3px rgba(0,0,0,.1),0 4px 6px -4px rgba(0,0,0,.1)}
.flex{display:flex}.grid{display:grid}.block{display:block}.hidden{display:none}.inline-block{display:inline-block}
.items-center{align-items:center}.justify-center{justify-content:center}.space-y-2>*+*{margin-top:.5rem}.space-y-4>*+*{margin-top:1rem}.space-y-8>*+*{margin-top:2rem}
.gap-2{gap:.5rem}.gap-4{gap:1rem}.grid-cols-2{grid-template-columns:repeat(2,minmax(0,1fr))}
.cursor-pointer{cursor:pointer}.transition-colors{transition-property:color,background-color,border-color;transition-duration:.15s}
.focus\:ring-2:focus{box-shadow:0 0 0 2px rgba(59,130,246,.5)}.focus\:border-transparent:focus{border-color:transparent}
.overflow-hidden{overflow:hidden}.relative{position:relative}.absolute{position:absolute}.inset-0{inset:0}
.opacity-0{opacity:0}
</style>
</head>
<body class="bg-gray-100  p-8">
    <div class="max-w-2xl mx-auto bg-white rounded-lg shadow-md p-6">
        <h1 class="text-2xl font-bold text-gray-800 mb-6">方程数值解计算器</h1>
        
        <!-- 输入区域 -->
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">方程 f(x) = </label>
                <input type="text" id="equation" 
                       class="w-full p-2 border rounded-md" 
                       placeholder="例如：ln(x) + sin(x^2)"
                       value="ln(x) + sin(x^2)">
	<label class="block text-sm font-medium text-gray-700 mb-2">e为底用ln(x)，10为底用log(x)</label>
            </div>
            
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">区间起点 a</label>
                    <input type="number" id="a" step="0.1" value="0.5" 
                           class="w-full p-2 border rounded-md">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">区间终点 b</label>
                    <input type="number" id="b" step="0.1" value="2" 
                           class="w-full p-2 border rounded-md">
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">误差容限</label>
                <input type="number" id="tolerance" step="0.0001" value="0.0001" 
                       class="w-full p-2 border rounded-md">
            </div>
        </div>

        <!-- 操作按钮 -->
        <button onclick="calculateRoot()" 
                class="mt-6 w-full bg-blue-600 text-white py-2 px-4 rounded-md hover:bg-blue-700 transition">
            计算
        </button>

        <!-- 结果展示 -->
        <div id="result" class="mt-6 space-y-2 hidden">
            <h2 class="text-lg font-semibold text-gray-800">计算结果：</h2>
            <pre class="bg-gray-50 p-4 rounded-md" id="result-content"></pre>
        </div>

        <div id="error" class="mt-4 text-red-600 hidden"></div>
    </div>

    <script>
        function calculateRoot() {
            document.getElementById('result').classList.add('hidden');
            document.getElementById('error').classList.add('hidden');

            try {
                const equation = document.getElementById('equation').value;
                const a = parseFloat(document.getElementById('a').value);
                const b = parseFloat(document.getElementById('b').value);
                const tolerance = parseFloat(document.getElementById('tolerance').value);

                if (isNaN(a) || isNaN(b) || isNaN(tolerance)) {
                    throw new Error('请输入有效的数值参数');
                }
                if (a >= b) {
                    throw new Error('区间终点b必须大于起点a');
                }

                // 改进的表达式转换逻辑
                const processedEquation = equation
                    .replace(/ln\(/g, 'Math.log(')         // 先处理自然对数
                    .replace(/log\(/g, 'Math.log10(')     // 处理十进制对数
                    .replace(/e\^(\w+|\([^)]*\))/g, 'Math.exp($1)') // 处理自然指数
                    .replace(/(sin|cos|tan|sqrt|exp)\(/gi, (m, p1) => `Math.${p1.toLowerCase()}(`) // 处理其他数学函数
                    .replace(/([a-zA-Z0-9\)]+)\s*\^\s*([a-zA-Z0-9\(]+)/g, 'Math.pow($1, $2)') // 最后处理幂运算
                    .replace(/Math\.Math\./g, 'Math.');   // 修复嵌套替换问题

                const f = new Function('x', `return ${processedEquation};`);
                
                // 测试函数是否有效
                if (isNaN(f(a)) || isNaN(f(b))) {
                    throw new Error('方程表达式无效，请检查数学函数和运算符');
                }

                const startTime = performance.now();
                let [root, iterations] = bisection(f, a, b, tolerance);
                const duration = performance.now() - startTime;

                const resultContent = document.getElementById('result-content');
                resultContent.innerHTML = `根值：${root.toFixed(6)}\n迭代次数：${iterations}\n计算耗时：${duration.toFixed(2)}ms`;
                document.getElementById('result').classList.remove('hidden');

            } catch (error) {
                document.getElementById('error').innerText = '错误：' + error.message;
                document.getElementById('error').classList.remove('hidden');
            }
        }

        function bisection(f, a, b, tolerance, maxIterations = 1000) {
            if (f(a) * f(b) >= 0) {
                throw new Error('函数在区间端点必须异号');
            }

            let c = a;
            let iterations = 0;
            
            while ((b - a) >= tolerance && iterations < maxIterations) {
                c = (a + b) / 2;
                
                if (f(c) === 0.0) {
                    break;
                } else if (f(c) * f(a) < 0) {
                    b = c;
                } else {
                    a = c;
                }
                iterations++;
            }

            if (iterations >= maxIterations) {
                throw new Error('超过最大迭代次数，可能未收敛');
            }

            return [c, iterations];
        }
    </script>
<script>
  (function() {
    function reportHeight() {
      var h = document.documentElement.scrollHeight || document.body.scrollHeight;
      window.parent.postMessage({ type: 'tool-height', height: h }, '*');
    }
    window.addEventListener('load', reportHeight);
    window.addEventListener('resize', reportHeight);
    var obs = new MutationObserver(reportHeight);
    obs.observe(document.body, { childList: true, subtree: true, attributes: true });
    setTimeout(reportHeight, 300);
    setTimeout(reportHeight, 1000);
  })();
</script>
</body>
</html>
