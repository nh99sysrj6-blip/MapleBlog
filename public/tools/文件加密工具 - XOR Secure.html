<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文件加密工具 - XOR Secure</title>
<style>
*,::before,::after{box-sizing:border-box}
body{margin:0;font-family:ui-sans-serif,system-ui,sans-serif}
.p-2{padding:.5rem}.p-3{padding:.75rem}.p-4{padding:1rem}.p-6{padding:1.5rem}.p-8{padding:2rem}
.px-2{padding-left:.5rem;padding-right:.5rem}.px-4{padding-left:1rem;padding-right:1rem}
.py-1{padding-top:.25rem;padding-bottom:.25rem}.py-2{padding-top:.5rem;padding-bottom:.5rem}
.mt-2{margin-top:.5rem}.mt-4{margin-top:1rem}.mb-2{margin-bottom:.5rem}.mb-4{margin-bottom:1rem}.mb-6{margin-bottom:1.5rem}
.ml-2{margin-left:.5rem}.mx-auto{margin-left:auto;margin-right:auto}
.w-full{width:100%}.w-96{width:24rem}.max-w-2xl{max-width:42rem}
.h-6{height:1.5rem}
.text-xl{font-size:1.25rem;line-height:1.75rem}.text-2xl{font-size:1.5rem;line-height:2rem}.text-3xl{font-size:1.875rem;line-height:2.25rem}
.text-sm{font-size:.875rem;line-height:1.25rem}.text-xs{font-size:.75rem;line-height:1rem}
.text-center{text-align:center}.text-white{color:#fff}.text-gray-500{color:#6b7280}.text-gray-700{color:#374151}.text-gray-800{color:#1f2937}
.text-red-500{color:#ef4444}.text-blue-500{color:#3b82f6}.text-green-500{color:#22c55e}
.font-bold{font-weight:700}.font-medium{font-weight:500}
.bg-white{background-color:#fff}.bg-gray-100{background-color:#f3f4f6}.bg-gray-200{background-color:#e5e7eb}
.bg-blue-500{background-color:#3b82f6}.bg-green-500{background-color:#22c55e}.bg-orange-500{background-color:#f97316}
.bg-purple-500{background-color:#a855f7}.bg-red-500{background-color:#ef4444}
.hover\:bg-blue-600:hover{background-color:#2563eb}.hover\:bg-green-600:hover{background-color:#16a34a}
.hover\:bg-orange-600:hover{background-color:#ea580c}.hover\:bg-purple-600:hover{background-color:#9333ea}
.border{border-width:1px;border-style:solid;border-color:#d1d5db}.border-2{border-width:2px;border-style:solid;border-color:#d1d5db}
.border-dashed{border-style:dashed}.border-gray-300{border-color:#d1d5db}
.rounded{border-radius:.25rem}.rounded-lg{border-radius:.5rem}.rounded-full{border-radius:9999px}
.shadow-md{box-shadow:0 4px 6px -1px rgba(0,0,0,.1),0 2px 4px -2px rgba(0,0,0,.1)}
.shadow-lg{box-shadow:0 10px 15px -3px rgba(0,0,0,.1),0 4px 6px -4px rgba(0,0,0,.1)}
.flex{display:flex}.grid{display:grid}.block{display:block}.hidden{display:none}.inline-block{display:inline-block}
.items-center{align-items:center}.justify-center{justify-content:center}.space-y-2>*+*{margin-top:.5rem}.space-y-4>*+*{margin-top:1rem}.space-y-8>*+*{margin-top:2rem}
.gap-2{gap:.5rem}.gap-4{gap:1rem}.grid-cols-2{grid-template-columns:repeat(2,minmax(0,1fr))}
.cursor-pointer{cursor:pointer}.transition-colors{transition-property:color,background-color,border-color;transition-duration:.15s}
.focus\:ring-2:focus{box-shadow:0 0 0 2px rgba(59,130,246,.5)}.focus\:border-transparent:focus{border-color:transparent}
.overflow-hidden{overflow:hidden}.relative{position:relative}.absolute{position:absolute}.inset-0{inset:0}
.opacity-0{opacity:0}
</style>
</head>
<body class="bg-gray-100  p-8">
    <div class="max-w-2xl mx-auto bg-white rounded-lg shadow-md p-6">
        <h1 class="text-3xl font-bold text-gray-800 mb-6 text-center">文件加密工具</h1>
        
        <div class="space-y-4">
            <!-- 文件上传区域 -->
            <div class="border-2 border-dashed border-gray-300 rounded-lg p-8 text-center">
                <input type="file" id="fileInput" class="hidden" />
                <label for="fileInput" class="cursor-pointer bg-blue-500 text-white px-6 py-2 rounded-lg hover:bg-blue-600 transition-colors">
                    选择文件
                </label>
                <p class="text-gray-500 mt-2" id="fileName">未选择任何文件</p>
            </div>

            <!-- 密钥输入 -->
            <div class="space-y-2">
                <label class="block text-gray-700">加密密钥：</label>
                <input type="password" id="keyInput" 
                    class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                    placeholder="输入加密/解密密钥">
            </div>

            <!-- 操作按钮 -->
            <div class="grid grid-cols-2 gap-4">
                <button onclick="processFile('encrypt')" 
                    class="bg-green-500 text-white p-3 rounded-lg hover:bg-green-600 transition-colors flex items-center justify-center">
                    <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                    </svg>
                    加密文件
                </button>
                <button onclick="processFile('decrypt')" 
                    class="bg-purple-500 text-white p-3 rounded-lg hover:bg-purple-600 transition-colors flex items-center justify-center">
                    <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 11V7a4 4 0 118 0m-4 8v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2z"/>
                    </svg>
                    解密文件
                </button>
            </div>

            <!-- 状态提示 -->
            <div id="status" class="text-center text-gray-500 h-6"></div>

            <!-- 下载链接 -->
            <div id="downloadLink" class="hidden text-center">
                <a class="text-blue-500 hover:underline cursor-pointer">下载处理后的文件</a>
            </div>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const fileName = document.getElementById('fileName');
        const keyInput = document.getElementById('keyInput');
        const status = document.getElementById('status');
        const downloadLink = document.getElementById('downloadLink');

        // 文件选择处理
        fileInput.addEventListener('change', function(e) {
            fileName.textContent = e.target.files[0] ? e.target.files[0].name : '未选择任何文件';
        });

        // 核心加密/解密函数
        async function processFile(mode) {
            const file = fileInput.files[0];
            const key = keyInput.value;
            
            if (!file || !key) {
                alert('请先选择文件并输入密钥');
                return;
            }

            status.textContent = '处理中...';
            downloadLink.classList.add('hidden');

            try {
                const fileBuffer = await file.arrayBuffer();
                const processedBuffer = xorProcessing(new Uint8Array(fileBuffer), key);
                
                const processedBlob = new Blob([processedBuffer], { type: file.type });
                const url = URL.createObjectURL(processedBlob);
                
                downloadLink.querySelector('a').onclick = () => {
                    const ext = mode === 'encrypt' ? '.encrypted' : '.decrypted';
                    const link = document.createElement('a');
                    link.href = url;
                    link.download = `${file.name}${ext}`;
                    link.click();
                    URL.revokeObjectURL(url);
                };
                
                downloadLink.classList.remove('hidden');
                status.textContent = '处理完成！点击下方链接下载';
            } catch (error) {
                status.textContent = '处理失败：' + error.message;
            }
        }

        // XOR加密/解密算法
        function xorProcessing(data, key) {
            const keyBytes = Array.from(key).map(c => c.charCodeAt(0));
            return data.map((byte, index) => 
                byte ^ keyBytes[index % keyBytes.length]
            );
        }
    </script>

    <style>
        /* 自定义加载动画 */
        [aria-busy="true"]::after {
            content: "";
            @apply inline-block ml-2 w-4 h-4 border-2 border-current border-t-transparent rounded-full;
            animation: spin 0.75s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
<script>
  (function() {
    function reportHeight() {
      var h = document.documentElement.scrollHeight || document.body.scrollHeight;
      window.parent.postMessage({ type: 'tool-height', height: h }, '*');
    }
    window.addEventListener('load', reportHeight);
    window.addEventListener('resize', reportHeight);
    var obs = new MutationObserver(reportHeight);
    obs.observe(document.body, { childList: true, subtree: true, attributes: true });
    setTimeout(reportHeight, 300);
    setTimeout(reportHeight, 1000);
  })();
</script>
</body>
</html>
