<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文本分割器</title>
  <style>
    html, body { background: transparent !important; min-height: unset !important; }
  </style>
  <script>
    (function() {
      function reportHeight() {
        var h = document.documentElement.scrollHeight || document.body.scrollHeight;
        window.parent.postMessage({ type: 'tool-height', height: h }, '*');
      }
      window.addEventListener('load', reportHeight);
      window.addEventListener('resize', reportHeight);
      var mo = new MutationObserver(reportHeight);
      document.addEventListener('DOMContentLoaded', function() {
        mo.observe(document.body, { childList: true, subtree: true, attributes: true });
      });
    })();
  </script>
</head>
<body>
<div class="container">
  <div class="card">
    <h2 class="title">✂️ 文本分割器</h2>
    <div class="opt-row">
      <label for="delimiter">分隔符：</label>
      <input type="text" id="delimiter" value="," placeholder="输入分隔符（支持 \n \t）">
      <label><input type="checkbox" id="trimParts" checked> 去除首尾空格</label>
      <label><input type="checkbox" id="removeEmpty" checked> 过滤空片段</label>
    </div>
    <div class="io-row">
      <div class="io-col">
        <label>输入</label>
        <textarea id="input" placeholder="输入需要分割的文本..."></textarea>
      </div>
      <div class="io-col">
        <label>输出（每行一个片段）</label>
        <textarea id="output" placeholder="分割后的片段..." readonly></textarea>
      </div>
    </div>
    <div id="stats" class="stats"></div>
    <div class="btn-row">
      <button class="btn-primary" onclick="split()">分割</button>
      <button class="btn-secondary" onclick="clearAll()">清空</button>
      <button class="btn-secondary" onclick="copyOutput()">复制结果</button>
    </div>
    <div id="msg" class="msg"></div>
  </div>
</div>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8fafc; padding: 16px; }
  .container { max-width: 900px; margin: 0 auto; }
  .card { background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); padding: 24px; }
  .title { font-size: 1.3rem; font-weight: 700; color: #1e293b; margin-bottom: 16px; }
  .opt-row { display: flex; align-items: center; gap: 14px; margin-bottom: 16px; flex-wrap: wrap; }
  .opt-row label { font-size: 0.9rem; color: #475569; display: flex; align-items: center; gap: 5px; cursor: pointer; font-weight: 600; }
  .opt-row input[type=text] { flex: 1; min-width: 120px; max-width: 200px; padding: 7px 10px; border: 1.5px solid #e2e8f0; border-radius: 8px; font-size: 0.9rem; outline: none; }
  .opt-row input[type=text]:focus { border-color: #10b981; }
  .opt-row input[type=checkbox] { accent-color: #10b981; }
  .io-row { display: flex; gap: 16px; }
  .io-col { flex: 1; display: flex; flex-direction: column; gap: 6px; }
  label { font-size: 0.85rem; font-weight: 600; color: #475569; }
  textarea { width: 100%; height: 200px; padding: 10px 12px; border: 1.5px solid #e2e8f0; border-radius: 8px; font-size: 0.9rem; font-family: 'Courier New', monospace; resize: vertical; outline: none; transition: border-color 0.2s; background: #f8fafc; }
  textarea:focus { border-color: #10b981; background: #fff; }
  textarea[readonly] { background: #f1f5f9; }
  .stats { margin-top: 10px; font-size: 0.85rem; color: #475569; }
  .btn-row { display: flex; gap: 10px; margin-top: 12px; flex-wrap: wrap; }
  .btn-primary { background: #10b981; color: #fff; border: none; border-radius: 8px; padding: 9px 22px; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: background 0.2s; }
  .btn-primary:hover { background: #059669; }
  .btn-secondary { background: #f1f5f9; color: #475569; border: 1.5px solid #e2e8f0; border-radius: 8px; padding: 9px 18px; font-size: 0.95rem; cursor: pointer; transition: background 0.2s; }
  .btn-secondary:hover { background: #e2e8f0; }
  .msg { margin-top: 10px; font-size: 0.85rem; min-height: 20px; color: #10b981; }
  @media (max-width: 600px) { .io-row { flex-direction: column; } }
</style>
<script>
  document.getElementById('input').addEventListener('input', split);
  document.getElementById('delimiter').addEventListener('input', split);
  document.getElementById('trimParts').addEventListener('change', split);
  document.getElementById('removeEmpty').addEventListener('change', split);

  function parseSep(s) {
    return s.replace(/\\n/g, '\n').replace(/\\t/g, '\t');
  }
  function split() {
    const text = document.getElementById('input').value;
    const delim = parseSep(document.getElementById('delimiter').value);
    const trimParts = document.getElementById('trimParts').checked;
    const removeEmpty = document.getElementById('removeEmpty').checked;
    if (!text || !delim) { document.getElementById('output').value = ''; return; }
    let parts = text.split(delim);
    if (trimParts) parts = parts.map(p => p.trim());
    if (removeEmpty) parts = parts.filter(p => p !== '');
    document.getElementById('output').value = parts.join('\n');
    document.getElementById('stats').textContent = `共分割出 ${parts.length} 个片段`;
    showMsg('分割完成');
  }
  function clearAll() {
    document.getElementById('input').value = '';
    document.getElementById('output').value = '';
    document.getElementById('stats').textContent = '';
    showMsg('');
  }
  function copyOutput() {
    const v = document.getElementById('output').value;
    if (!v) { showMsg('没有可复制的内容'); return; }
    navigator.clipboard.writeText(v).then(() => showMsg('已复制到剪贴板'));
  }
  function showMsg(m) { document.getElementById('msg').textContent = m; }
</script>
</body>
</html>
