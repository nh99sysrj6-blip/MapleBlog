<body class="p-6 bg-gray-100">
    <div class="max-w-2xl mx-auto space-y-8">
        <!-- 卡方计算 -->
        <div class="bg-white rounded-lg shadow-md p-6">
            <h2 class="text-xl font-bold mb-4">卡方计算（2×2列联表）</h2>
            <div class="grid grid-cols-2 gap-4 mb-4">
                <input type="number" id="a" class="p-2 border rounded" placeholder="a">
                <input type="number" id="b" class="p-2 border rounded" placeholder="b">
                <input type="number" id="c" class="p-2 border rounded" placeholder="c">
                <input type="number" id="d" class="p-2 border rounded" placeholder="d">
            </div>
            <button onclick="calculateChiSquare()" class="w-full bg-purple-500 text-white p-2 rounded hover:bg-purple-600">
                计算卡方值
            </button>
            <div id="chi2-results" class="mt-4 space-y-2"></div>
        </div>

        <!-- 线性回归计算 -->
        <div class="bg-white rounded-lg shadow-md p-6">
            <h2 class="text-xl font-bold mb-4">一元线性回归</h2>
            <div class="space-y-4">
                <div>
                    <label class="block mb-2">X 值（空格分隔）</label>
                    <input type="text" id="x-values" class="w-full p-2 border rounded" placeholder="例如: 1 2 3 4 5">
                </div>
                <div>
                    <label class="block mb-2">Y 值（空格分隔）</label>
                    <input type="text" id="y-values" class="w-full p-2 border rounded" placeholder="例如: 2 4 6 8 10">
                </div>
                <button onclick="calculateRegression()" class="w-full bg-orange-500 text-white p-2 rounded hover:bg-orange-600">
                    计算回归参数
                </button>
                <div id="regression-results" class="mt-4 space-y-2"></div>
            </div>
        </div>
    </div>

    <script>
        // 卡方计算
        function calculateChiSquare() {
            const a = parseInt(document.getElementById('a').value) || 0;
            const b = parseInt(document.getElementById('b').value) || 0;
            const c = parseInt(document.getElementById('c').value) || 0;
            const d = parseInt(document.getElementById('d').value) || 0;
            
            const n = a + b + c + d;
            const numerator = n * Math.pow((a * d - b * c), 2);
            const denominator = (a + b) * (c + d) * (a + c) * (b + d);
            
            const K2 = new Fraction(numerator).div(denominator);
            const results = document.getElementById('chi2-results');
            
            results.innerHTML = `
                <p class="font-medium">卡方值 K² = ${K2.toFraction()}</p>
                <p class="font-medium">近似值 ≈ ${K2.valueOf().toFixed(4)}</p>
            `;
        }

        // 线性回归计算
        function calculateRegression() {
            const xInput = document.getElementById('x-values').value.split(' ').filter(Boolean);
            const yInput = document.getElementById('y-values').value.split(' ').filter(Boolean);
            const results = document.getElementById('regression-results');
            
            if (xInput.length !== yInput.length) {
                results.innerHTML = '<p class="text-red-500">错误：X 和 Y 的数据量不一致</p>';
                return;
            }

            const n = xInput.length;
            let sx = 0, sy = 0, sx2 = 0, sy2 = 0, sxy = 0;
            
            // 转换输入为数值
            const x = xInput.map(Number);
            const y = yInput.map(Number);

            // 计算各项总和
            for (let i = 0; i < n; i++) {
                sx += x[i];
                sy += y[i];
                sx2 += x[i] ** 2;
                sy2 += y[i] ** 2;
                sxy += x[i] * y[i];
            }

            // 计算统计量
            const xBar = sx / n;
            const yBar = sy / n;
            const sigmaX = sx2 - n * xBar ** 2;
            const sigmaY = sy2 - n * yBar ** 2;
            const sigmaXY = sxy - n * xBar * yBar;
            const r = sigmaXY / Math.sqrt(sigmaX * sigmaY);
            const b = sigmaXY / sigmaX;
            const a = yBar - b * xBar;

            // 计算残差平方和和决定系数
            let se2 = 0;
            for (let i = 0; i < n; i++) {
                se2 += (y[i] - b * x[i] - a) ** 2;
            }
            const R2 = 1 - (se2 / sigmaY);

            // 格式化显示结果
            results.innerHTML = `
                <div class="space-y-2">
                    <p>均值 x̄ = ${xBar.toFixed(4)}</p>
                    <p>均值 ȳ = ${yBar.toFixed(4)}</p>
                    <p>方差 Σ(x-x̄)² = ${sigmaX.toFixed(4)}</p>
                    <p>方差 Σ(y-ȳ)² = ${sigmaY.toFixed(4)}</p>
                    <p>协方差 Σ(x-x̄)(y-ȳ) = ${sigmaXY.toFixed(4)}</p>
                    <p class="font-medium">相关系数 r = ${r.toFixed(4)}</p>
                    <p class="font-medium">回归系数 b = ${b.toFixed(4)}</p>
                    <p class="font-medium">截距 a = ${a.toFixed(4)}</p>
                    <p>残差平方和 = ${se2.toFixed(4)}</p>
                    <p class="font-medium">决定系数 R² = ${R2.toFixed(4)}</p>
                </div>
            `;
        }
    </script>
<script>
  (function() {
    function reportHeight() {
      var h = document.documentElement.scrollHeight || document.body.scrollHeight;
      window.parent.postMessage({ type: 'tool-height', height: h }, '*');
    }
    window.addEventListener('load', reportHeight);
    window.addEventListener('resize', reportHeight);
    var obs = new MutationObserver(reportHeight);
    obs.observe(document.body, { childList: true, subtree: true, attributes: true });
    setTimeout(reportHeight, 800);
    setTimeout(reportHeight, 2000);
  })();
</script>
</body>
</html>
