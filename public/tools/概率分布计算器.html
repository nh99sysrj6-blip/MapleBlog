<body class="p-6 bg-gray-100">
    <div class="max-w-2xl mx-auto space-y-8">
        <!-- 二项分布计算器 -->
        <div class="bg-white rounded-lg shadow-md p-6">
            <h2 class="text-xl font-bold mb-4">二项分布计算器</h2>
            <div class="space-y-4">
                <div>
                    <label class="block mb-2">试验次数 (n)</label>
                    <input type="number" id="bin-n" class="w-full p-2 border rounded">
                </div>
                <div>
                    <label class="block mb-2">成功概率 (p)</label>
                    <input type="text" id="bin-p" class="w-full p-2 border rounded" placeholder="例如: 0.5 或 1/3">
                </div>
                <button onclick="calculateBinomial()" class="w-full bg-blue-500 text-white p-2 rounded hover:bg-blue-600">
                    计算二项分布
                </button>
                <div id="bin-results" class="mt-4 space-y-2"></div>
            </div>
        </div>

        <!-- 超几何分布计算器 -->
        <div class="bg-white rounded-lg shadow-md p-6">
            <h2 class="text-xl font-bold mb-4">超几何分布计算器</h2>
            <div class="space-y-4">
                <div>
                    <label class="block mb-2">总数 (N)</label>
                    <input type="number" id="hyp-N" class="w-full p-2 border rounded">
                </div>
                <div>
                    <label class="block mb-2">成功元素数 (M)</label>
                    <input type="number" id="hyp-M" class="w-full p-2 border rounded">
                </div>
                <div>
                    <label class="block mb-2">抽取数 (n)</label>
                    <input type="number" id="hyp-n" class="w-full p-2 border rounded">
                </div>
                <button onclick="calculateHypergeometric()" class="w-full bg-green-500 text-white p-2 rounded hover:bg-green-600">
                    计算超几何分布
                </button>
                <div id="hyp-results" class="mt-4 space-y-2"></div>
            </div>
        </div>
    </div>

    <script>
        // 组合数计算函数
        function combination(n, k) {
            if (k > n) return 0;
            if (k === 0 || k === n) return 1;
            k = Math.min(k, n - k);
            let result = 1;
            for (let i = 1; i <= k; i++) {
                result = result * (n - k + i) / i;
            }
            return Math.round(result);
        }

        // 解析分数输入
        function parseFraction(input) {
            if (input.includes('/')) {
                const [numerator, denominator] = input.split('/').map(Number);
                return new Fraction(numerator, denominator);
            }
            return new Fraction(parseFloat(input));
        }

        // 二项分布计算
        function calculateBinomial() {
            const n = parseInt(document.getElementById('bin-n').value);
            const p = parseFraction(document.getElementById('bin-p').value);
            const results = document.getElementById('bin-results');
            results.innerHTML = '';

            const EX = p.mul(n);
            const DX = EX.mul(new Fraction(1).sub(p));
            
            results.innerHTML += `<p class="font-medium">期望 EX = ${EX.toFraction()}</p>`;
            results.innerHTML += `<p class="font-medium">方差 DX = ${DX.toFraction()}</p>`;
            
            const probList = document.createElement('div');
            probList.className = 'mt-4 space-y-1';
            probList.innerHTML = '<p class="font-medium">概率分布：</p>';
            
            for (let k = 0; k <= n; k++) {
                const combVal = combination(n, k);
                const prob = new Fraction(combVal)
                    .mul(p.pow(k))
                    .mul(new Fraction(1).sub(p).pow(n - k));
                probList.innerHTML += `<p>P(X = ${k}) = ${prob.toFraction()}</p>`;
            }
            
            results.appendChild(probList);
        }

        // 超几何分布计算
        function calculateHypergeometric() {
            const N = parseInt(document.getElementById('hyp-N').value);
            const M = parseInt(document.getElementById('hyp-M').value);
            const n = parseInt(document.getElementById('hyp-n').value);
            const results = document.getElementById('hyp-results');
            results.innerHTML = '';

            const EX = new Fraction(M * n, N);
            const DX = new Fraction(M * (N - M) * n * (N - n), N * N * (N - 1));
            
            results.innerHTML += `<p class="font-medium">期望 EX = ${EX.toFraction()}</p>`;
            results.innerHTML += `<p class="font-medium">方差 DX = ${DX.toFraction()}</p>`;
            
            const m = Math.max(0, n - (N - M));
            const r = Math.min(n, M);
            const probList = document.createElement('div');
            probList.className = 'mt-4 space-y-1';
            probList.innerHTML = '<p class="font-medium">概率分布：</p>';
            
            for (let k = m; k <= r; k++) {
                const numerator = combination(M, k) * combination(N - M, n - k);
                const denominator = combination(N, n);
                const prob = new Fraction(numerator, denominator);
                probList.innerHTML += `<p>P(X = ${k}) = ${prob.toFraction()}</p>`;
            }
            
            results.appendChild(probList);
        }
    </script>

    function reportHeight() {
      var h = document.documentElement.scrollHeight || document.body.scrollHeight;
      window.parent.postMessage({ type: 'tool-height', height: h }, '*');

    window.addEventListener('load', reportHeight);
    window.addEventListener('resize', reportHeight);
    var obs = new MutationObserver(reportHeight);
    obs.observe(document.body, { childList: true, subtree: true, attributes: true });
    setTimeout(reportHeight, 800);
    setTimeout(reportHeight, 2000);
  })();
</script>
</body>
