<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>直方图统计分析</title>
  <style>
    html, body { background: transparent !important; min-height: unset !important; }
  </style>
  <script>
    (function() {
      function reportHeight() {
        var h = document.documentElement.scrollHeight || document.body.scrollHeight;
        window.parent.postMessage({ type: 'tool-height', height: h }, '*');
      }
      window.addEventListener('load', reportHeight);
      window.addEventListener('resize', reportHeight);
      var mo = new MutationObserver(reportHeight);
      document.addEventListener('DOMContentLoaded', function() {
        mo.observe(document.body, { childList: true, subtree: true, attributes: true });
      });
    })();
  </script>
  <script src="https://cdn.jsdelivr.net/npm/fraction.js@4.3.7/fraction.min.js"></script>
</head>
<body>
<div class="container">
  <div class="card">
    <h2 class="title">📊 直方图统计分析</h2>
    <p class="desc">输入直方图参数，计算均值、方差、中位数及百分位数。频率支持分数（如 1/5）。</p>
    <div class="form-grid">
      <div class="form-row">
        <div class="form-item">
          <label>左端点 a</label>
          <input type="text" id="a" placeholder="例如：60">
        </div>
        <div class="form-item">
          <label>组距 d</label>
          <input type="text" id="d" placeholder="例如：10">
        </div>
        <div class="form-item">
          <label>百分位数 p（可选，0~100）</label>
          <input type="text" id="pct" placeholder="例如：75">
        </div>
      </div>
      <div class="form-item">
        <label>各组频率（空格分隔，支持分数）</label>
        <input type="text" id="freqs" placeholder="例如：1/5 2/5 1/5 1/5">
      </div>
    </div>
    <div class="btn-row">
      <button class="btn-primary" onclick="calculate()">计算</button>
      <button class="btn-secondary" onclick="clearAll()">清空</button>
    </div>
    <div id="result" class="result-box" style="display:none">
      <div class="result-grid" id="result-grid"></div>
      <div id="freq-table-wrap"></div>
    </div>
    <div id="msg" class="msg"></div>
  </div>
</div>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8fafc; padding: 16px; }
  .container { max-width: 700px; margin: 0 auto; }
  .card { background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); padding: 24px; }
  .title { font-size: 1.3rem; font-weight: 700; color: #1e293b; margin-bottom: 8px; }
  .desc { font-size: 0.88rem; color: #64748b; margin-bottom: 20px; }
  .form-grid { display: flex; flex-direction: column; gap: 14px; margin-bottom: 18px; }
  .form-row { display: flex; gap: 12px; }
  .form-item { display: flex; flex-direction: column; gap: 5px; flex: 1; }
  label { font-size: 0.85rem; font-weight: 600; color: #475569; }
  input[type="text"] { padding: 9px 12px; border: 1.5px solid #e2e8f0; border-radius: 8px; font-size: 0.9rem; outline: none; transition: border-color 0.2s; background: #f8fafc; width: 100%; }
  input:focus { border-color: #10b981; background: #fff; }
  .btn-row { display: flex; gap: 10px; margin-bottom: 18px; }
  .btn-primary { background: #10b981; color: #fff; border: none; border-radius: 8px; padding: 9px 22px; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: background 0.2s; }
  .btn-primary:hover { background: #059669; }
  .btn-secondary { background: #f1f5f9; color: #475569; border: 1.5px solid #e2e8f0; border-radius: 8px; padding: 9px 18px; font-size: 0.95rem; cursor: pointer; transition: background 0.2s; }
  .btn-secondary:hover { background: #e2e8f0; }
  .result-box { background: #f0fdf4; border: 1.5px solid #bbf7d0; border-radius: 10px; padding: 18px; margin-bottom: 10px; }
  .result-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; margin-bottom: 16px; }
  .result-item { background: #fff; border-radius: 8px; padding: 12px 14px; border: 1px solid #d1fae5; }
  .result-label { font-size: 0.8rem; color: #64748b; margin-bottom: 4px; }
  .result-value { font-size: 1.05rem; font-weight: 700; color: #065f46; font-family: 'Courier New', monospace; word-break: break-all; }
  .freq-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; margin-top: 8px; }
  .freq-table th { background: #d1fae5; color: #065f46; padding: 7px 10px; text-align: center; font-weight: 700; }
  .freq-table td { padding: 6px 10px; text-align: center; border-bottom: 1px solid #e2e8f0; color: #334155; }
  .freq-table tr:last-child td { border-bottom: none; }
  .msg { font-size: 0.85rem; min-height: 20px; color: #ef4444; margin-top: 6px; }
  @media (max-width: 500px) { .form-row { flex-direction: column; } .result-grid { grid-template-columns: 1fr; } }
</style>
<script>
  function parseFrac(s) {
    s = s.trim();
    if (!s) return null;
    try { return new Fraction(s); } catch(e) { return null; }
  }

  function fracToStr(f) {
    if (f.d === 1) return String(f.n * f.s);
    return (f.s < 0 ? '-' : '') + f.n + '/' + f.d;
  }

  function calculate() {
    var aVal = document.getElementById('a').value.trim();
    var dVal = document.getElementById('d').value.trim();
    var freqStr = document.getElementById('freqs').value.trim();
    var pctStr = document.getElementById('pct').value.trim();

    if (!aVal || !dVal || !freqStr) { showMsg('请填写左端点、组距和频率'); return; }

    var a = parseFrac(aVal);
    var d = parseFrac(dVal);
    if (!a || !d) { showMsg('左端点或组距格式错误'); return; }
    if (d.valueOf() <= 0) { showMsg('组距必须为正数'); return; }

    var parts = freqStr.split(/\s+/);
    var freqs = [];
    for (var i = 0; i < parts.length; i++) {
      var f = parseFrac(parts[i]);
      if (!f) { showMsg('频率格式错误：' + parts[i]); return; }
      freqs.push(f);
    }

    // 验证频率之和为1
    var sumF = new Fraction(0);
    for (var i = 0; i < freqs.length; i++) sumF = sumF.add(freqs[i]);
    if (Math.abs(sumF.valueOf() - 1) > 1e-9) {
      showMsg('警告：频率之和为 ' + sumF.toFraction() + '，不等于 1');
    }

    var n = freqs.length;
    // 各组中点
    var mids = [];
    for (var i = 0; i < n; i++) {
      // 中点 = a + (i + 0.5) * d
      mids.push(a.add(d.mul(new Fraction(2*i+1, 2))));
    }

    // 均值 E = sum(mid_i * freq_i)
    var mean = new Fraction(0);
    for (var i = 0; i < n; i++) mean = mean.add(mids[i].mul(freqs[i]));

    // 方差 D = sum(freq_i * (mid_i - mean)^2)
    var variance = new Fraction(0);
    for (var i = 0; i < n; i++) {
      var diff = mids[i].sub(mean);
      variance = variance.add(freqs[i].mul(diff.mul(diff)));
    }

    // 中位数：累积频率找到0.5所在组
    var cumF = new Fraction(0);
    var medianStr = '';
    for (var i = 0; i < n; i++) {
      var prevCum = cumF;
      cumF = cumF.add(freqs[i]);
      if (prevCum.valueOf() < 0.5 && cumF.valueOf() >= 0.5) {
        // 中位数 = a + i*d + (0.5 - prevCum) / freq_i * d
        var left = a.add(d.mul(new Fraction(i)));
        var med = left.add(new Fraction(1,2).sub(prevCum).div(freqs[i]).mul(d));
        medianStr = fracToStr(med) + ' ≈ ' + med.valueOf().toFixed(4);
        break;
      }
    }

    // 百分位数
    var pctResult = '';
    if (pctStr !== '') {
      var p = parseFloat(pctStr);
      if (isNaN(p) || p < 0 || p > 100) {
        showMsg('百分位数需在 0~100 之间');
        return;
      }
      var target = new Fraction(p, 100);
      var cumF2 = new Fraction(0);
      for (var i = 0; i < n; i++) {
        var prevCum2 = cumF2;
        cumF2 = cumF2.add(freqs[i]);
        if (prevCum2.valueOf() < target.valueOf() && cumF2.valueOf() >= target.valueOf()) {
          var left2 = a.add(d.mul(new Fraction(i)));
          var pctVal = left2.add(target.sub(prevCum2).div(freqs[i]).mul(d));
          pctResult = 'P' + p + ' = ' + fracToStr(pctVal) + ' ≈ ' + pctVal.valueOf().toFixed(4);
          break;
        }
      }
      if (!pctResult) pctResult = '超出数据范围';
    }

    // 构建结果
    var grid = document.getElementById('result-grid');
    grid.innerHTML = '';
    var items = [
      ['均值 E(X)', fracToStr(mean) + ' ≈ ' + mean.valueOf().toFixed(4)],
      ['方差 D(X)', fracToStr(variance) + ' ≈ ' + variance.valueOf().toFixed(4)],
      ['标准差 σ', Math.sqrt(variance.valueOf()).toFixed(4)],
      ['中位数', medianStr],
    ];
    if (pctResult) items.push(['百分位数', pctResult]);
    items.push(['频率之和', sumF.toFraction()]);

    items.forEach(function(item) {
      var div = document.createElement('div');
      div.className = 'result-item';
      div.innerHTML = '<div class="result-label">' + item[0] + '</div><div class="result-value">' + item[1] + '</div>';
      grid.appendChild(div);
    });

    // 频率分布表
    var tableWrap = document.getElementById('freq-table-wrap');
    var html = '<table class="freq-table"><thead><tr><th>组别</th><th>区间</th><th>中点</th><th>频率</th><th>累积频率</th></tr></thead><tbody>';
    var cum = new Fraction(0);
    for (var i = 0; i < n; i++) {
      cum = cum.add(freqs[i]);
      var left = a.add(d.mul(new Fraction(i)));
      var right = a.add(d.mul(new Fraction(i+1)));
      html += '<tr><td>' + (i+1) + '</td><td>[' + fracToStr(left) + ', ' + fracToStr(right) + ')</td><td>' + fracToStr(mids[i]) + '</td><td>' + fracToStr(freqs[i]) + '</td><td>' + fracToStr(cum) + '</td></tr>';
    }
    html += '</tbody></table>';
    tableWrap.innerHTML = html;

    document.getElementById('result').style.display = 'block';
    showMsg('');
  }

  function clearAll() {
    ['a','d','freqs','pct'].forEach(function(id){ document.getElementById(id).value = ''; });
    document.getElementById('result').style.display = 'none';
    showMsg('');
  }

  function showMsg(m) { document.getElementById('msg').textContent = m; }
</script>
</body>
</html>
