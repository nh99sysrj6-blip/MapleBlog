<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Emoji 清理器</title>
  <style>
    html, body { background: transparent !important; min-height: unset !important; }
  </style>
  <script>
    (function() {
      function reportHeight() {
        var h = document.documentElement.scrollHeight || document.body.scrollHeight;
        window.parent.postMessage({ type: 'tool-height', height: h }, '*');
      }
      window.addEventListener('load', reportHeight);
      window.addEventListener('resize', reportHeight);
      var mo = new MutationObserver(reportHeight);
      document.addEventListener('DOMContentLoaded', function() {
        mo.observe(document.body, { childList: true, subtree: true, attributes: true });
      });
    })();
  </script>
</head>
<body>
<div class="container">
  <div class="card">
    <h2 class="title">😶 Emoji 清理器</h2>
    <div class="options">
      <label><input type="checkbox" id="trimAfter" checked> 清理后去除多余空格</label>
      <label><input type="checkbox" id="showCount" checked> 显示移除数量</label>
    </div>
    <div class="io-row">
      <div class="io-col">
        <label>输入</label>
        <textarea id="input" placeholder="粘贴含有 Emoji 的文本..."></textarea>
      </div>
      <div class="io-col">
        <label>输出</label>
        <textarea id="output" placeholder="清理后的文本..." readonly></textarea>
      </div>
    </div>
    <div id="stats" class="stats"></div>
    <div class="btn-row">
      <button class="btn-primary" onclick="clean()">开始清理</button>
      <button class="btn-secondary" onclick="loadExample()">加载示例</button>
      <button class="btn-secondary" onclick="clearAll()">清空</button>
      <button class="btn-secondary" onclick="copyOutput()">复制结果</button>
    </div>
    <div id="msg" class="msg"></div>
  </div>
</div>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8fafc; padding: 16px; }
  .container { max-width: 900px; margin: 0 auto; }
  .card { background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); padding: 24px; }
  .title { font-size: 1.3rem; font-weight: 700; color: #1e293b; margin-bottom: 16px; }
  .options { display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 16px; }
  .options label { display: flex; align-items: center; gap: 6px; font-size: 0.9rem; color: #475569; cursor: pointer; }
  .options input[type=checkbox] { accent-color: #10b981; }
  .io-row { display: flex; gap: 16px; }
  .io-col { flex: 1; display: flex; flex-direction: column; gap: 6px; }
  label { font-size: 0.85rem; font-weight: 600; color: #475569; }
  textarea { width: 100%; height: 200px; padding: 10px 12px; border: 1.5px solid #e2e8f0; border-radius: 8px; font-size: 0.9rem; font-family: 'Courier New', monospace; resize: vertical; outline: none; transition: border-color 0.2s; background: #f8fafc; }
  textarea:focus { border-color: #10b981; background: #fff; }
  textarea[readonly] { background: #f1f5f9; }
  .stats { margin-top: 10px; font-size: 0.85rem; color: #475569; min-height: 20px; }
  .btn-row { display: flex; gap: 10px; margin-top: 12px; flex-wrap: wrap; }
  .btn-primary { background: #10b981; color: #fff; border: none; border-radius: 8px; padding: 9px 22px; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: background 0.2s; }
  .btn-primary:hover { background: #059669; }
  .btn-secondary { background: #f1f5f9; color: #475569; border: 1.5px solid #e2e8f0; border-radius: 8px; padding: 9px 18px; font-size: 0.95rem; cursor: pointer; transition: background 0.2s; }
  .btn-secondary:hover { background: #e2e8f0; }
  .msg { margin-top: 10px; font-size: 0.85rem; min-height: 20px; color: #10b981; }
  @media (max-width: 600px) { .io-row { flex-direction: column; } }
</style>
<script>
  // Uses \p{Extended_Pictographic} for comprehensive emoji detection
  function getEmojiRegex() {
    try {
      return new RegExp('\\p{Extended_Pictographic}', 'gu');
    } catch(e) {
      // Fallback for older browsers
      return /[\u{1F600}-\u{1F64F}]|[\u{1F300}-\u{1F5FF}]|[\u{1F680}-\u{1F6FF}]|[\u{1F700}-\u{1F77F}]|[\u{1F780}-\u{1F7FF}]|[\u{1F800}-\u{1F8FF}]|[\u{1F900}-\u{1F9FF}]|[\u{1FA00}-\u{1FA6F}]|[\u{1FA70}-\u{1FAFF}]|[\u{2600}-\u{26FF}]|[\u{2700}-\u{27BF}]|[\u{FE00}-\u{FE0F}]|[\u{1F1E0}-\u{1F1FF}]|[\u{200D}]|[\u{20E3}]/gu;
    }
  }

  function clean() {
    const text = document.getElementById('input').value;
    if (!text) {
      document.getElementById('output').value = '';
      document.getElementById('stats').textContent = '';
      return;
    }
    const re = getEmojiRegex();
    const matches = text.match(getEmojiRegex()) || [];
    let result = text.replace(re, '');
    if (document.getElementById('trimAfter').checked) {
      result = result.replace(/[ \t]{2,}/g, ' ').replace(/^ +| +$/gm, '');
    }
    document.getElementById('output').value = result;
    if (document.getElementById('showCount').checked) {
      document.getElementById('stats').textContent =
        `共移除 ${matches.length} 个 Emoji，文本从 ${text.length} 字符减少到 ${result.length} 字符`;
    } else {
      document.getElementById('stats').textContent = '';
    }
    showMsg('清理完成');
  }

  function loadExample() {
    document.getElementById('input').value = '🎉 欢迎使用 Emoji 清理器！😊 这是一段含有 Emoji 的文本 🚀✨，清理后只保留纯文字内容。💡 试试看吧 🎯🔥';
    clean();
  }

  function clearAll() {
    document.getElementById('input').value = '';
    document.getElementById('output').value = '';
    document.getElementById('stats').textContent = '';
    showMsg('');
  }

  function copyOutput() {
    const v = document.getElementById('output').value;
    if (!v) { showMsg('没有可复制的内容'); return; }
    navigator.clipboard.writeText(v).then(() => showMsg('已复制到剪贴板'));
  }

  function showMsg(m) { document.getElementById('msg').textContent = m; }

  document.addEventListener('DOMContentLoaded', function() {
    document.getElementById('input').addEventListener('input', clean);
  });
</script>
</body>
</html>
