<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>随机抽取器</title>
  <style>
    html, body { background: transparent !important; min-height: unset !important; }
  </style>
  <script>
    (function() {
      function reportHeight() {
        var h = document.documentElement.scrollHeight || document.body.scrollHeight;
        window.parent.postMessage({ type: 'tool-height', height: h }, '*');
      }
      window.addEventListener('load', reportHeight);
      window.addEventListener('resize', reportHeight);
      var mo = new MutationObserver(reportHeight);
      document.addEventListener('DOMContentLoaded', function() {
        mo.observe(document.body, { childList: true, subtree: true, attributes: true });
      });
    })();
  </script>
</head>
<body>
<div class="container">
  <div class="card">
    <h2 class="title">🎯 随机抽取器</h2>
    <div class="field">
      <label for="listInput">候选列表（每行一个）</label>
      <textarea id="listInput" placeholder="苹果&#10;香蕉&#10;橙子&#10;葡萄&#10;西瓜"></textarea>
    </div>
    <div class="row-opts">
      <div class="field-inline">
        <label for="pickCount">抽取数量</label>
        <input type="number" id="pickCount" value="1" min="1">
      </div>
      <div class="check-opts">
        <label><input type="checkbox" id="noRepeat" checked> 不重复</label>
        <label><input type="checkbox" id="showAll"> 显示全部候选</label>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn-primary" onclick="pick()">开始抽取</button>
      <button class="btn-secondary" onclick="copyResult()">复制结果</button>
      <button class="btn-secondary" onclick="clearAll()">清空</button>
    </div>
    <div id="msg" class="msg"></div>
    <div id="resultWrap" class="result-wrap" style="display:none">
      <div class="result-title">抽取结果 <span id="resultInfo" class="result-info"></span></div>
      <div id="resultItems" class="result-items"></div>
    </div>
    <div id="allWrap" class="all-wrap" style="display:none">
      <div class="all-title">全部候选</div>
      <div id="allItems" class="all-items"></div>
    </div>
  </div>
</div>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8fafc; padding: 16px; }
  .container { max-width: 560px; margin: 0 auto; }
  .card { background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); padding: 24px; }
  .title { font-size: 1.3rem; font-weight: 700; color: #1e293b; margin-bottom: 20px; }
  .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
  .field label { font-size: 0.85rem; font-weight: 600; color: #475569; }
  textarea { width: 100%; height: 160px; padding: 10px 12px; border: 1.5px solid #e2e8f0; border-radius: 8px; font-size: 0.9rem; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; resize: vertical; outline: none; background: #f8fafc; transition: border-color 0.2s; }
  textarea:focus { border-color: #ec4899; background: #fff; }
  .row-opts { display: flex; align-items: center; gap: 20px; flex-wrap: wrap; margin-bottom: 20px; }
  .field-inline { display: flex; align-items: center; gap: 8px; }
  .field-inline label { font-size: 0.85rem; font-weight: 600; color: #475569; white-space: nowrap; }
  .field-inline input { width: 70px; padding: 7px 10px; border: 1.5px solid #e2e8f0; border-radius: 8px; font-size: 0.95rem; outline: none; background: #f8fafc; transition: border-color 0.2s; }
  .field-inline input:focus { border-color: #ec4899; background: #fff; }
  .check-opts { display: flex; gap: 16px; flex-wrap: wrap; }
  .check-opts label { display: flex; align-items: center; gap: 6px; font-size: 0.9rem; color: #475569; cursor: pointer; }
  .check-opts input[type=checkbox] { accent-color: #ec4899; width: 15px; height: 15px; }
  .btn-row { display: flex; gap: 10px; flex-wrap: wrap; }
  .btn-primary { background: #ec4899; color: #fff; border: none; border-radius: 8px; padding: 9px 22px; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: background 0.2s; }
  .btn-primary:hover { background: #db2777; }
  .btn-secondary { background: #f1f5f9; color: #475569; border: 1.5px solid #e2e8f0; border-radius: 8px; padding: 9px 18px; font-size: 0.95rem; cursor: pointer; transition: background 0.2s; }
  .btn-secondary:hover { background: #e2e8f0; }
  .msg { margin-top: 10px; font-size: 0.85rem; min-height: 20px; color: #ec4899; }
  .result-wrap, .all-wrap { margin-top: 16px; border-top: 1px solid #e2e8f0; padding-top: 16px; }
  .result-title, .all-title { font-size: 0.85rem; font-weight: 600; color: #475569; margin-bottom: 10px; }
  .result-info { font-weight: 400; color: #94a3b8; }
  .result-items { display: flex; flex-wrap: wrap; gap: 8px; }
  .result-chip { background: #fce7f3; border: 1px solid #fbcfe8; border-radius: 8px; padding: 6px 16px; font-size: 1rem; font-weight: 600; color: #9d174d; }
  .all-items { display: flex; flex-wrap: wrap; gap: 6px; }
  .all-chip { background: #f1f5f9; border: 1px solid #e2e8f0; border-radius: 6px; padding: 4px 10px; font-size: 0.85rem; color: #475569; }
  .all-chip.picked { background: #fce7f3; border-color: #fbcfe8; color: #9d174d; }
</style>
<script>
  let lastPicked = [];

  document.getElementById('showAll').addEventListener('change', function() {
    document.getElementById('allWrap').style.display = this.checked && document.getElementById('allItems').children.length ? '' : 'none';
  });

  function pick() {
    const raw = document.getElementById('listInput').value;
    const items = raw.split('\n').map(s => s.trim()).filter(s => s.length > 0);
    if (!items.length) { showMsg('请输入候选列表'); return; }
    const count = parseInt(document.getElementById('pickCount').value);
    const noRepeat = document.getElementById('noRepeat').checked;
    if (isNaN(count) || count < 1) { showMsg('抽取数量至少为 1'); return; }
    if (noRepeat && count > items.length) { showMsg(`不重复模式下，抽取数量不能超过候选数量 (${items.length})`); return; }

    let picked = [];
    if (noRepeat) {
      const pool = [...items];
      for (let i = pool.length - 1; i > 0; i--) {
        const arr = new Uint32Array(1);
        crypto.getRandomValues(arr);
        const j = arr[0] % (i + 1);
        [pool[i], pool[j]] = [pool[j], pool[i]];
      }
      picked = pool.slice(0, count);
    } else {
      for (let i = 0; i < count; i++) {
        const arr = new Uint32Array(1);
        crypto.getRandomValues(arr);
        picked.push(items[arr[0] % items.length]);
      }
    }
    lastPicked = picked;

    document.getElementById('resultItems').innerHTML = picked.map(p => `<span class="result-chip">${p}</span>`).join('');
    document.getElementById('resultInfo').textContent = `（从 ${items.length} 项中抽取 ${picked.length} 项）`;
    document.getElementById('resultWrap').style.display = '';

    // Show all candidates
    const pickedSet = new Set(picked);
    document.getElementById('allItems').innerHTML = items.map(it =>
      `<span class="all-chip${pickedSet.has(it) ? ' picked' : ''}">${it}</span>`
    ).join('');
    if (document.getElementById('showAll').checked) {
      document.getElementById('allWrap').style.display = '';
    }
    showMsg('抽取完成');
  }

  function copyResult() {
    if (!lastPicked.length) { showMsg('请先抽取'); return; }
    navigator.clipboard.writeText(lastPicked.join('\n')).then(() => showMsg('已复制到剪贴板'));
  }

  function clearAll() {
    document.getElementById('listInput').value = '';
    document.getElementById('resultWrap').style.display = 'none';
    document.getElementById('allWrap').style.display = 'none';
    lastPicked = [];
    showMsg('');
  }

  function showMsg(m) { document.getElementById('msg').textContent = m; }
</script>
</body>
</html>
