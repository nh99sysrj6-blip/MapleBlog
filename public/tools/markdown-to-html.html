<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Markdown 转 HTML</title>
  <style>
    html, body { background: transparent !important; min-height: unset !important; }
  </style>
  <script>
    (function() {
      function reportHeight() {
        var h = document.documentElement.scrollHeight || document.body.scrollHeight;
        window.parent.postMessage({ type: 'tool-height', height: h }, '*');
      }
      window.addEventListener('load', reportHeight);
      window.addEventListener('resize', reportHeight);
      var mo = new MutationObserver(reportHeight);
      document.addEventListener('DOMContentLoaded', function() {
        mo.observe(document.body, { childList: true, subtree: true, attributes: true });
      });
    })();
  </script>
</head>
<body>
<div class="container">
  <div class="card">
    <h2 class="title">📝 Markdown 转 HTML</h2>
    <div class="io-row">
      <div class="io-col">
        <label>Markdown 输入</label>
        <textarea id="input" placeholder="输入 Markdown 内容..."></textarea>
      </div>
      <div class="io-col">
        <label>HTML 预览</label>
        <div id="preview" class="preview-box"></div>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn-primary" onclick="loadExample()">加载示例</button>
      <button class="btn-secondary" onclick="clearAll()">清空</button>
      <button class="btn-secondary" onclick="copyHtml()">复制 HTML</button>
      <button class="btn-secondary" onclick="downloadHtml()">下载 HTML</button>
    </div>
    <div id="msg" class="msg"></div>
  </div>
</div>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8fafc; padding: 16px; }
  .container { max-width: 960px; margin: 0 auto; }
  .card { background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); padding: 24px; }
  .title { font-size: 1.3rem; font-weight: 700; color: #1e293b; margin-bottom: 16px; }
  .io-row { display: flex; gap: 16px; }
  .io-col { flex: 1; display: flex; flex-direction: column; gap: 6px; min-width: 0; }
  label { font-size: 0.85rem; font-weight: 600; color: #475569; }
  textarea { width: 100%; height: 400px; padding: 10px 12px; border: 1.5px solid #e2e8f0; border-radius: 8px; font-size: 0.9rem; font-family: 'Courier New', monospace; resize: vertical; outline: none; transition: border-color 0.2s; background: #f8fafc; }
  textarea:focus { border-color: #10b981; background: #fff; }
  .preview-box { width: 100%; min-height: 400px; padding: 12px 16px; border: 1.5px solid #e2e8f0; border-radius: 8px; background: #f8fafc; overflow-y: auto; font-size: 0.95rem; line-height: 1.7; color: #1e293b; word-break: break-word; }
  .preview-box h1,.preview-box h2,.preview-box h3,.preview-box h4,.preview-box h5,.preview-box h6 { margin: 0.8em 0 0.4em; font-weight: 700; line-height: 1.3; }
  .preview-box h1 { font-size: 1.6em; border-bottom: 2px solid #e2e8f0; padding-bottom: 4px; }
  .preview-box h2 { font-size: 1.35em; border-bottom: 1px solid #e2e8f0; padding-bottom: 3px; }
  .preview-box h3 { font-size: 1.15em; }
  .preview-box p { margin: 0.6em 0; }
  .preview-box ul,.preview-box ol { margin: 0.5em 0 0.5em 1.5em; }
  .preview-box li { margin: 0.2em 0; }
  .preview-box code { background: #f1f5f9; padding: 1px 5px; border-radius: 4px; font-family: 'Courier New', monospace; font-size: 0.88em; color: #e11d48; }
  .preview-box pre { background: #1e293b; color: #e2e8f0; padding: 12px 16px; border-radius: 8px; overflow-x: auto; margin: 0.8em 0; }
  .preview-box pre code { background: none; color: inherit; padding: 0; font-size: 0.9em; }
  .preview-box blockquote { border-left: 4px solid #10b981; margin: 0.8em 0; padding: 6px 14px; background: #f0fdf4; color: #475569; border-radius: 0 6px 6px 0; }
  .preview-box a { color: #10b981; text-decoration: underline; }
  .preview-box img { max-width: 100%; border-radius: 6px; }
  .preview-box table { border-collapse: collapse; width: 100%; margin: 0.8em 0; }
  .preview-box th,.preview-box td { border: 1px solid #e2e8f0; padding: 6px 12px; text-align: left; }
  .preview-box th { background: #f1f5f9; font-weight: 600; }
  .preview-box hr { border: none; border-top: 2px solid #e2e8f0; margin: 1em 0; }
  .btn-row { display: flex; gap: 10px; margin-top: 16px; flex-wrap: wrap; }
  .btn-primary { background: #10b981; color: #fff; border: none; border-radius: 8px; padding: 9px 22px; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: background 0.2s; }
  .btn-primary:hover { background: #059669; }
  .btn-secondary { background: #f1f5f9; color: #475569; border: 1.5px solid #e2e8f0; border-radius: 8px; padding: 9px 18px; font-size: 0.95rem; cursor: pointer; transition: background 0.2s; }
  .btn-secondary:hover { background: #e2e8f0; }
  .msg { margin-top: 10px; font-size: 0.85rem; min-height: 20px; color: #10b981; }
  @media (max-width: 640px) { .io-row { flex-direction: column; } }
</style>
<script>
  var inputEl = document.getElementById('input');
  var previewEl = document.getElementById('preview');

  inputEl.addEventListener('input', render);

  function parseMarkdown(md) {
    var html = md;
    // Escape HTML entities in code blocks first
    var codeBlocks = [];
    html = html.replace(/```([\s\S]*?)```/g, function(_, code) {
      codeBlocks.push('<pre><code>' + code.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').trim() + '</code></pre>');
      return '\x00CODE' + (codeBlocks.length - 1) + '\x00';
    });
    var inlineCodes = [];
    html = html.replace(/`([^`]+)`/g, function(_, code) {
      inlineCodes.push('<code>' + code.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') + '</code>');
      return '\x00INLINE' + (inlineCodes.length - 1) + '\x00';
    });
    // Headings
    html = html.replace(/^###### (.+)$/gm, '<h6>$1</h6>');
    html = html.replace(/^##### (.+)$/gm, '<h5>$1</h5>');
    html = html.replace(/^#### (.+)$/gm, '<h4>$1</h4>');
    html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
    html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
    html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
    // HR
    html = html.replace(/^[-*_]{3,}\s*$/gm, '<hr>');
    // Blockquote
    html = html.replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>');
    // Bold & italic
    html = html.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
    html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
    html = html.replace(/___(.+?)___/g, '<strong><em>$1</em></strong>');
    html = html.replace(/__(.+?)__/g, '<strong>$1</strong>');
    html = html.replace(/_(.+?)_/g, '<em>$1</em>');
    // Strikethrough
    html = html.replace(/~~(.+?)~~/g, '<del>$1</del>');
    // Images before links
    html = html.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1">');
    // Links
    html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
    // Unordered lists
    html = html.replace(/(^[-*+] .+(\n|$))+/gm, function(block) {
      var items = block.trim().split('\n').map(function(l) {
        return '<li>' + l.replace(/^[-*+] /, '') + '</li>';
      }).join('');
      return '<ul>' + items + '</ul>';
    });
    // Ordered lists
    html = html.replace(/(^\d+\. .+(\n|$))+/gm, function(block) {
      var items = block.trim().split('\n').map(function(l) {
        return '<li>' + l.replace(/^\d+\. /, '') + '</li>';
      }).join('');
      return '<ol>' + items + '</ol>';
    });
    // Tables
    html = html.replace(/(\|.+\|\n\|[-| :]+\|\n(?:\|.+\|\n?)+)/g, function(table) {
      var rows = table.trim().split('\n');
      var header = rows[0].split('|').filter(function(c){return c.trim();}).map(function(c){return '<th>'+c.trim()+'</th>';}).join('');
      var body = rows.slice(2).map(function(r){
        return '<tr>' + r.split('|').filter(function(c){return c.trim();}).map(function(c){return '<td>'+c.trim()+'</td>';}).join('') + '</tr>';
      }).join('');
      return '<table><thead><tr>' + header + '</tr></thead><tbody>' + body + '</tbody></table>';
    });
    // Paragraphs
    html = html.replace(/\n{2,}/g, '\n\n');
    var blocks = html.split('\n\n');
    html = blocks.map(function(b) {
      b = b.trim();
      if (!b) return '';
      if (/^<(h[1-6]|ul|ol|li|blockquote|pre|table|hr|thead|tbody|tr|th|td)/.test(b)) return b;
      if (/\x00CODE/.test(b) || /\x00INLINE/.test(b)) return b;
      return '<p>' + b.replace(/\n/g, '<br>') + '</p>';
    }).join('\n');
    // Restore code blocks
    codeBlocks.forEach(function(c, i) { html = html.replace('\x00CODE' + i + '\x00', c); });
    inlineCodes.forEach(function(c, i) { html = html.replace('\x00INLINE' + i + '\x00', c); });
    return html;
  }

  function render() {
    var md = inputEl.value;
    previewEl.innerHTML = md ? parseMarkdown(md) : '<span style="color:#94a3b8">预览区域</span>';
  }

  function loadExample() {
    inputEl.value = [
      '# Markdown 示例',
      '',
      '这是一段**粗体**和*斜体*文字，还有~~删除线~~。',
      '',
      '## 代码示例',
      '',
      '行内代码：`console.log("hello")`',
      '',
      '```',
      'function greet(name) {',
      '  return "Hello, " + name;',
      '}',
      '```',
      '',
      '## 列表',
      '',
      '- 苹果',
      '- 香蕉',
      '- 橙子',
      '',
      '1. 第一步',
      '2. 第二步',
      '3. 第三步',
      '',
      '## 引用',
      '',
      '> 这是一段引用文字。',
      '',
      '## 链接与图片',
      '',
      '[访问 GitHub](https://github.com)',
      '',
      '## 表格',
      '',
      '| 名称 | 类型 | 说明 |',
      '|------|------|------|',
      '| id   | int  | 主键 |',
      '| name | str  | 姓名 |',
    ].join('\n');
    render();
    showMsg('示例已加载');
  }

  function clearAll() {
    inputEl.value = '';
    previewEl.innerHTML = '<span style="color:#94a3b8">预览区域</span>';
    showMsg('');
  }

  function copyHtml() {
    var md = inputEl.value;
    if (!md) { showMsg('没有可复制的内容'); return; }
    navigator.clipboard.writeText(parseMarkdown(md)).then(function() { showMsg('HTML 已复制到剪贴板'); });
  }

  function downloadHtml() {
    var md = inputEl.value;
    if (!md) { showMsg('没有可下载的内容'); return; }
    var content = '<!DOCTYPE html>\n<html lang="zh-CN">\n<head><meta charset="UTF-8"><title>导出</title></head>\n<body>\n' + parseMarkdown(md) + '\n</body>\n</html>';
    var blob = new Blob([content], { type: 'text/html' });
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'output.html';
    a.click();
    showMsg('下载已开始');
  }

  function showMsg(m) { document.getElementById('msg').textContent = m; }

  render();
</script>
</body>
</html>
