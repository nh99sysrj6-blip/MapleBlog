<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>每日一言</title>
  <style>
    html, body { background: transparent !important; min-height: unset !important; }
  </style>
  <script>
    (function() {
      function reportHeight() {
        var h = document.documentElement.scrollHeight || document.body.scrollHeight;
        window.parent.postMessage({ type: 'tool-height', height: h }, '*');
      }
      window.addEventListener('load', reportHeight);
      window.addEventListener('resize', reportHeight);
      var mo = new MutationObserver(reportHeight);
      document.addEventListener('DOMContentLoaded', function() {
        mo.observe(document.body, { childList: true, subtree: true, attributes: true });
      });
    })();
  </script>
</head>
<body>
<div class="container">
  <div class="card">
    <h2 class="title">📜 每日一言</h2>
    <div class="date-row" id="dateRow"></div>
    <div class="cats">
      <button class="cat-btn active" data-cat="all" onclick="setCat(this,'all')">全部</button>
      <button class="cat-btn" data-cat="life" onclick="setCat(this,'life')">人生</button>
      <button class="cat-btn" data-cat="success" onclick="setCat(this,'success')">成功</button>
      <button class="cat-btn" data-cat="wisdom" onclick="setCat(this,'wisdom')">智慧</button>
      <button class="cat-btn" data-cat="love" onclick="setCat(this,'love')">爱情</button>
      <button class="cat-btn" data-cat="inspire" onclick="setCat(this,'inspire')">励志</button>
    </div>
    <div class="quote-box">
      <div class="quote-mark">"</div>
      <div id="quoteText" class="quote-text"></div>
      <div id="quoteAuthor" class="quote-author"></div>
    </div>
    <div class="btn-row">
      <button class="btn-primary" onclick="nextQuote()">换一条</button>
      <button class="btn-secondary" onclick="copyQuote()">复制</button>
    </div>
    <div id="msg" class="msg"></div>
  </div>
</div>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8fafc; padding: 16px; }
  .container { max-width: 600px; margin: 0 auto; }
  .card { background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); padding: 24px; }
  .title { font-size: 1.3rem; font-weight: 700; color: #1e293b; margin-bottom: 8px; }
  .date-row { font-size: 0.82rem; color: #94a3b8; margin-bottom: 16px; }
  .cats { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
  .cat-btn { background: #f1f5f9; color: #475569; border: 1.5px solid #e2e8f0; border-radius: 20px; padding: 5px 14px; font-size: 0.85rem; cursor: pointer; transition: all 0.2s; }
  .cat-btn:hover { background: #e2e8f0; }
  .cat-btn.active { background: #8b5cf6; color: #fff; border-color: #8b5cf6; }
  .quote-box { background: linear-gradient(135deg, #f5f3ff 0%, #ede9fe 100%); border-radius: 12px; padding: 28px 24px 20px; margin-bottom: 20px; position: relative; min-height: 120px; }
  .quote-mark { position: absolute; top: 10px; left: 18px; font-size: 3rem; color: #c4b5fd; line-height: 1; font-family: Georgia, serif; }
  .quote-text { font-size: 1.1rem; line-height: 1.8; color: #1e293b; padding-left: 8px; margin-bottom: 14px; }
  .quote-author { text-align: right; font-size: 0.88rem; color: #7c3aed; font-weight: 600; }
  .btn-row { display: flex; gap: 10px; flex-wrap: wrap; }
  .btn-primary { background: #8b5cf6; color: #fff; border: none; border-radius: 8px; padding: 9px 22px; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: background 0.2s; }
  .btn-primary:hover { background: #7c3aed; }
  .btn-secondary { background: #f1f5f9; color: #475569; border: 1.5px solid #e2e8f0; border-radius: 8px; padding: 9px 18px; font-size: 0.95rem; cursor: pointer; transition: background 0.2s; }
  .btn-secondary:hover { background: #e2e8f0; }
  .msg { margin-top: 10px; font-size: 0.85rem; min-height: 20px; color: #8b5cf6; }
</style>
<script>
  const quotes = [
    // 人生
    { text: '人生就像骑自行车，要保持平衡，就必须不断前进。', author: '爱因斯坦', cat: 'life' },
    { text: '生命不在于活得长与短，而在于顿悟的早与晚。', author: '佚名', cat: 'life' },
    { text: '人生最大的错误，是不断担心会犯错。', author: '艾尔伯特·哈伯德', cat: 'life' },
    { text: '生活不是等待暴风雨过去，而是学会在雨中起舞。', author: '维维安·格林', cat: 'life' },
    { text: '人生没有彩排，每天都是现场直播。', author: '佚名', cat: 'life' },
    { text: '不要因为走得太远，而忘记为什么出发。', author: '纪伯伦', cat: 'life' },
    { text: '生命中最重要的事情，是要有个远大的目标，并借助才能与坚持来完成它。', author: '歌德', cat: 'life' },
    // 成功
    { text: '成功不是终点，失败也不是终结，只有勇气才是永恒的。', author: '丘吉尔', cat: 'success' },
    { text: '成功的秘诀，在于永不放弃。', author: '伏尔泰', cat: 'success' },
    { text: '天才是百分之一的灵感加上百分之九十九的汗水。', author: '爱迪生', cat: 'success' },
    { text: '成功的人是跟别人学习经验，失败的人只跟自己学习经验。', author: '佚名', cat: 'success' },
    { text: '不管怎样，坚持下去，不是因为我很坚强，而是因为我别无选择。', author: '佚名', cat: 'success' },
    { text: '成功的道路上，坚持是最重要的品质。', author: '拿破仑·希尔', cat: 'success' },
    { text: '每一个成功者都有一个开始，勇于开始，才能找到成功的路。', author: '佚名', cat: 'success' },
    // 智慧
    { text: '知之为知之，不知为不知，是知也。', author: '孔子', cat: 'wisdom' },
    { text: '学而不思则罔，思而不学则殆。', author: '孔子', cat: 'wisdom' },
    { text: '己所不欲，勿施于人。', author: '孔子', cat: 'wisdom' },
    { text: '三人行，必有我师焉。', author: '孔子', cat: 'wisdom' },
    { text: '吾日三省吾身：为人谋而不忠乎？与朋友交而不信乎？传不习乎？', author: '曾子', cat: 'wisdom' },
    { text: '知人者智，自知者明；胜人者有力，自胜者强。', author: '老子', cat: 'wisdom' },
    { text: '上善若水，水善利万物而不争。', author: '老子', cat: 'wisdom' },
    { text: '合抱之木，生于毫末；九层之台，起于累土；千里之行，始于足下。', author: '老子', cat: 'wisdom' },
    // 爱情
    { text: '爱情不是寻找一个完美的人，而是学会用完美的眼光欣赏一个不完美的人。', author: '佚名', cat: 'love' },
    { text: '真正的爱情，是两个人一起成长。', author: '佚名', cat: 'love' },
    { text: '爱一个人，就是在他疲惫的时候给他依靠，在他迷茫的时候给他方向。', author: '佚名', cat: 'love' },
    { text: '爱情是生命的火焰，没有它，一切变成黑暗。', author: '罗曼·罗兰', cat: 'love' },
    { text: '世界上最遥远的距离，不是生与死，而是我就站在你面前，你却不知道我爱你。', author: '泰戈尔', cat: 'love' },
    { text: '爱情不是占有，而是欣赏。', author: '林语堂', cat: 'love' },
    // 励志
    { text: '不积跬步，无以至千里；不积小流，无以成江海。', author: '荀子', cat: 'inspire' },
    { text: '宝剑锋从磨砺出，梅花香自苦寒来。', author: '佚名', cat: 'inspire' },
    { text: '只要功夫深，铁杵磨成针。', author: '佚名', cat: 'inspire' },
    { text: '长风破浪会有时，直挂云帆济沧海。', author: '李白', cat: 'inspire' },
    { text: '千磨万击还坚劲，任尔东西南北风。', author: '郑燮', cat: 'inspire' },
    { text: '路漫漫其修远兮，吾将上下而求索。', author: '屈原', cat: 'inspire' },
    { text: '志不强者智不达，言不信者行不果。', author: '墨子', cat: 'inspire' },
    { text: '有志者，事竟成，破釜沉舟，百二秦关终属楚。', author: '蒲松龄', cat: 'inspire' },
  ];

  let currentCat = 'all';
  let lastIndex = -1;

  function setCat(btn, cat) {
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentCat = cat;
    nextQuote();
  }

  function getFiltered() {
    return currentCat === 'all' ? quotes : quotes.filter(q => q.cat === currentCat);
  }

  function nextQuote() {
    const filtered = getFiltered();
    if (!filtered.length) { showMsg('该分类暂无名言'); return; }
    let idx;
    do {
      const arr = new Uint32Array(1);
      crypto.getRandomValues(arr);
      idx = arr[0] % filtered.length;
    } while (filtered.length > 1 && idx === lastIndex);
    lastIndex = idx;
    const q = filtered[idx];
    document.getElementById('quoteText').textContent = q.text;
    document.getElementById('quoteAuthor').textContent = '—— ' + q.author;
    showMsg('');
  }

  function copyQuote() {
    const text = document.getElementById('quoteText').textContent;
    const author = document.getElementById('quoteAuthor').textContent;
    if (!text) { showMsg('请先获取名言'); return; }
    navigator.clipboard.writeText(`${text}\n${author}`).then(() => showMsg('已复制到剪贴板'));
  }

  function showMsg(m) { document.getElementById('msg').textContent = m; }

  // Init
  const now = new Date();
  document.getElementById('dateRow').textContent = now.toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
  nextQuote();
</script>
</body>
</html>
