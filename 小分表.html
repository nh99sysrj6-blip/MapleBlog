<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Excel数据处理工具 - 拉小分表</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }
        
        .header h1 i {
            font-size: 32px;
        }
        
        .header .subtitle {
            font-size: 16px;
            opacity: 0.9;
        }
        
        .main-content {
            padding: 30px;
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 30px;
        }
        
        .controls {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 12px;
            border: 2px solid #e9ecef;
        }
        
        .control-group {
            margin-bottom: 25px;
        }
        
        .control-group label {
            display: block;
            margin-bottom: 8px;
            color: #495057;
            font-weight: 600;
            font-size: 15px;
        }
        
        .control-group input[type="text"],
        .control-group select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #dee2e6;
            border-radius: 8px;
            font-size: 15px;
            transition: all 0.3s;
        }
        
        .control-group input[type="text"]:focus,
        .control-group select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .button-group {
            display: grid;
            gap: 12px;
        }
        
        button {
            padding: 14px 20px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn-success {
            background: linear-gradient(135deg, #20c997 0%, #099268 100%);
            color: white;
        }
        
        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(32, 201, 151, 0.4);
        }
        
        .btn-danger {
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
            color: white;
        }
        
        .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(231, 76, 60, 0.4);
        }
        
        .file-input-wrapper {
            position: relative;
            width: 100%;
        }
        
        .file-input-wrapper input[type="file"] {
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }
        
        .file-input-label {
            display: block;
            width: 100%;
            padding: 12px 15px;
            background: white;
            border: 2px dashed #667eea;
            border-radius: 8px;
            text-align: center;
            color: #667eea;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .file-input-label:hover {
            background: #f0f2ff;
            border-color: #764ba2;
        }
        
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 15px 0;
        }
        
        .checkbox-group input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }
        
        .progress-container {
            margin: 20px 0;
        }
        
        .progress-bar {
            width: 100%;
            height: 12px;
            background: #e9ecef;
            border-radius: 6px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.3s ease;
        }
        
        .result-container {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            height: 600px;
            overflow: auto;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .stat-card {
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
        
        .stat-card h3 {
            font-size: 14px;
            color: #6c757d;
            margin-bottom: 8px;
        }
        
        .stat-card .value {
            font-size: 28px;
            font-weight: bold;
            color: #495057;
        }
        
        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        
        .data-table th {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 15px;
            text-align: left;
            font-weight: 600;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        
        .data-table td {
            padding: 12px 15px;
            border-bottom: 1px solid #dee2e6;
        }
        
        .data-table tr:hover {
            background-color: #f8f9fa;
        }
        
        .color-0 { background-color: #ffe6e6 !important; }
        .color-1 { background-color: #e6ffe6 !important; }
        .color-2 { background-color: #e6e6ff !important; }
        .color-3 { background-color: #ffffe6 !important; }
        .color-4 { background-color: #ffe6ff !important; }
        .color-5 { background-color: #e6ffff !important; }
        .color-6 { background-color: #ffe9d6 !important; }
        .color-7 { background-color: #e6d6ff !important; }
        
        .export-options {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 15px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }
        
        .modal h2 {
            color: #495057;
            margin-bottom: 20px;
        }
        
        .close-modal {
            float: right;
            font-size: 28px;
            cursor: pointer;
            color: #6c757d;
        }
        
        .preview-container {
            margin-top: 20px;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            padding: 15px;
            max-height: 300px;
            overflow: auto;
        }
        
        .info-box {
            background: #e7f4ff;
            border-left: 4px solid #1890ff;
            padding: 15px;
            margin: 15px 0;
            border-radius: 4px;
        }
        
        .chart-container {
            height: 400px;
            margin-top: 20px;
        }
        
        .file-info {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-top: 10px;
            border-left: 4px solid #20c997;
        }
        
        .file-info h4 {
            color: #495057;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .file-info p {
            color: #6c757d;
            font-size: 14px;
            margin: 5px 0;
        }
        
        @media (max-width: 1024px) {
            .main-content {
                grid-template-columns: 1fr;
            }
            
            .controls {
                order: 2;
            }
            
            .result-container {
                height: 500px;
            }
        }
        
        @media (max-width: 768px) {
            .main-content {
                padding: 15px;
            }
            
            .stats {
                grid-template-columns: 1fr;
            }
            
            .export-options {
                flex-direction: column;
            }
            
            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>
                <span>📊 Excel数据处理工具</span>
            </h1>
            <div class="subtitle">拉小分表工具（分类汇总与统计分析）</div>
        </div>
        
        <div class="main-content">
            <div class="controls">
                <div class="control-group">
                    <label>选择Excel文件（自动加载）</label>
                    <div class="file-input-wrapper">
                        <input type="file" id="fileInput" accept=".xlsx,.xls,.csv" 
                               onchange="handleFileSelect(this.files)">
                        <div class="file-input-label">
                            <span>📁 点击选择文件或拖放至此</span>
                        </div>
                    </div>
                    <div id="fileInfo" style="display: none;">
                        <div class="file-info">
                            <h4>📄 文件信息</h4>
                            <p id="fileName">文件名：</p>
                            <p id="fileSize">文件大小：</p>
                            <p id="dataInfo">数据：</p>
                        </div>
                    </div>
                </div>
                
                <div class="control-group">
                    <label for="ignoreCols">忽略列索引（逗号分隔）</label>
                    <input type="text" id="ignoreCols" value="1,2,3,8,9" placeholder="例如: 1,2,3,8,9">
                </div>
                
                <div class="control-group">
                    <label for="groupCol">分组列</label>
                    <select id="groupCol"></select>
                </div>
                
                <div class="control-group">
                    <label for="threshold">总分阈值</label>
                    <input type="number" id="threshold" value="10" min="0" step="1">
                </div>
                
                <div class="control-group">
                    <label for="colorGroups">班级颜色分组（JSON格式）</label>
                    <input type="text" id="colorGroups" 
                           value="[[1,2,30,31],[3,4,5,6,32,33,34,35],[7,8,9,10,36,37,38,39],[12,13,14,42,43,44],[23,24,41]]" 
                           placeholder="例如: [[1,2],[3,4,5,6]]">
                </div>
                
                <div class="checkbox-group">
                    <input type="checkbox" id="hasHeader" checked>
                    <label for="hasHeader">包含表头（第一行为标题行）</label>
                </div>
                
                <div class="progress-container">
                    <label>处理进度</label>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                    <div id="progressText" style="text-align: center; margin-top: 5px; color: #6c757d;">就绪</div>
                </div>
                
                <div class="button-group">
                    <button class="btn-success" onclick="processData()" id="processBtn" disabled>
                        <span>⚡ 开始处理</span>
                    </button>
                    <button class="btn-danger" onclick="resetAll()">
                        <span>🔄 重置</span>
                    </button>
                </div>
                
                <div class="export-options" id="exportOptions" style="display: none;">
                    <button class="btn-primary" onclick="exportToExcel()">
                        <span>📄 导出Excel</span>
                    </button>
                    <button class="btn-success" onclick="exportToImage()">
                        <span>🖼️ 导出图片</span>
                    </button>
                    <button class="btn-danger" onclick="showChart()">
                        <span>📈 查看图表</span>
                    </button>
                </div>
            </div>
            
            <div class="result-container">
                <div id="stats" class="stats"></div>
                <div id="tableContainer" style="overflow: auto;">
                    <table class="data-table" id="resultTable"></table>
                </div>
                <div id="chartContainer" class="chart-container"></div>
            </div>
        </div>
    </div>
    
    <div class="modal" id="previewModal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">×</span>
            <h2>预览结果</h2>
            <div id="previewContent" class="preview-container"></div>
        </div>
    </div>
    
    <script>
        // 全局变量
        let currentData = null;
        let originalData = null;
        let processedData = null;
        let colorGroups = [];
        let currentGroupCol = null;
        let currentFileName = null;
        
        // 颜色组
        const colorClasses = ['color-0', 'color-1', 'color-2', 'color-3', 
                            'color-4', 'color-5', 'color-6', 'color-7'];
        
        // 更新进度条
        function updateProgress(value, text) {
            const progressFill = document.getElementById('progressFill');
            const progressText = document.getElementById('progressText');
            
            progressFill.style.width = value + '%';
            progressText.textContent = text || value + '%';
        }
        
        // 处理文件选择
        function handleFileSelect(files) {
            if (!files.length) {
                return;
            }
            
            const file = files[0];
            currentFileName = file.name;
            
            // 显示文件信息
            document.getElementById('fileInfo').style.display = 'block';
            document.getElementById('fileName').textContent = `文件名：${file.name}`;
            document.getElementById('fileSize').textContent = `文件大小：${(file.size / 1024).toFixed(2)} KB`;
            
            updateProgress(10, '读取文件中...');
            
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    
                    // 读取第一个工作表
                    const sheetName = workbook.SheetNames[0];
                    const worksheet = workbook.Sheets[sheetName];
                    
                    // 根据是否包含表头决定如何读取
                    const hasHeader = document.getElementById('hasHeader').checked;
                    let jsonData;
                    
                    if (hasHeader) {
                        // 包含表头：使用默认读取方式
                        jsonData = XLSX.utils.sheet_to_json(worksheet, { header: 1 });
                        
                        if (jsonData.length < 2) {
                            alert('数据行数不足，请检查文件格式');
                            document.getElementById('processBtn').disabled = true;
                            return;
                        }
                        
                        // 提取表头（第一行）和数据
                        const headers = jsonData[0];
                        const dataRows = jsonData.slice(1);
                        
                        // 转换为对象数组
                        originalData = dataRows.map(row => {
                            const obj = {};
                            headers.forEach((header, index) => {
                                obj[header || `列${index}`] = row[index];
                            });
                            return obj;
                        });
                    } else {
                        // 不包含表头：自动生成列名
                        jsonData = XLSX.utils.sheet_to_json(worksheet, { header: 1 });
                        
                        if (jsonData.length < 1) {
                            alert('数据行数不足，请检查文件格式');
                            document.getElementById('processBtn').disabled = true;
                            return;
                        }
                        
                        // 使用第一行作为数据，生成列名
                        const firstRow = jsonData[0];
                        const headers = firstRow.map((_, index) => `列${index + 1}`);
                        const dataRows = jsonData.slice(0);
                        
                        originalData = dataRows.map(row => {
                            const obj = {};
                            headers.forEach((header, index) => {
                                obj[header] = row[index];
                            });
                            return obj;
                        });
                    }
                    
                    // 更新文件信息
                    document.getElementById('dataInfo').textContent = 
                        `数据：${originalData.length} 行，${Object.keys(originalData[0]).length} 列`;
                    
                    updateProgress(30, '文件加载完成');
                    updateGroupColumnSelect();
                    document.getElementById('processBtn').disabled = false;
                    
                    // 显示提示信息
                    setTimeout(() => {
                        alert(`文件 "${file.name}" 加载完成！\n共 ${originalData.length} 行数据，${Object.keys(originalData[0]).length} 列。\n请设置参数后点击"开始处理"。`);
                    }, 300);
                    
                } catch (error) {
                    alert('文件读取失败: ' + error.message);
                    updateProgress(0, '读取失败');
                    document.getElementById('processBtn').disabled = true;
                }
            };
            
            reader.onerror = function() {
                alert('文件读取错误');
                updateProgress(0, '读取错误');
                document.getElementById('processBtn').disabled = true;
            };
            
            reader.readAsArrayBuffer(file);
        }
        
        // 更新分组列选择
        function updateGroupColumnSelect() {
            if (!originalData || originalData.length === 0) return;
            
            const groupColSelect = document.getElementById('groupCol');
            groupColSelect.innerHTML = '';
            
            const headers = Object.keys(originalData[0]);
            headers.forEach(header => {
                const option = document.createElement('option');
                option.value = header;
                option.textContent = header;
                groupColSelect.appendChild(option);
            });
            
            // 尝试自动选择"班级"相关列
            const groupKeywords = ['班级', '班', 'class', 'Class', 'CLASSS'];
            for (let i = 0; i < groupColSelect.options.length; i++) {
                const option = groupColSelect.options[i];
                for (const keyword of groupKeywords) {
                    if (option.value && option.value.toString().includes(keyword)) {
                        groupColSelect.selectedIndex = i;
                        return;
                    }
                }
            }
        }
        
        // 解析颜色分组
        function parseColorGroups() {
            const colorGroupsInput = document.getElementById('colorGroups').value.trim();
            if (!colorGroupsInput) {
                return [];
            }
            
            try {
                // 尝试解析JSON数组
                const parsed = JSON.parse(colorGroupsInput);
                if (Array.isArray(parsed)) {
                    return parsed.filter(group => Array.isArray(group));
                }
            } catch (error) {
                // 如果不是标准JSON，尝试其他格式
                try {
                    // 处理 [1,2,30,31],[3,4,5,6,32,33,34,35] 这种格式
                    if (colorGroupsInput.includes('],[')) {
                        const groups = colorGroupsInput.split('],[').map(group => {
                            return group.replace(/[\[\]]/g, '').split(',')
                                .map(num => parseInt(num.trim()))
                                .filter(num => !isNaN(num));
                        }).filter(group => group.length > 0);
                        return groups;
                    } else {
                        // 处理单个数组的情况
                        const cleaned = colorGroupsInput.replace(/[\[\]\s]/g, '');
                        if (cleaned) {
                            const group = cleaned.split(',').map(num => parseInt(num.trim())).filter(num => !isNaN(num));
                            return group.length > 0 ? [group] : [];
                        }
                    }
                } catch (e) {
                    console.error('解析颜色分组失败:', e);
                }
            }
            
            return [];
        }
        
        // 获取班级颜色索引
        function getClassColorIndex(classValue) {
            if (!colorGroups.length) return -1;
            
            // 尝试提取班级值中的数字
            let classNum = null;
            if (typeof classValue === 'number') {
                classNum = classValue;
            } else if (typeof classValue === 'string') {
                const match = classValue.match(/\d+/);
                if (match) {
                    classNum = parseInt(match[0]);
                }
            }
            
            if (classNum === null) return -1;
            
            for (let i = 0; i < colorGroups.length; i++) {
                if (colorGroups[i].includes(classNum)) {
                    return i;
                }
            }
            
            return -1;
        }
        
        // 处理数据
        function processData() {
            if (!originalData || originalData.length === 0) {
                alert('请先选择文件');
                return;
            }
            
            updateProgress(0, '开始处理...');
            
            try {
                // 1. 解析设置
                const ignoreColsInput = document.getElementById('ignoreCols').value;
                const ignoreCols = ignoreColsInput.split(',').map(num => {
                    const parsed = parseInt(num.trim());
                    return isNaN(parsed) ? -1 : parsed - 1; // 转换为0-based索引
                }).filter(num => num >= 0);
                
                const threshold = parseFloat(document.getElementById('threshold').value) || 10;
                const groupCol = document.getElementById('groupCol').value;
                colorGroups = parseColorGroups();
                
                if (!groupCol) {
                    alert('请选择分组列');
                    return;
                }
                
                updateProgress(20, '数据清洗中...');
                
                // 2. 数据清洗
                let data = [...originalData];
                
                // 移除忽略的列
                if (ignoreCols.length > 0) {
                    const headers = Object.keys(data[0]);
                    const keepHeaders = headers.filter((_, index) => !ignoreCols.includes(index));
                    data = data.map(row => {
                        const newRow = {};
                        keepHeaders.forEach(header => {
                            newRow[header] = row[header];
                        });
                        return newRow;
                    });
                }
                
                // 确保分组列存在
                if (!data[0].hasOwnProperty(groupCol)) {
                    alert(`分组列 "${groupCol}" 不存在`);
                    return;
                }
                
                updateProgress(40, '过滤低分行...');
                
                // 3. 删除低分行（总分小于阈值）
                const scoreCol = Object.keys(data[0]).find(col => col && col.toString().includes('总分'));
                if (scoreCol) {
                    data = data.filter(row => {
                        const score = parseFloat(row[scoreCol]);
                        return !isNaN(score) && score >= threshold;
                    });
                }
                
                updateProgress(60, '分类汇总中...');
                
                // 4. 分类汇总
                const numericCols = [];
                const sampleRow = data[0];
                Object.keys(sampleRow).forEach(col => {
                    if (col !== groupCol) {
                        const value = sampleRow[col];
                        if (typeof value === 'number' || (!isNaN(parseFloat(value)) && value !== null && value !== '')) {
                            numericCols.push(col);
                        }
                    }
                });
                
                if (numericCols.length === 0) {
                    alert('没有找到数值列进行汇总');
                    return;
                }
                
                // 按分组列分组并计算平均值
                const groups = {};
                data.forEach(row => {
                    const groupKey = row[groupCol];
                    if (!groups[groupKey]) {
                        groups[groupKey] = {
                            count: 0,
                            sums: numericCols.reduce((acc, col) => {
                                acc[col] = 0;
                                return acc;
                            }, {})
                        };
                    }
                    
                    groups[groupKey].count++;
                    numericCols.forEach(col => {
                        const value = parseFloat(row[col]) || 0;
                        groups[groupKey].sums[col] += value;
                    });
                });
                
                // 转换为结果数组
                processedData = Object.entries(groups).map(([groupKey, groupData]) => {
                    const result = { [groupCol]: groupKey };
                    numericCols.forEach(col => {
                        result[col] = (groupData.sums[col] / groupData.count).toFixed(2);
                    });
                    return result;
                });
                
                // 按分组列排序
                processedData.sort((a, b) => {
                    const aVal = a[groupCol];
                    const bVal = b[groupCol];
                    
                    // 尝试按数字排序
                    const aNum = typeof aVal === 'number' ? aVal : 
                                (typeof aVal === 'string' ? parseInt(aVal.match(/\d+/)) : NaN);
                    const bNum = typeof bVal === 'number' ? bVal : 
                                (typeof bVal === 'string' ? parseInt(bVal.match(/\d+/)) : NaN);
                    
                    if (!isNaN(aNum) && !isNaN(bNum)) {
                        return aNum - bNum;
                    }
                    
                    // 如果无法按数字排序，按字符串排序
                    return String(aVal).localeCompare(String(bVal));
                });
                
                updateProgress(80, '生成结果...');
                
                // 保存分组列
                currentGroupCol = groupCol;
                
                // 显示结果
                displayResult();
                
                updateProgress(100, '处理完成');
                
                // 显示导出选项
                document.getElementById('exportOptions').style.display = 'flex';
                
            } catch (error) {
                alert('处理数据时出错: ' + error.message);
                console.error(error);
                updateProgress(0, '处理失败');
            }
        }
        
        // 显示结果
        function displayResult() {
            if (!processedData || processedData.length === 0) {
                alert('没有处理结果可显示');
                return;
            }
            
            const statsDiv = document.getElementById('stats');
            const table = document.getElementById('resultTable');
            
            // 清空之前的内容
            statsDiv.innerHTML = '';
            table.innerHTML = '';
            document.getElementById('chartContainer').innerHTML = '';
            
            // 显示统计信息
            const stats = [
                { label: '分组数量', value: processedData.length },
                { label: '数据列数', value: Object.keys(processedData[0]).length },
                { label: '颜色分组数', value: colorGroups.length },
                { label: '处理时间', value: new Date().toLocaleTimeString() }
            ];
            
            statsDiv.innerHTML = stats.map(stat => `
                <div class="stat-card">
                    <h3>${stat.label}</h3>
                    <div class="value">${stat.value}</div>
                </div>
            `).join('');
            
            // 创建表格
            const headers = Object.keys(processedData[0]);
            
            // 创建表头
            let thead = '<tr>';
            headers.forEach(header => {
                thead += `<th>${header}</th>`;
            });
            thead += '</tr>';
            table.innerHTML = thead;
            
            // 创建数据行
            processedData.forEach(rowData => {
                const tr = table.insertRow();
                const classValue = rowData[currentGroupCol];
                const colorIndex = getClassColorIndex(classValue);
                
                headers.forEach(header => {
                    const td = tr.insertCell();
                    td.textContent = rowData[header];
                    
                    if (colorIndex >= 0) {
                        td.className = colorClasses[colorIndex % colorClasses.length];
                    }
                    
                    // 如果是数字，右对齐
                    if (!isNaN(parseFloat(rowData[header]))) {
                        td.style.textAlign = 'right';
                    }
                });
            });
            
            // 添加表格样式
            table.style.display = 'table';
        }
        
        // 导出到Excel
        function exportToExcel() {
            if (!processedData || processedData.length === 0) {
                alert('没有数据可导出');
                return;
            }
            
            // 创建工作簿
            const wb = XLSX.utils.book_new();
            
            // 创建工作表数据
            const wsData = [Object.keys(processedData[0])]; // 表头
            
            processedData.forEach(row => {
                const rowData = Object.keys(row).map(key => row[key]);
                wsData.push(rowData);
            });
            
            const ws = XLSX.utils.aoa_to_sheet(wsData);
            
            // 添加颜色（简单实现）
            if (currentGroupCol) {
                const headerKeys = Object.keys(processedData[0]);
                const groupColIndex = headerKeys.indexOf(currentGroupCol);
                
                processedData.forEach((row, rowIndex) => {
                    const classValue = row[currentGroupCol];
                    const colorIndex = getClassColorIndex(classValue);
                    
                    if (colorIndex >= 0) {
                        const color = getExcelColor(colorIndex);
                        headerKeys.forEach((_, colIndex) => {
                            const cellRef = XLSX.utils.encode_cell({ r: rowIndex + 1, c: colIndex });
                            if (!ws[cellRef]) {
                                ws[cellRef] = { t: 's', v: row[headerKeys[colIndex]] };
                            }
                            if (!ws[cellRef].s) {
                                ws[cellRef].s = {};
                            }
                            ws[cellRef].s.fill = {
                                fgColor: { rgb: color }
                            };
                        });
                    }
                });
            }
            
            // 添加到工作簿
            XLSX.utils.book_append_sheet(wb, ws, "处理结果");
            
            // 生成文件名（使用原文件名+时间戳，确保.xlsx后缀）
            const timestamp = new Date().toISOString().slice(0, 19).replace(/[:]/g, '-');
            const baseName = currentFileName ? currentFileName.replace(/\.[^/.]+$/, "") : "处理结果";
            const filename = `${baseName}_${timestamp}.xlsx`;
            
            // 导出文件
            XLSX.writeFile(wb, filename);
            
            alert(`Excel文件已导出: ${filename}`);
        }
        
        // 获取Excel颜色
        function getExcelColor(colorIndex) {
            const colors = [
                'FFFFC8C8', // 浅红色
                'FFC8FFC8', // 浅绿色
                'FFC8C8FF', // 浅蓝色
                'FFFFFFC8', // 浅黄色
                'FFFFC8FF', // 浅紫色
                'FFC8FFFF', // 浅青色
                'FFFFDCC8', // 浅橙色
                'FFDCC8FF'  // 浅紫罗兰色
            ];
            return colors[colorIndex % colors.length];
        }
        
        // 导出为图片
        function exportToImage() {
            if (!processedData || processedData.length === 0) {
                alert('没有数据可导出');
                return;
            }
            
            const table = document.getElementById('resultTable');
            if (!table) {
                alert('没有可导出的表格');
                return;
            }
            
            html2canvas(table).then(canvas => {
                const link = document.createElement('a');
                const baseName = currentFileName ? currentFileName.replace(/\.[^/.]+$/, "") : "处理结果";
                const filename = `${baseName}_${new Date().toISOString().slice(0, 19).replace(/[:]/g, '-')}.png`;
                link.download = filename;
                link.href = canvas.toDataURL('image/png');
                link.click();
            });
        }
        
        // 显示图表
        function showChart() {
            if (!processedData || processedData.length === 0) {
                alert('没有数据可显示图表');
                return;
            }
            
            const chartContainer = document.getElementById('chartContainer');
            chartContainer.innerHTML = '';
            
            const headers = Object.keys(processedData[0]);
            const numericHeaders = headers.filter(header => 
                header !== currentGroupCol && 
                !isNaN(parseFloat(processedData[0][header]))
            );
            
            if (numericHeaders.length === 0) {
                alert('没有数值列可绘制图表');
                return;
            }
            
            // 准备数据
            const groups = processedData.map(row => row[currentGroupCol]);
            const traces = numericHeaders.map((header, index) => {
                return {
                    x: groups,
                    y: processedData.map(row => parseFloat(row[header])),
                    name: header,
                    type: 'bar',
                    marker: {
                        color: getChartColor(index)
                    }
                };
            });
            
            const layout = {
                title: '各班级成绩对比',
                xaxis: { title: currentGroupCol },
                yaxis: { title: '平均分' },
                barmode: 'group',
                height: 400
            };
            
            Plotly.newPlot('chartContainer', traces, layout);
        }
        
        // 获取图表颜色
        function getChartColor(index) {
            const colors = [
                '#FF6B6B', '#4ECDC4', '#45B7D1', '#96CEB4',
                '#FFEAA7', '#DDA0DD', '#98D8C8', '#F7DC6F'
            ];
            return colors[index % colors.length];
        }
        
        // 重置所有
        function resetAll() {
            currentData = null;
            originalData = null;
            processedData = null;
            colorGroups = [];
            currentGroupCol = null;
            currentFileName = null;
            
            document.getElementById('fileInput').value = '';
            document.getElementById('fileInfo').style.display = 'none';
            document.getElementById('resultTable').innerHTML = '';
            document.getElementById('stats').innerHTML = '';
            document.getElementById('chartContainer').innerHTML = '';
            document.getElementById('exportOptions').style.display = 'none';
            document.getElementById('groupCol').innerHTML = '';
            document.getElementById('processBtn').disabled = true;
            
            updateProgress(0, '就绪');
        }
        
        // 拖放功能
        function setupDragAndDrop() {
            const dropArea = document.querySelector('.file-input-label');
            
            ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
                dropArea.addEventListener(eventName, preventDefaults, false);
            });
            
            function preventDefaults(e) {
                e.preventDefault();
                e.stopPropagation();
            }
            
            ['dragenter', 'dragover'].forEach(eventName => {
                dropArea.addEventListener(eventName, highlight, false);
            });
            
            ['dragleave', 'drop'].forEach(eventName => {
                dropArea.addEventListener(eventName, unhighlight, false);
            });
            
            function highlight() {
                dropArea.style.background = '#f0f2ff';
                dropArea.style.borderColor = '#764ba2';
            }
            
            function unhighlight() {
                dropArea.style.background = 'white';
                dropArea.style.borderColor = '#667eea';
            }
            
            dropArea.addEventListener('drop', handleDrop, false);
            
            function handleDrop(e) {
                const dt = e.dataTransfer;
                const files = dt.files;
                document.getElementById('fileInput').files = files;
                handleFileSelect(files);
            }
        }
        
        // 页面加载完成后的初始化
        document.addEventListener('DOMContentLoaded', function() {
            updateProgress(0, '就绪');
            setupDragAndDrop();
            
            // 监听包含表头复选框变化
            document.getElementById('hasHeader').addEventListener('change', function() {
                if (originalData) {
                    // 如果有已加载的数据，重新加载
                    if (document.getElementById('fileInput').files.length > 0) {
                        handleFileSelect(document.getElementById('fileInput').files);
                    }
                }
            });
            
            // 点击模态框外部关闭
            document.getElementById('previewModal').addEventListener('click', function(e) {
                if (e.target === this) {
                    closeModal();
                }
            });
        });
        
        // 关闭模态框
        function closeModal() {
            document.getElementById('previewModal').style.display = 'none';
        }
    </script>
</body>
</html>
